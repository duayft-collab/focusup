                        <span style={{fontSize:10.5,color:'var(--ink5)',marginLeft:8,fontFamily:'var(--fm)'}}>görev ağırlıkları dahil</span>
                      </div>
                      <span className="mono" style={{fontSize:11,color:wp>=70?'var(--gn)':wp>=30?'var(--ac)':'var(--ink4)',fontWeight:700}}>%{wp} · {doneW}/{totalW} puan</span>
                    </div>
                    <div className="w-prog-bar">
                      <div className="w-prog-fill" style={{width:wp+'%',background:wp>=70?'var(--gn)':wp>=30?'var(--ac)':'var(--ac)'}}/>
                    </div>
                    <div style={{display:'flex',gap:12,marginTop:8}}>
                      {D.todos.filter(t=>!t.done&&t.status!=='Tamamlandı').sort((a,b)=>(b.weight||10)-(a.weight||10)).slice(0,4).map(t=>(
                        <div key={t.id} style={{display:'flex',gap:4,alignItems:'center'}}>
                          <span className="weight-badge">%{t.weight||10}</span>
                          <span style={{fontSize:11,color:'var(--ink4)',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.text}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}

              {/* Filters */}
              <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14,padding:'12px 14px',background:'var(--bg2)',borderRadius:'var(--r2)',border:'1px solid var(--bd)'}}>
                <div className="fbar" style={{marginBottom:0}}>
                  <span className="clbl">Durum:</span>
                  {['Tümü','Bekliyor','Yapılıyor','Tamamlandı','İptal'].map(f=><button key={f} className={`chip${fSt===f?' on':''}`} onClick={()=>setFSt(f)} style={{padding:'3px 10px',fontSize:11}}>{f}</button>)}
                </div>
                <div className="fbar" style={{marginBottom:0}}>
                  <span className="clbl">Öncelik:</span>
                  {['Tümü','Acil & Önemli','Önemli','Normal','Düşük'].map(f=><button key={f} className={`chip${fPri===f?' on':''}`} onClick={()=>setFPri(f)} style={{padding:'3px 10px',fontSize:11}}>{f==='Tümü'?'Tümü':f==='Acil & Önemli'?'🚩 Acil':f==='Önemli'?'🟠 Önemli':f==='Normal'?'🔵 Normal':'⚪ Düşük'}</button>)}
                  <span className="clbl" style={{marginLeft:8}}>Kategori:</span>
                  {cats.slice(0,5).map(f=><button key={f} className={`chip${fCat===f?' on':''}`} onClick={()=>setFCat(f)} style={{padding:'3px 10px',fontSize:11}}>{f}</button>)}
                </div>
                <div className="fbar" style={{marginBottom:0}}>
                  <span className="clbl">Sorumlu:</span>
                  {allAssignees.slice(0,7).map(a=><button key={a} className={`chip${fAssignee===a?' on':''}`} onClick={()=>setFAssignee(a)} style={{padding:'3px 10px',fontSize:11}}>{a==='Tümü'?'Tümü':'👤 '+a}</button>)}
                  <button className="btn btnxs btng" style={{marginLeft:'auto'}} onClick={()=>setModal({type:'todoCat'})}>⚙ Kategori</button>
                </div>
              </div>

              {/* Task list with drag-to-reorder */}
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {sorted.map((t,idx)=>{
                  const over=isOverdue(t.end,t.done);const dl=daysLeft(t.end);
                  const exp=expTask===t.id;const sdone=(t.subtasks||[]).filter(s=>s.done).length;
                  const stCls={Bekliyor:'status-wait',Yapılıyor:'status-doing',Tamamlandı:'status-done',İptal:'status-cancel'}[t.status||'Bekliyor']||'status-wait';
                  const stIc={Bekliyor:'⏳',Yapılıyor:'⚙️',Tamamlandı:'✅',İptal:'🚫'}[t.status||'Bekliyor']||'⏳';
                  const depBlocked=(t.dependsOn||[]).length>0&&(t.dependsOn||[]).some(depId=>{const dep=D.todos.find(x=>x.id===depId);return dep&&!dep.done&&dep.status!=='Tamamlandı';});
                  const subPct=pct(sdone,(t.subtasks||[]).length);
                  return(
                    <div key={t.id} className="todo-item" 
                      style={{opacity:t.done?.5:depBlocked?.7:1,borderLeft:`3px solid ${(PRI_CFG[t.priority]||{}).color||'var(--bd)'}`}}
                      draggable
                      onDragStart={ev=>{ev.dataTransfer.setData('todoId',String(t.id));ev.currentTarget.classList.add('dragging');}}
                      onDragEnd={ev=>ev.currentTarget.classList.remove('dragging')}
                      onDragOver={ev=>{ev.preventDefault();ev.currentTarget.classList.add('drop-zone-active');}}
                      onDragLeave={ev=>ev.currentTarget.classList.remove('drop-zone-active')}
                      onDrop={ev=>{
                        ev.currentTarget.classList.remove('drop-zone-active');
                        const dragId=parseInt(ev.dataTransfer.getData('todoId'));
                        if(dragId===t.id)return;
                        setD(prev=>{
                          const ts=[...prev.todos];
                          const fromIdx=ts.findIndex(x=>x.id===dragId);
                          const toIdx=ts.findIndex(x=>x.id===t.id);
                          if(fromIdx<0||toIdx<0)return prev;
                          const [moved]=ts.splice(fromIdx,1);ts.splice(toIdx,0,moved);
                          return{...prev,todos:ts};
                        });
                      }}>
                      <div style={{padding:'10px 14px',display:'flex',alignItems:'center',gap:8,cursor:'pointer',minHeight:52}} onClick={()=>setExpTask(exp?null:t.id)}>
                        {/* Drag handle */}
                        <span className="drag-handle" title="Sürükle ile yeniden sırala" onClick={ev=>ev.stopPropagation()} style={{fontSize:13,color:'var(--ink6)',flexShrink:0}}>⠿</span>
                        <input type="checkbox" className="chk" checked={!!t.done} onChange={()=>togTodo(t.id)} onClick={ev=>ev.stopPropagation()} style={{flexShrink:0}}/>
                        {/* Priority color dot */}
                        <span style={{width:8,height:8,borderRadius:'50%',background:(PRI_CFG[t.priority]||{}).color||'var(--bd)',flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0,overflow:'hidden'}}>
                          {/* Title row */}
                          <div style={{fontWeight:t.done?400:600,textDecoration:t.done?'line-through':'none',fontSize:13,color:t.done?'var(--ink4)':'var(--ink)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',marginBottom:2}}>{t.text}</div>
                          {/* Meta row — compact single line */}
                          <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'nowrap',overflow:'hidden'}}>
                            <span className={`status-badge ${stCls}`} style={{fontSize:9.5,padding:'1px 6px',flexShrink:0}}>{stIc} {t.status||'Bekliyor'}</span>
                            <span className="tag" style={{fontSize:9.5,padding:'1px 6px',flexShrink:0,whiteSpace:'nowrap'}}>{t.category}</span>
                            {t.mainAssignee&&<span style={{fontSize:10,color:'var(--ink4)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:80,flexShrink:1}}>👤 {t.mainAssignee.split(' ')[0]}</span>}
                            {t.end&&<span className="mono" style={{fontSize:9.5,color:over?'var(--rd)':dl!==null&&dl<=2?'var(--ac)':'var(--ink5)',whiteSpace:'nowrap',flexShrink:0}}>📅 {fmtShort(t.end)}{over?' ⚠':''}</span>}
                            {(t.subtasks||[]).length>0&&<span className="mono" style={{fontSize:9.5,color:subPct===100?'var(--gn)':'var(--ink4)',whiteSpace:'nowrap',flexShrink:0}}>{sdone}/{t.subtasks.length}</span>}
                            {depBlocked&&<span style={{fontSize:9.5,color:'var(--ac)',whiteSpace:'nowrap',flexShrink:0}}>🔗</span>}
                          </div>
                          {/* Sub-task progress bar */}
                          {(t.subtasks||[]).length>0&&(
                            <div style={{marginTop:3,display:'flex',gap:6,alignItems:'center'}}>
                              <div className="pb" style={{flex:1,height:2}}><div className="pf" style={{width:subPct+'%',background:subPct===100?'var(--gn)':'var(--ac)'}}/></div>
                            </div>
                          )}
                        </div>
                        {/* Right side actions — always visible, compact */}
                        <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                          <select value={t.status||'Bekliyor'}
                            style={{fontSize:10,padding:'2px 5px',borderRadius:12,border:'1px solid var(--bd)',background:'var(--bg2)',fontFamily:'var(--ff)',cursor:'pointer',maxWidth:90}}
                            onClick={ev=>ev.stopPropagation()}
                            onChange={ev=>setD(prev=>({...prev,todos:prev.todos.map(x=>x.id===t.id?{...x,status:ev.target.value,done:ev.target.value==='Tamamlandı'}:x)}))}>
                            <option value="Bekliyor">⏳</option>
                            <option value="Yapılıyor">⚙️</option>
                            <option value="Tamamlandı">✅</option>
                            <option value="İptal">🚫</option>
                          </select>
                          <span style={{fontSize:10,color:'var(--ink6)',flexShrink:0}}>▾</span>
                          <button className="ibtn" style={{width:24,height:24,fontSize:10,flexShrink:0,background:'var(--acb)',color:'var(--ac)',border:'1px solid var(--acbd)'}} title="Düzenle" onClick={ev=>{ev.stopPropagation();setModal({type:'todoEdit',tid:t.id,item:t});}}>✏</button>
                          <button className="ibtn" style={{width:22,height:22,fontSize:10,flexShrink:0}} onClick={ev=>{ev.stopPropagation();delItem(t,'todos');}}>×</button>
                        </div>
                      </div>
                      {exp&&(
                        <div style={{padding:'0 15px 14px',borderTop:'1px solid var(--bg3)'}}>
                          {/* Notes */}
                          {t.notes&&<div style={{padding:'8px 11px',background:'var(--acb)',borderRadius:'var(--r)',margin:'10px 0 8px',fontSize:12.5,color:'var(--ink2)',borderLeft:'3px solid var(--ac)'}} dangerouslySetInnerHTML={{__html:t.notes}}/>}
                          {/* Meta row */}
                          <div style={{display:'flex',gap:10,flexWrap:'wrap',fontSize:12,color:'var(--ink4)',margin:'8px 0',padding:'8px 0',borderBottom:'1px solid var(--bg3)'}}>
                            {t.start&&<span>▶ {fmtDate(t.start)}</span>}
                            {t.end&&<span>◼ {fmtDate(t.end)}</span>}
                            {t.estHours&&<span>⏱ {t.estHours}sa tahmini</span>}
                            <span className="weight-badge">%{t.weight||10} ağırlık</span>
                          </div>
                          {/* Dependency info */}
                          {(t.dependsOn||[]).length>0&&(
                            <div style={{marginBottom:10,padding:'7px 10px',background:depBlocked?'var(--rdb)':'var(--gnb)',borderRadius:'var(--r)',border:`1px solid ${depBlocked?'var(--rdbd)':'var(--gnbd)'}`,fontSize:12}}>
                              {depBlocked?'⚠ Bağımlı görevler tamamlanmadı:':'✓ Bağımlılıklar karşılandı'} {(t.dependsOn||[]).map(depId=>{const dep=D.todos.find(x=>x.id===depId);return dep?<span key={depId} style={{marginLeft:5,fontWeight:600}}>{dep.text}</span>:null;})}
                            </div>
                          )}
                          {/* Links section */}
                          <div style={{marginBottom:10}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                              <div className="slbl2" style={{marginBottom:0}}>🔗 Bağlantılar</div>
                              <button className="btn btnxs btng" onClick={()=>{const url=prompt('URL ekle:');if(url)setD(prev=>({...prev,todos:prev.todos.map(x=>x.id===t.id?{...x,links:[...(x.links||[]),url.trim()]}:x)}));}}>+ Link</button>
                            </div>
                            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                              {(t.links||[]).map((l,li)=>(
                                <div key={li} style={{display:'flex',alignItems:'center',gap:3}}>
                                  <a href={l} target="_blank" rel="noopener noreferrer" className="link-chip">🔗 {getDomain(l)}</a>
                                  <button className="ibtn" style={{width:16,height:16,fontSize:9}} onClick={()=>setD(prev=>({...prev,todos:prev.todos.map(x=>x.id===t.id?{...x,links:(x.links||[]).filter((_,i)=>i!==li)}:x)}))}>×</button>
                                </div>
                              ))}
                              {(t.links||[]).length===0&&<span style={{fontSize:11,color:'var(--ink6)',fontStyle:'italic'}}>Bağlantı yok.</span>}
                            </div>
                          </div>
                          {/* Sub-tasks */}
                          <div>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}>
                              <div className="slbl2" style={{marginBottom:0}}>Alt Görevler ({sdone}/{(t.subtasks||[]).length})</div>
                              <button className="btn btnxs btng" onClick={()=>setModal({type:'subtask',tid:t.id})}>+ Ekle</button>
                            </div>
                            {(t.subtasks||[]).length>0&&<div style={{marginBottom:8}}><div className="pb" style={{height:3}}><div className="pf" style={{width:pct(sdone,(t.subtasks||[]).length)+'%',background:pct(sdone,(t.subtasks||[]).length)===100?'var(--gn)':'var(--ac)'}}/></div></div>}
                            {(t.subtasks||[]).map(s=>(
                              <div key={s.id} className="sub-item">
                                <input type="checkbox" className="chk" checked={s.done} onChange={()=>togSub(t.id,s.id)} style={{marginTop:3}}/>
                                <div style={{flex:1}}>
                                  <div style={{fontSize:12.5,color:s.done?'var(--ink4)':'var(--ink)',textDecoration:s.done?'line-through':'none'}}>{s.text}</div>
                                  <div style={{display:'flex',gap:7,marginTop:2}}>
                                    {s.assignee&&<span className="assignee-chip" style={{fontSize:9.5}}>👤 {s.assignee}</span>}
                                    {s.updatedAt&&<span className="mono" style={{fontSize:9,color:'var(--ink6)'}}>🕐 {fmtTS(s.updatedAt)}</span>}
                                  </div>
                                </div>
                                <button className="ibtn" style={{width:22,height:22,fontSize:10,background:'var(--acb)',color:'var(--ac)',border:'1px solid var(--acbd)'}} title="Düzenle" onClick={()=>setModal({type:'subtaskEdit',tid:t.id,sid:s.id,item:s})}>✏</button>
                                <button className="ibtn" style={{width:20,height:20,fontSize:10}} onClick={()=>setD(prev=>({...prev,todos:prev.todos.map(x=>x.id===t.id?{...x,subtasks:(x.subtasks||[]).filter(y=>y.id!==s.id)}:x)}))}>×</button>
                              </div>
                            ))}
                          </div>
                          {/* Dependency setter */}
                          <div style={{marginTop:10,borderTop:'1px solid var(--bg3)',paddingTop:10}}>
                            <div className="slbl2" style={{marginBottom:6}}>🔗 Bağımlılık Ekle</div>
                            <select style={{fontSize:12,padding:'5px 9px',borderRadius:'var(--r)',border:'1px solid var(--bd)',fontFamily:'var(--ff)',background:'var(--bg2)'}}
                              onChange={ev=>{const depId=parseInt(ev.target.value);if(depId&&!(t.dependsOn||[]).includes(depId))setD(prev=>({...prev,todos:prev.todos.map(x=>x.id===t.id?{...x,dependsOn:[...(x.dependsOn||[]),depId]}:x)}));ev.target.value='';}}
                              defaultValue="">
                              <option value="">Bu görev için önce yapılması gereken görevi seç…</option>
                              {D.todos.filter(x=>x.id!==t.id&&!x.done).map(x=><option key={x.id} value={x.id}>{x.text.slice(0,50)}</option>)}
                            </select>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                {sorted.length===0&&<div className="card empty"><div className="empty-icon">☑️</div>Filtrele ile eşleşen görev yok.</div>}
              </div>
            </div>
          )}

          {/* ── CALENDAR sub-tab ── */}
          {todoTab==='calendar'&&<CalPage D={D} setD={setD} setDetail={setDetail} setModal={setModal} calView={calView} setCalView={setCalView} calDate={calDate} setCalDate={setCalDate}/>}

          {/* ── THE ONE THING sub-tab ── */}
          {todoTab==='onething'&&(
            <div>
              {/* Hero question */}
              <div style={{background:'linear-gradient(135deg,#18160F 0%,#2E1A0E 100%)',borderRadius:'var(--r4)',padding:'28px 32px',color:'#fff',marginBottom:18,textAlign:'center',position:'relative',overflow:'hidden'}}>
                <div style={{position:'absolute',top:-30,left:-30,width:180,height:180,borderRadius:'50%',background:'rgba(184,98,26,.12)',pointerEvents:'none'}}/>
                <div style={{fontSize:40,marginBottom:12}}>🎯</div>
                <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:20,lineHeight:1.5,opacity:.9,marginBottom:6,maxWidth:480,margin:'0 auto 10px'}}>
                  "Bugün yapılırsa diğer işleri kolaylaştıracak veya gereksiz kılacak tek şey nedir?"
                </div>
                <div style={{fontSize:11,opacity:.4,fontFamily:'var(--fm)',letterSpacing:.5}}>— THE ONE THING · Gary Keller</div>
                <div style={{marginTop:14,display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
                  {[
                    {ic:'🎯',t:'Odak',d:'Günde 1 şeye odaklanmak, 10 şeye dağılmaktan 3x daha verimlidir'},
                    {ic:'⚡',t:'Domino Etkisi',d:'Doğru seçilen 1 görev, diğer görevleri otomatik kolaylaştırır'},
                    {ic:'🏆',t:'Araştırma',d:'Gary Keller\'ın çalışması: En başarılı insanlar her gün "tek şeye" odaklanır'},
                    {ic:'🧠',t:'Bilişsel Yük',d:'Beyin aynı anda 1 görevi en iyi işler — çok görev, kaliteyi düşürür'},
                  ].map(tip=>(
                    <div key={tip.ic} className="info-tip" style={{background:'rgba(255,255,255,.08)',padding:'8px 12px',borderRadius:'var(--r2)',border:'1px solid rgba(255,255,255,.12)'}}>
                      <span style={{fontSize:16}}>{tip.ic}</span>
                      <span style={{fontSize:12,marginLeft:6,opacity:.8}}>{tip.t}</span>
                      <span className="tip-bubble" style={{background:'var(--sur)',color:'var(--ink)',border:'1px solid var(--bd)'}}>{tip.d}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Current One Thing */}
              <div style={{marginBottom:18,padding:'20px 22px',background:'var(--sur)',border:'2px solid var(--ac)',borderRadius:'var(--r3)',boxShadow:'var(--shm)'}}>
                <div style={{fontSize:10,fontFamily:'var(--fm)',color:'var(--ac)',letterSpacing:1,textTransform:'uppercase',marginBottom:10,fontWeight:700}}>Bugünün Tek Ana Hedefi</div>
                {(D.oneThing?.text)?(
                  <div>
                    <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:20,color:'var(--ink)',lineHeight:1.4,marginBottom:14}}>{D.oneThing.text}</div>
                    <div style={{display:'flex',gap:8}}>
                      <button className="btn btnp btns" onClick={()=>{if(confirm('Bu görevi tamamlandı olarak işaretle?'))setD(prev=>({...prev,oneThing:{text:'',date:null}}));}}>✓ Tamamlandı</button>
                      <button className="btn btns btng" onClick={()=>setD(prev=>({...prev,oneThing:{text:'',date:null}}))}>Değiştir</button>
                    </div>
                  </div>
                ):(
                  <div>
                    <textarea placeholder="Bugünün en kritik, diğer her şeyi kolaylaştıracak tek işini yaz…"
                      rows={3} style={{width:'100%',fontFamily:'var(--fd)',fontStyle:'italic',fontSize:15,padding:'10px 12px',borderRadius:'var(--r)',border:'1px solid var(--bd)',marginBottom:10,resize:'vertical',background:'var(--bg2)'}}
                      id="oneThingInput"/>
                    <button className="btn btnp" onClick={()=>{const el=document.getElementById('oneThingInput');if(el&&el.value.trim())setD(prev=>({...prev,oneThing:{text:el.value.trim(),date:today()}}));}}>Hedefimi Belirle</button>
                  </div>
                )}
              </div>

              {/* Günün 3 İşi */}
              <div style={{marginBottom:18,padding:'18px 20px',background:'var(--sur)',border:'1px solid var(--bd)',borderRadius:'var(--r3)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                  <div>
                    <div className="slbl2" style={{marginBottom:2,display:'flex',alignItems:'center'}}>⚡ Günün 3 İşi <InfoTip text="MIT (Most Important Tasks) sistemi: Her sabah 1 büyük + 2 küçük iş seçin. Sadece bunları tamamlasanız bile günü başarılı saymış olursunuz. CEO'ların %73'ü bu sistemi kullanır." icon="?"/></div>
                    <div style={{fontSize:11.5,color:'var(--ink4)'}}>1 büyük iş + 2 küçük iş. CEO'ların kullandığı sistem.</div>
                  </div>
                  <span className="mono" style={{fontSize:12,color:'var(--ink4)'}}>{(D.top3||[]).filter(t=>t.done).length}/3</span>
                </div>
                {(D.top3||[]).map((t,i)=>(
                  <div key={t.id} style={{display:'flex',gap:9,alignItems:'center',padding:'9px 12px',marginBottom:6,background:t.done?'var(--gnb)':'var(--bg2)',borderRadius:'var(--r)',border:`1px solid ${t.done?'var(--gnbd)':'var(--bd)'}`}}>
                    <input type="checkbox" className="chk" checked={t.done} onChange={()=>setD(prev=>({...prev,top3:(prev.top3||[]).map(x=>x.id===t.id?{...x,done:!x.done}:x)}))}/>
                    <div style={{width:20,height:20,borderRadius:'50%',background:i===0?'var(--ac)':i===1?'var(--bl)':'var(--gn)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,flexShrink:0}}>{i===0?'BÜY':i+1}</div>
                    <span style={{flex:1,fontSize:13,color:t.done?'var(--ink4)':'var(--ink)',textDecoration:t.done?'line-through':'none'}}>{t.text}</span>
                    <button className="ibtn" style={{width:20,height:20,fontSize:10}} onClick={()=>setD(prev=>({...prev,top3:(prev.top3||[]).filter(x=>x.id!==t.id)}))}>×</button>
                  </div>
                ))}
                {(D.top3||[]).length<3&&(
                  <div style={{marginTop:6}}>
                    <input placeholder={`${(D.top3||[]).length===0?'Büyük iş ekle':(D.top3||[]).length===1?'Küçük iş 1':'Küçük iş 2'}…`}
                      style={{width:'100%',fontSize:12.5,padding:'8px 11px',borderRadius:'var(--r)',border:'1px dashed var(--bd)',fontFamily:'var(--ff)',background:'transparent'}}
                      onKeyDown={ev=>{if(ev.key==='Enter'&&ev.target.value.trim()){setD(prev=>({...prev,top3:[...(prev.top3||[]),{id:uid(),text:ev.target.value.trim(),done:false}]}));ev.target.value='';}}}/>
                  </div>
                )}
              </div>

              {/* Pending tasks sorted by priority */}
              <div style={{padding:'16px 18px',background:'var(--sur)',border:'1px solid var(--bd)',borderRadius:'var(--r3)'}}>
                <div className="slbl2" style={{marginBottom:12}}>Tüm Bekleyen Görevler — Öncelik Sırası</div>
                {D.todos.filter(t=>!t.done).sort((a,b)=>PRI_O(a.priority)-PRI_O(b.priority)).slice(0,8).map(t=>(
                  <div key={t.id} style={{display:'flex',gap:8,alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--bg3)'}}>
                    <input type="checkbox" className="chk" checked={false} onChange={()=>togTodo(t.id)}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,color:'var(--ink)',fontWeight:500}}>{t.text}</div>

                    <button className="btn btnxs btng" onClick={()=>{if((D.top3||[]).length<3)setD(prev=>({...prev,top3:[...(prev.top3||[]),{id:uid(),text:t.text,done:false}]}))}}>+ Günün 3'üne ekle</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── NOT-TO-DO sub-tab ── */}
          {todoTab==='nottodo'&&(
            <div>
              <div style={{background:'linear-gradient(135deg,var(--rdb) 0%,var(--sur) 100%)',border:'1px solid var(--rdbd)',borderRadius:'var(--r3)',padding:'20px 22px',marginBottom:16}}>
                <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:16,color:'var(--rd)',marginBottom:4,display:'flex',alignItems:'center',gap:6}}>🚫 Bugün Yapılmayacaklar <InfoTip text="Yapılmayacaklar listesi, dikkat hırsızlarını önceden engelleyen Warren Buffett'ın uyguladığı bir sistemdir. 'Hayır' diyemediklerinizi yazın — göreviniz bunları sıfır yapmak." icon="?"/></div>
                <div style={{fontSize:12.5,color:'var(--ink3)',lineHeight:1.7}}>Odaklanmak, ne yapacağınızı bilmek kadar ne <em>yapmayacağınızı</em> bilmektir. Bu liste dikkat hırsızlarını belgeliyor.</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
                {(D.notToDo||[]).map(item=>(
                  <div key={item.id} style={{display:'flex',gap:10,alignItems:'center',padding:'12px 16px',background:'var(--sur)',border:'1px solid var(--rdbd)',borderLeft:'3px solid var(--rd)',borderRadius:'var(--r2)'}}>
                    <span style={{fontSize:18}}>🚫</span>
                    <span style={{flex:1,fontSize:14,color:'var(--ink2)',fontWeight:500}}>{item.text}</span>
                    <button className="ibtn" onClick={()=>setD(prev=>({...prev,notToDo:(prev.notToDo||[]).filter(x=>x.id!==item.id)}))}>×</button>
                  </div>
                ))}
                {(D.notToDo||[]).length===0&&<div className="card empty"><div className="empty-icon">🚫</div>Liste boş. Dikkat hırsızlarınızı ekleyin.</div>}
              </div>
              <div style={{display:'flex',gap:8,padding:'12px 14px',background:'var(--bg2)',borderRadius:'var(--r2)',border:'1px solid var(--bd)'}}>
                <input id="ntdInput" placeholder="Kaçınılacak davranış, alışkanlık veya aktivite…" style={{flex:1,padding:'8px 11px',fontSize:13,borderRadius:'var(--r)',border:'1px solid var(--bd)',fontFamily:'var(--ff)',background:'var(--sur)'}}
                  onKeyDown={ev=>{if(ev.key==='Enter'&&ev.target.value.trim()){setD(prev=>({...prev,notToDo:[...(prev.notToDo||[]),{id:uid(),text:ev.target.value.trim()}]}));ev.target.value='';}}}/>
                <button className="btn btnp" onClick={()=>{const el=document.getElementById('ntdInput');if(el&&el.value.trim()){setD(prev=>({...prev,notToDo:[...(prev.notToDo||[]),{id:uid(),text:el.value.trim()}]}));el.value=''}}}>+ Ekle</button>
              </div>
            </div>
          )}

          {/* ── TIME BLOCKING sub-tab ── */}
          {todoTab==='timeblock'&&<TimeBlockTab D={D} setD={setD}/>}

          {/* ── WEEKLY REVIEW sub-tab ── */}
          {todoTab==='review'&&(
            <div>
              <div style={{padding:'18px 20px',background:'linear-gradient(135deg,var(--ink) 0%,color-mix(in srgb,var(--ink) 80%,var(--ac)) 100%)',borderRadius:'var(--r4)',color:'#fff',marginBottom:18,display:'flex',gap:18,alignItems:'center'}}>
                <div style={{fontSize:48,opacity:.7}}>📊</div>
                <div>
                  <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:18,marginBottom:4,display:'flex',alignItems:'center',gap:6}}>Haftalık Review <InfoTip text="GTD (Getting Things Done) metodolojisinden: Haftada 1 kez sisteminizi gözden geçirin. Araştırmalar, düzenli haftalık review yapan kişilerin hedeflerine ulaşma oranının %68 daha yüksek olduğunu gösteriyor." icon="?"/></div>
                  <div style={{fontSize:12,opacity:.6}}>Hafta {weekNum()} · {new Date().getFullYear()} · Her cuma beş dakika</div>
                </div>
              </div>

              {/* Stats */}
              <div className="g4" style={{marginBottom:16}}>
                {[
                  {l:'Tamamlanan Görev',v:D.todos.filter(t=>t.done).length,ic:'✓',c:'var(--gn)'},
                  {l:'Gecikmiş',v:overdue,ic:'⚠',c:overdue>0?'var(--rd)':'var(--gn)'},
                  {l:'Alışkanlık %',v:`${Math.round((D.habits||[]).reduce((s,h)=>s+pct(last7().filter(d=>(h.logs||[]).includes(d)).length,7),0)/Math.max(D.habits.length,1))}%`,ic:'🔥',c:'var(--ac)'},
                  {l:'Hedef İlerlemesi',v:`${pct(D.goals.reduce((s,g)=>(s+(g.actionPlan||[]).filter(a=>a.done).length),0),D.goals.reduce((s,g)=>(s+(g.actionPlan||[]).length),0))}%`,ic:'🎯',c:'var(--bl)'},
                ].map(s=>(
                  <div key={s.l} className="card scard">
                    <div style={{fontSize:20,marginBottom:4,opacity:.6}}>{s.ic}</div>
                    <div className="snum" style={{color:s.c}}>{s.v}</div>
                    <div className="slbl">{s.l}</div>
                  </div>
                ))}
              </div>

              {/* Review questions */}
              {[
                {k:'q1',q:'Bu hafta neyi iyi yaptım?',ph:'Başarılarınızı, iyi giden şeyleri yazın…',ic:'✅'},
                {k:'q2',q:'En verimli iş hangisiydi?',ph:'Size en fazla değer katan aktivite neydi?',ic:'⚡'},
                {k:'q3',q:'Hangi iş zaman kaybıydı?',ph:'Gereksiz toplantılar, dikkat dağıtıcılar, verimsiz aktiviteler…',ic:'⏳'},
                {k:'q4',q:'Gelecek haftanın tek hedefi ne?',ph:'The One Thing prensibine göre — bir sonraki haftanın odak noktası…',ic:'🎯'},
              ].map(({k,q,ph,ic})=>(
                <div key={k} style={{marginBottom:12,padding:'14px 16px',background:'var(--sur)',border:'1px solid var(--bd)',borderRadius:'var(--r2)'}}>
                  <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
                    <span style={{fontSize:18}}>{ic}</span>
                    <div style={{fontSize:13.5,fontWeight:600,color:'var(--ink)'}}>{q}</div>
                  </div>
                  <textarea value={(D.weeklyReview||{})[k]||''} placeholder={ph} rows={3}
                    style={{width:'100%',resize:'vertical',padding:'9px 11px',borderRadius:'var(--r)',border:'1px solid var(--bd)',fontFamily:'var(--fd)',fontStyle:'italic',fontSize:13.5,color:'var(--ink2)',background:'var(--bg2)',lineHeight:1.7}}
                    onChange={ev=>setD(prev=>({...prev,weeklyReview:{...(prev.weeklyReview||{}),week:weekNum(),[k]:ev.target.value}}))}/>
                </div>
              ))}
              <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                <button className="btn btns btng" onClick={()=>exportJSON({weeklyReview:D.weeklyReview,week:weekNum()})}>⬇ İndir</button>
                <button className="btn btnp btns" onClick={()=>alert('✅ Haftalık review kaydedildi! Gelecek haftaya kadar görüşürüz.')}>✓ Haftayı Kapat</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ── HABITS ── */
    case 'habits':{
      const l7=last7();const l30=last30();
      return(
        <div className="afu">
          <div className="ph"><div><div className="ptit">Alışkanlıklar</div><div className="psub">Bugünün noktasına tıkla</div></div><button className="btn btnp" onClick={()=>setModal({type:'habit'})}>+ Yeni</button></div>
          <div className="g4" style={{marginBottom:14}}>
            {[
              {l:'Bugün',v:`${todayH}/${D.habits.length}`,c:todayH===D.habits.length?'var(--gn)':'var(--ink)'},
              {l:'Ort. Seri',v:Math.round((D.habits||[]).reduce((s,h)=>s+streak(h.logs),0)/Math.max(D.habits.length,1))+'g',c:'var(--ink)'},
              {l:'En İyi Seri',v:Math.max(0,...(D.habits||[]).map(h=>{let b=0,c=0,p=null;for(const d of [...(h.logs||[])].sort()){if(p){const df=(new Date(d)-new Date(p))/864e5;if(df===1)c++;else c=1;}else c=1;if(c>b)b=c;p=d;}return b;}))+'g',c:'var(--ac)'},
              {l:'Aktif',v:D.habits.length,c:'var(--ink)'},
            ].map(s=><div key={s.l} className="card scard"><div className="snum" style={{color:s.c}}>{s.v}</div><div className="slbl">{s.l}</div></div>)}
          </div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 168px 100px 32px',gap:7,padding:'9px 14px 8px',borderBottom:'1px solid var(--bd)',alignItems:'center',background:'var(--bg2)',borderRadius:'var(--r3) var(--r3) 0 0'}}>
              <div className="slbl2" style={{marginBottom:0}}>Alışkanlık</div>
              <div style={{display:'flex',justifyContent:'space-between'}}>{l7.map((d,i)=><div key={i} className="mono" style={{width:20,textAlign:'center',fontSize:9,color:i===6?'var(--ac)':'var(--ink6)',fontWeight:i===6?700:400,letterSpacing:.3}}>{dayLbl(d)}</div>)}</div>
              <div className="slbl2" style={{marginBottom:0,textAlign:'center'}}>Seri</div>
              <div/>
            </div>
            {D.habits.map(h=>{
              const s=streak(h.logs);const td=today();
              return(
                <div key={h.id} style={{display:'grid',gridTemplateColumns:'1fr 168px 100px 32px',gap:7,padding:'11px 14px',borderBottom:'1px solid var(--bg3)',alignItems:'center',transition:'background .1s'}}
                  onMouseEnter={ev=>ev.currentTarget.style.background='var(--bg2)'}
                  onMouseLeave={ev=>ev.currentTarget.style.background='transparent'}>
                  <div style={{display:'flex',alignItems:'center',gap:9}}><span style={{fontSize:19}}>{h.emoji}</span><div><div style={{fontSize:13,fontWeight:500,color:'var(--ink)'}}>{h.name}</div></div></div>
                  <div style={{display:'flex',gap:3,justifyContent:'space-between'}}>{l7.map((d,i)=>{const done=(h.logs||[]).includes(d),isT=i===6;return <div key={i} className={`hdot${done?' done':''}${isT&&!done?' today':''}`} onClick={isT?()=>togHabit(h.id):undefined} title={d} style={{width:20,height:20,background:done?h.color:undefined}}>{done?'✓':''}</div>;})}</div>
                  <div style={{display:'flex',alignItems:'center',gap:6,justifyContent:'center'}}>{s>0?<span style={{fontSize:12.5,fontWeight:700,color:h.color,fontFamily:'var(--fm)'}}>🔥{s}</span>:<span style={{color:'var(--ink6)',fontSize:12,fontFamily:'var(--fm)'}}>—</span>}<div className="pb" style={{width:50,height:3}}><div className="pf" style={{width:Math.min(s/30*100,100)+'%',background:h.color}}/></div></div>
                  <button className="ibtn" style={{width:24,height:24}} onClick={()=>setD(prev=>({...prev,habits:prev.habits.filter(x=>x.id!==h.id)}))}>×</button>
                </div>
              );
            })}
          </div>
          {/* 30-day heatmap */}
          <div className="card cp">
            <div className="slbl2">30 Günlük Isı Haritası</div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {D.habits.slice(0,3).map(h=>(
                <div key={h.id} style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:13,width:20,textAlign:'center'}}>{h.emoji}</span>
                  <div style={{display:'flex',gap:2,flex:1,flexWrap:'nowrap',overflow:'hidden'}}>
                    {l30.map((d,i)=>{const done=(h.logs||[]).includes(d);return <div key={i} className="heat-cell" title={d} style={{background:done?h.color:'var(--bg3)',opacity:done?.9:.4}}/>;})}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ── KANBAN ── */
    case 'kanban':{
      const COLS=[['todo','Yapılacak','var(--ink5)'],['inprogress','Devam ediyor','var(--ac)'],['review','İnceleme','var(--bl)'],['done','Tamamlandı','var(--gn)']];
      return(
        <div className="afu">
          <div className="ph"><div><div className="ptit">Kanban Tahtası</div></div><button className="btn btnp" onClick={()=>setModal({type:'kanban'})}>+ Kart</button></div>
          <div className="g4">
            {COLS.map(([cid,clbl,cc])=>(
              <div key={cid} className={`kcol${dragOver===cid?' drag-over':''}`}
                onDragOver={ev=>{ev.preventDefault();setDragOver(cid);}}
                onDragLeave={()=>setDragOver(null)}
                onDrop={()=>{const{item,col}=dragItem.current||{};if(!item||col===cid)return;const next={...D,kanban:{...D.kanban}};next.kanban[col]=(next.kanban[col]||[]).filter(i=>i.id!==item.id);next.kanban[cid]=[item,...(next.kanban[cid]||[])];upd(next,'Kart taşındı');dragItem.current=null;setDragOver(null);}}>
                <div className="kchd">
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <div style={{width:7,height:7,borderRadius:'50%',background:cc}}/>
                    <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:cc,fontFamily:'var(--fm)'}}>{clbl}</span>
                  </div>
                  <span className="mono" style={{fontSize:10,background:'var(--bg3)',padding:'1px 6px',borderRadius:20,color:'var(--ink5)'}}>{(D.kanban[cid]||[]).length}</span>
                </div>
                {(D.kanban[cid]||[]).map(c=>(
                  <div key={c.id} className="kcard" draggable onDragStart={()=>{dragItem.current={item:c,col:cid};}} style={{borderLeft:`3px solid ${(PRI_CFG[c.priority]||{color:'var(--bd)'}).color}`}}>
                    <div style={{fontSize:13,fontWeight:500,marginBottom:7,lineHeight:1.4,color:'var(--ink)'}}>{c.text}</div>
                    <div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:6}}>{(c.tags||[]).map(tg=><span key={tg} className="tag" style={{fontSize:9.5}}>{tg}</span>)}</div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <PriFlag p={c.priority} size="xs"/>
                      <button className="ibtn" style={{width:20,height:20,fontSize:10}} onClick={()=>{const next={...D,kanban:{...D.kanban}};next.kanban[cid]=(next.kanban[cid]||[]).filter(i=>i.id!==c.id);setD(next);}}>×</button>
                    </div>
                  </div>
                ))}
                {(D.kanban[cid]||[]).length===0&&<div style={{textAlign:'center',padding:'20px 0',color:'var(--ink6)',fontSize:12,fontStyle:'italic'}}>Boş</div>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── BOOKS ── */
    case 'books':{
      const books=fl(D.books,['title','author','notes']);
      const filtered=books.filter(b=>fSt==='Tümü'||b.status===fSt);
      return(
        <div className="afu">
          <div className="ph"><div><div className="ptit">Okuma Listesi</div><div className="psub">{D.books.filter(b=>b.status==='Okunuyor').length} okunuyor</div></div><button className="btn btnp" onClick={()=>setModal({type:'book'})}>+ Kitap</button></div>
          <div className="fbar">{['Tümü',...BOOK_ST].map(f=><button key={f} className={`chip${fSt===f?' on':''}`} onClick={()=>setFSt(f)}>{f}</button>)}</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {filtered.map(b=>{const p=b.pagesTotal?pct(b.pagesDone,b.pagesTotal):0;return(
              <div key={b.id} className="card ch" style={{padding:'15px 18px'}} onClick={()=>setDetail({type:'book',item:b})}>
                <div style={{display:'flex',gap:13,alignItems:'flex-start'}}>
                  <div className="book-spine" style={{background:b.color||'var(--ac)',minHeight:72}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}}>
                      <div>
                        <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontWeight:400,fontSize:15.5,marginBottom:1,color:'var(--ink)'}}>{b.title}</div>
                        <div style={{fontSize:12,color:'var(--ink4)'}}>— {b.author}</div>
                      </div>
                      <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0,marginLeft:10}}>
                        <select value={b.status} style={{width:'auto',fontSize:11.5,padding:'3px 8px',borderRadius:20}} onClick={ev=>ev.stopPropagation()} onChange={ev=>{ev.stopPropagation();setD(prev=>({...prev,books:prev.books.map(x=>x.id===b.id?{...x,status:ev.target.value}:x)}))}}>
                          {BOOK_ST.map(s=><option key={s}>{s}</option>)}
                        </select>
                        <button className="ibtn" onClick={ev=>{ev.stopPropagation();delItem(b,'books');}}>×</button>
                      </div>
                    </div>
                    {b.pagesTotal>0&&(
                      <div style={{marginBottom:5}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                          <span className="mono" style={{fontSize:11,color:'var(--ink4)'}}>{b.pagesDone}/{b.pagesTotal} sayfa</span>
                          <span className="mono" style={{fontSize:11,color:b.color||'var(--ac)',fontWeight:700}}>{p}%</span>
                        </div>
                        <div className="pb" style={{height:4}}><div className="pf" style={{width:p+'%',background:b.color||'var(--ac)'}}/></div>
                      </div>
                    )}
                    {b.status==='Bitti'&&b.rating&&<span style={{color:b.color||'var(--ac)',fontSize:14}}>{'\u2605'.repeat(b.rating)+'\u2606'.repeat(5-b.rating)}</span>}
                  </div>
                </div>
              </div>
            );})}
          </div>
        </div>
      );
    }

    /* ── JOURNAL ── */
    case 'journal':{
      const entries=fl(D.journal,['content','category']);
      const cats=['Tümü',...new Set((D.journal||[]).map(j=>j.category))];
      return(
        <div className="afu">
          <div className="ph"><div><div className="ptit">Journal</div><div className="psub">{D.journal.length} giriş</div></div><button className="btn btnp" onClick={()=>setModal({type:'journal'})}>+ Yeni</button></div>
          <div className="fbar">{cats.map(c=><button key={c} className={`chip${fCat===c?' on':''}`} onClick={()=>setFCat(c)}>{c}</button>)}</div>
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            {entries.filter(e=>fCat==='Tümü'||e.category===fCat).map(e=>(
              <div key={e.id} className="card ch" style={{padding:'15px 18px'}} onClick={()=>setDetail({type:'journal',item:e})}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:9}}>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    <span style={{fontSize:22}}>{MOODS[e.mood]||'😐'}</span>
                    <div>
                      <span className="tag" style={{marginRight:5}}>{e.category}</span>
                      <span style={{fontSize:11.5,color:'var(--ink3)'}}>{MOOD_L[e.mood]}</span>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    <span className="mono" style={{fontSize:11,color:'var(--ink5)'}}>{e.date}</span>
                    {e.wc>0&&<span className="mono" style={{fontSize:10,color:'var(--ink6)',padding:'1px 6px',background:'var(--bg2)',borderRadius:4}}>{e.wc}w</span>}
                    <button className="ibtn" onClick={ev=>{ev.stopPropagation();delItem(e,'journal');}}>×</button>
                  </div>
                </div>
                <div style={{fontSize:13.5,color:'var(--ink)',lineHeight:1.8,display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden',fontFamily:'var(--fd)',fontStyle:'italic'}} dangerouslySetInnerHTML={{__html:e.content}}/>
              </div>
            ))}
          </div>
        </div>
      );
    }

    case 'notes': return <NotesPage/>;
    case 'calendar': return <CalPage D={D} setD={setD} setDetail={setDetail} setModal={setModal} calView={calView} setCalView={setCalView} calDate={calDate} setCalDate={setCalDate}/>;

    /* ── QUOTES ── */
    case 'quotes':{
      const quotes=fl(D.quotes,['text','author','category']);
      return(
        <div className="afu">
          <div className="ph"><div><div className="ptit">Alıntılar</div></div><div style={{display:'flex',gap:7}}><button className="btn btnp btns" onClick={()=>setModal({type:'quote'})}>+ Ekle</button></div></div>
          <div className="g3">
            {quotes.map(q=>(
              <div key={q.id} className="q-card" style={{background:q.bg||'#18160F',color:q.fg||'#F0EDE4'}}>
                <div>
                  <div className="mono" style={{fontSize:9,letterSpacing:2,opacity:.4,marginBottom:10,textTransform:'uppercase'}}>{q.category}</div>
                  <p style={{fontFamily:'Instrument Serif',fontStyle:'italic',fontSize:14,lineHeight:1.85}}>{q.text}</p>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:14}}>
                  <span style={{fontSize:11,opacity:.5}}>— {q.author}</span>
                  <div style={{display:'flex',gap:4}}>
                    <button onClick={()=>setPrintQ(q)} style={{width:24,height:24,borderRadius:5,border:'none',background:'rgba(255,255,255,.12)',color:'inherit',cursor:'pointer',fontSize:11,transition:'background .15s'}} onMouseEnter={ev=>ev.currentTarget.style.background='rgba(255,255,255,.22)'} onMouseLeave={ev=>ev.currentTarget.style.background='rgba(255,255,255,.12)'}>🖼</button>
                    <button onClick={()=>delItem(q,'quotes')} style={{width:24,height:24,borderRadius:5,border:'none',background:'rgba(255,255,255,.12)',color:'inherit',cursor:'pointer',fontSize:11,transition:'background .15s'}} onMouseEnter={ev=>ev.currentTarget.style.background='rgba(255,255,255,.22)'} onMouseLeave={ev=>ev.currentTarget.style.background='rgba(255,255,255,.12)'}>×</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── ROUTINES ── */
    case 'routines':{
      const PICS={daily:'☀️',weekly:'📅',monthly:'🗓️',quarterly:'🔭'};

            {Object.entries(D.routines||{}).map(([p,items])=>{const done=(items||[]).filter(i=>!routineActive(p,i.lastDone)).length;const pc=pct(done,items.length);return(<div key={p} className="card scard"><div style={{fontSize:18,marginBottom:3}}>{PICS[p]}</div><div className="snum" style={{color:pc===100?'var(--gn)':pc>0?'var(--ac)':'var(--ink)'}}>{done}/{items.length}</div><div className="slbl">{PLBLS[p]}</div></div>);})}

                          {!active&&<span style={{fontSize:9.5,color:'var(--gn)',fontFamily:'var(--fm)'}}>✓ tamamlandı</span>}

    /* ── COACHING ── */

          ]},
          {type:'tip',text:'💡 Bağlam Verin: "Pazartesi koçluk seansı" gibi açılış yapın. Koç zaten verilerinizi biliyor ama ne hissettiğinizi siz söylemelisiniz.'},
        ]},
        {id:'shortcuts',ic:'⌨',title:'Kısayollar & İpuçları',color:'var(--tl)',content:[

            {k:'× Butonu',d:'Öğeyi sil (onay sorulur)'},
            {k:'⠿ Sürükle',d:'Görev listesinde sırayı değiştir'},
            {k:'▾ Ok',d:'Görev kartını genişlet / daralt'},
            {k:'Enter',d:'Yeni alt adım / bağlantı / alt görev ekle'},

          {type:'tip',text:'💡 Altın Kural: Her Cuma 10 dakika Haftalık Review yapın, her Pazartesi 5 dakika haftalık planı kurun. Bu 15 dakika haftanızı dönüştürür.'},

      const[activeSection,setActiveSection]=React.useState('overview');
      const sec=sections.find(s=>s.id===activeSection)||sections[0];
      return(
        <div className="afu" style={{padding:0}}>
          <div className="ph" style={{padding:'14px 22px',marginBottom:0,borderBottom:'1px solid var(--bd)'}}>

                    cursor:'pointer',fontFamily:'var(--ff)',fontSize:12.5,
                    fontWeight:activeSection===s.id?600:400,
                    color:activeSection===s.id?s.color:'var(--ink3)',
                    borderLeft:`3px solid ${activeSection===s.id?s.color:'transparent'}`,
                    transition:'all .12s',textAlign:'left'}}>
                  <span style={{fontSize:15}}>{s.ic}</span>
                  <span>{s.title}</span>
                </button>
              ))}
            </div>
            {/* Content */}
            <div style={{overflowY:'auto',padding:'28px 32px'}}>
              <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:24,paddingBottom:16,borderBottom:'2px solid var(--bd)'}}>
                <span style={{fontSize:30}}>{sec.ic}</span>
                <div>
                  <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:22,color:'var(--ink)'}}>{sec.title}</div>
                  <div style={{fontSize:10.5,color:sec.color,fontFamily:'var(--fm)',letterSpacing:.8,marginTop:3,fontWeight:700}}>KULLANIM REHBERİ</div>
                </div>
              </div>
              {sec.content.map((block,bi)=>{
                if(block.type==='intro')return(
                  <div key={bi} style={{padding:'14px 18px',background:'var(--acb)',border:'1px solid var(--acbd)',borderRadius:'var(--r2)',marginBottom:20,fontSize:13.5,color:'var(--ink2)',lineHeight:1.9}}>{block.text}</div>
                );
                if(block.type==='arch')return(
                  <div key={bi} style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:10,marginBottom:20}}>
