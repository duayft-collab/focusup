<!DOCTYPE html>
<!--
  Strategy Hub — index.html
  Giriş noktası. Bu dosya yalnızca shell'i yükler.
  İş mantığı, sayfa içerikleri ve modüller ayrı dosyalarda.
  Anayasa: K01 (Dosya Mimarisi), K08 (Tek Sorumluluk)
  Versiyon: 5.1.0 | 2026-03-26
-->
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Stratejik Karar Destek Platformu — Canlı piyasa, lojistik, gayrimenkul ve kişisel gelişim.">
  <meta property="og:title" content="Strategy Hub v5.1 — Master Control">
  <meta property="og:description" content="Küresel ticaret ve kişisel hedefleri tek panelden yönet.">
  <meta name="theme-color" content="#2563eb">
  <title>Strategy Hub v5.1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <!-- .nojekyll GitHub Pages için gerekli (docs/ klasöründe) -->
</head>
<body>
<div class="hub">

  <!-- ── SIDEBAR ─────────────────────────────────────────────────────── -->
  <aside class="sb" id="sidebar">
    <div class="sb-logo">
      <div class="dot" aria-hidden="true">S</div>
      <span>STRATEGY</span>
    </div>
    <nav class="nb" aria-label="Ana menü">
      <div class="nl">Ana Menü</div>
      <button class="ni active" data-tab="dashboard" aria-current="page">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="ni-label">Genel Bakış</span>
      </button>
      <button class="ni" data-tab="world">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span class="ni-label">Dünya Ekonomisi</span>
      </button>
      <button class="ni" data-tab="logistics">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3M18 8h3l3 4v5h-6V8zM15 18a2 2 0 1 0 4 0M5 18a2 2 0 1 0 4 0"/></svg>
        <span class="ni-label">Navlun &amp; Lojistik</span>
      </button>
      <button class="ni" data-tab="weather">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></svg>
        <span class="ni-label">Hava &amp; Haberler</span>
      </button>
      <button class="ni" data-tab="realestate">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="ni-label">Gayrimenkul</span>
      </button>
      <button class="ni" data-tab="export">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="ni-label">İhracat &amp; Ticaret</span>
      </button>
      <button class="ni" data-tab="bizdev">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        <span class="ni-label">İş Geliştirme</span>
      </button>
      <div class="nl">Kişisel</div>
      <button class="ni" data-tab="growth">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        <span class="ni-label">Kişisel Gelişim</span>
      </button>
      <button class="ni" data-tab="kids">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="ni-label">Çocuk Gelişimi</span>
      </button>
      <div class="nl">Sistem</div>
      <button class="ni" data-tab="anayasa">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span class="ni-label">Anayasa v3.0</span>
      </button>
    </nav>
    <div class="sf">
      <div class="sn">
        <strong>&#9889; Akıllı Not</strong>
        Navlun trendi yükselişte. İhracat planlarınızı revize edin.
      </div>
    </div>
  </aside>

  <!-- ── MAIN ──────────────────────────────────────────────────────────── -->
  <main class="mn" id="main-content">
    <header class="hd">
      <div class="hd-left">
        <div class="eyebrow">Master Control</div>
        <h1 id="page-title">Genel Bakış</h1>
      </div>
      <div class="hd-right">
        <div class="live-badge" role="status" aria-label="Canlı veri durumu">
          <span class="ld" aria-hidden="true"></span>
          <span id="clock" aria-live="off"></span>
        </div>
        <div class="ts" id="theme-switcher" role="group" aria-label="Tema seçimi">
          <button class="tb2 act" data-theme="">Zen</button>
          <button class="tb2" data-theme="dark">Dark</button>
          <button class="tb2" data-theme="glass">Glass</button>
          <button class="tb2" data-theme="swiss">Swiss</button>
          <button class="tb2" data-theme="arctic">Arctic</button>
        </div>
      </div>
    </header>

    <!-- Hybrid router buradaki div'e fetch ile sayfa içeriklerini yazar -->
    <div id="page-outlet" role="region" aria-label="Sayfa içeriği" tabindex="-1">
      <!-- İlk yükleme skeleton'ı -->
      <div class="skeleton-wrap" aria-busy="true">
        <div class="skeleton-hero"></div>
        <div class="skeleton-row">
          <div class="skeleton-card"></div><div class="skeleton-card"></div>
          <div class="skeleton-card"></div><div class="skeleton-card"></div>
        </div>
      </div>
    </div>
  </main>

</div>

<!-- ── APP BOOTSTRAP ─────────────────────────────────────────────────── -->
<script type="module">
  import { UI }        from './src/core/ui.js';
  import { HubRouter } from './src/core/router.js';
  import { FXModule }  from './src/modules/fx.module.js';

  UI.initTheme();
  UI.initClock();
  HubRouter.init();

  // FX modülü tüm uygulama boyunca çalışır — router tarafından resetlenmez
  FXModule.init();
</script>
</body>
</html>
