<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FocusUp Pro v6</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Cabinet+Grotesk:wght@300;400;500;600;700;800&family=Commit+Mono:ital,wght@0,100;0,400;1,100&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ff:'Cabinet Grotesk',sans-serif;
  --fd:'Instrument Serif',serif;
  --fm:'Commit Mono',monospace;

  /* Light — warm ivory system */
  --bg:#F5F2EC;
  --bg2:#EDEAE2;
  --bg3:#E3DFD5;
  --sur:#FDFCF9;
  --sur2:#F7F5F0;
  --bd:#DDD8CE;
  --bd2:#CCC6BA;

  --ink:#18160F;
  --ink2:#2E2C22;
  --ink3:#5C5848;
  --ink4:#8C8674;
  --ink5:#B8B2A4;
  --ink6:#D6D1C6;

  /* Accent — deep amber/cognac */
  --ac:#B8621A;
  --ac2:#D4782A;
  --ac3:#E89050;
  --acb:#FBF2E8;
  --acbd:#F0C898;
  --actext:#7A3E0A;

  /* Status */
  --gn:#1F6B42;--gnb:#EAF5EF;--gnbd:#8ECFAC;
  --rd:#B52B1E;--rdb:#FBF0EE;--rdbd:#EDA89F;
  --bl:#1A52B8;--blb:#EEF3FB;--blbd:#98B8EE;
  --pu:#6B28C8;--pub:#F2EDFB;--pubd:#C0A0EE;
  --tl:#0F6B6B;--tlb:#E8F5F5;--tlbd:#7EC8C8;

  /* Shadows */
  --sh:0 1px 2px rgba(24,22,15,.05),0 2px 8px rgba(24,22,15,.04);
  --shm:0 2px 12px rgba(24,22,15,.08),0 8px 24px rgba(24,22,15,.06);
  --shl:0 8px 32px rgba(24,22,15,.12),0 24px 64px rgba(24,22,15,.08);
  --shxl:0 16px 64px rgba(24,22,15,.16),0 40px 100px rgba(24,22,15,.1);

  /* Radius */
  --r:6px;--r2:10px;--r3:14px;--r4:20px;

  /* Layout */
  --sw:230px;--th:54px;

  /* Grain */
  --grain:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
}

[data-dark]{
  --bg:#111009;--bg2:#181610;--bg3:#201E16;
  --sur:#1C1A12;--sur2:#22201A;
  --bd:#2A281E;--bd2:#343028;
  --ink:#F0EDE4;--ink2:#C8C4B6;--ink3:#8A8474;--ink4:#5C5848;--ink5:#3A3828;--ink6:#242018;
  --ac:#D4782A;--ac2:#E89050;--ac3:#F4A86A;--acb:#28200C;--acbd:#5A3C14;--actext:#F0C898;
  --gn:#28A060;--gnb:#0C1E10;--gnbd:#1A4828;
  --rd:#D84030;--rdb:#1E0C0A;--rdbd:#4A1814;
  --bl:#4A7EE8;--blb:#0C1428;--blbd:#1C3060;
  --pu:#9060E0;--pub:#140A28;--pubd:#341860;
  --tl:#18A0A0;--tlb:#081818;--tlbd:#183838;
  --sh:0 1px 2px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.2);
  --shm:0 2px 12px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
  --shl:0 8px 32px rgba(0,0,0,.5),0 24px 64px rgba(0,0,0,.4);
}

html,body{height:100%;overflow:hidden}
body{
  font-family:var(--ff);background:var(--bg);color:var(--ink);
  font-size:13.5px;line-height:1.6;-webkit-font-smoothing:antialiased;
  transition:background .3s,color .3s;
}

/* Grain removed for cleaner look */

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
::-webkit-scrollbar-track{background:transparent}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes blink{0%,80%,100%{opacity:.12}40%{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes progressFill{from{width:0}to{width:var(--w)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes tickerScroll{0%{opacity:0;transform:translateY(6px)}10%,90%{opacity:1;transform:none}100%{opacity:0;transform:translateY(-6px)}}

.afu{animation:fadeUp .25s cubic-bezier(.22,1,.36,1)}
.afi{animation:fadeIn .2s ease}
.asi{animation:slideIn .25s cubic-bezier(.22,1,.36,1)}
.asi2{animation:scaleIn .2s cubic-bezier(.22,1,.36,1)}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{
  width:var(--sw);min-width:var(--sw);
  background:var(--sur);
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:background .3s,border-color .3s;
}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Topbar ── */
.topbar{
  height:var(--th);min-height:var(--th);
  background:var(--sur);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;
  transition:background .3s,border-color .3s;
}

.content{flex:1;overflow-y:auto;padding:24px 28px 40px}

/* ── Logo ── */
.logo{
  padding:18px 16px 16px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:10px;
}
.lmark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:0 2px 10px rgba(184,98,26,.3),inset 0 1px 0 rgba(255,255,255,.2);
}
.lname{font-family:var(--fd);font-weight:400;font-style:italic;font-size:15px;color:var(--ink);letter-spacing:-.1px;line-height:1}
.lver{font-size:9px;color:var(--ink5);font-family:var(--fm);letter-spacing:1px;margin-top:2px}

/* ── Nav ── */
.sbody{flex:1;overflow-y:auto;padding:8px 8px 6px}
.nsec{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--ink6);padding:14px 8px 4px;font-family:var(--fm);
}
.ni{
  display:flex;align-items:center;gap:8px;padding:7px 9px;
  border-radius:var(--r);cursor:pointer;font-size:12.5px;color:var(--ink4);
  transition:all .15s;border:none;background:none;width:100%;text-align:left;
  font-family:var(--ff);font-weight:500;
}
.ni:hover{background:var(--bg2);color:var(--ink2)}
.ni.on{
  background:var(--acb);
  color:var(--ac);font-weight:600;
}
.ni.on::after{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2.5px;height:60%;background:var(--ac);border-radius:0 2px 2px 0;position:relative;display:none}
.ni-ic{font-size:13px;width:16px;text-align:center;flex-shrink:0;opacity:.7}
.ni.on .ni-ic{opacity:1}
.ni-bd{margin-left:auto;background:var(--rd);color:#fff;font-size:8.5px;font-weight:700;padding:1px 5px;border-radius:20px;font-family:var(--fm);min-width:16px;text-align:center}
.ni-soft{margin-left:auto;background:var(--bg3);color:var(--ink5);font-size:9px;font-family:var(--fm);padding:1px 5px;border-radius:20px}

/* ── Sidebar Footer ── */
.sfoot{padding:8px 8px 12px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:3px}
.sfrow{display:flex;gap:4px}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:5px;padding:6.5px 13px;
  border-radius:var(--r);border:1px solid var(--bd);background:var(--sur);color:var(--ink2);
  font-family:var(--ff);font-size:12.5px;font-weight:500;cursor:pointer;
  transition:all .15s;white-space:nowrap;line-height:1.4;
  box-shadow:0 1px 2px rgba(24,22,15,.04);
}
.btn:hover{background:var(--bg3);border-color:var(--bd2);box-shadow:var(--sh)}
.btn:active{box-shadow:none}
.btn:disabled{opacity:.4;cursor:not-allowed}

.btnp{
  background:var(--ac);color:#fff;border-color:var(--ac);
  box-shadow:0 1px 4px rgba(184,98,26,.3),inset 0 1px 0 rgba(255,255,255,.15);
}
.btnp:hover{background:var(--ac2);border-color:var(--ac2);box-shadow:0 2px 8px rgba(184,98,26,.35)}

.btns{padding:5px 10px;font-size:11.5px}
.btnxs{padding:2px 7px;font-size:11px;border-radius:4px}
.btng{background:transparent;border-color:transparent;color:var(--ink4);box-shadow:none}
.btng:hover{background:var(--bg3);border-color:var(--bd);color:var(--ink);box-shadow:none;transform:none}
.btnd{color:var(--rd);border-color:var(--rdbd);background:var(--rdb)}
.btnd:hover{background:var(--rd);color:#fff;border-color:var(--rd)}

.ibtn{
  width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r);border:1px solid var(--bd);background:var(--sur);cursor:pointer;
  color:var(--ink4);font-size:12px;transition:all .15s;flex-shrink:0;
}
.ibtn:hover{background:var(--bg3);color:var(--ink);border-color:var(--bd2)}

/* ── Cards ── */
.card{
  background:var(--sur);border:1px solid var(--bd);
  border-radius:var(--r3);
  box-shadow:var(--sh);
  transition:background .3s,border-color .3s,box-shadow .2s;
}
.cp{padding:16px 18px}
.ch{cursor:pointer}
.ch:hover{border-color:var(--bd2);box-shadow:var(--shm)}

/* Stat card */
.scard{padding:16px 18px}
.snum{font-family:var(--fd);font-size:28px;line-height:1;font-style:italic;margin-bottom:2px}
.slbl{font-size:9.5px;color:var(--ink4);font-weight:600;text-transform:uppercase;letter-spacing:1px;font-family:var(--fm);margin-top:4px}
.sdesc{font-size:11px;color:var(--ink5);margin-top:2px}

/* ── Tags ── */
.tag{
  display:inline-flex;align-items:center;gap:3px;padding:2px 7px;
  border-radius:20px;font-size:10.5px;font-weight:500;
  background:var(--bg3);color:var(--ink4);border:1px solid var(--bd);
}
.tg{background:var(--gnb);color:var(--gn);border-color:var(--gnbd)}
.tr{background:var(--rdb);color:var(--rd);border-color:var(--rdbd)}
.ta{background:var(--acb);color:var(--ac);border-color:var(--acbd)}
.tb{background:var(--blb);color:var(--bl);border-color:var(--blbd)}
.tp{background:var(--pub);color:var(--pu);border-color:var(--pubd)}
.tt{background:var(--tlb);color:var(--tl);border-color:var(--tlbd)}

/* ── Form ── */
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:13px}
.field label{font-size:10px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:1px;font-family:var(--fm)}
input,textarea,select{
  background:var(--bg2);border:1px solid var(--bd);color:var(--ink);
  font-family:var(--ff);border-radius:var(--r);padding:7.5px 11px;
  font-size:13px;outline:none;width:100%;
  transition:border-color .15s,background .15s,box-shadow .15s;
  -webkit-appearance:none;
}
input:focus,textarea:focus,select:focus{
  border-color:var(--ac);background:var(--sur);
  box-shadow:0 0 0 3px rgba(184,98,26,.1);
}
input::placeholder,textarea::placeholder{color:var(--ink5)}
select option{background:var(--sur)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.chk{
  width:15px;height:15px;border-radius:3px;
  border:1.5px solid var(--bd2);background:var(--sur);cursor:pointer;
  appearance:none;flex-shrink:0;position:relative;transition:all .12s;margin-top:1px;
}
.chk:checked{background:var(--ac);border-color:var(--ac)}
.chk:checked::after{content:'✓';position:absolute;color:#fff;font-size:9px;font-weight:700;top:50%;left:50%;transform:translate(-50%,-50%)}

/* ── Progress Bar ── */
.pb{height:4px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.22,1,.36,1)}

/* ── Modal ── */
.backdrop{
  position:fixed;inset:0;background:rgba(24,22,15,.45);z-index:300;
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(8px);animation:fadeIn .15s ease;
}
.modal{
  background:var(--sur);border:1px solid var(--bd);border-radius:var(--r4);
  width:100%;max-width:520px;box-shadow:var(--shl);
  max-height:90vh;display:flex;flex-direction:column;
  animation:scaleIn .2s cubic-bezier(.22,1,.36,1);
}
.mlg{max-width:660px}
.mhd{
  padding:18px 20px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.mtit{font-family:var(--fd);font-style:italic;font-size:16px;color:var(--ink)}
.mbd{padding:20px;overflow-y:auto;flex:1}
.mft{padding:13px 20px;border-top:1px solid var(--bd);display:flex;gap:7px;justify-content:flex-end;flex-shrink:0}

/* ── Detail Drawer ── */
.dover{position:fixed;inset:0;z-index:200;display:flex}
.dbg{flex:1;background:rgba(24,22,15,.2);backdrop-filter:blur(3px)}
.dpan{
  width:440px;background:var(--sur);border-left:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;
  animation:slideIn .25s cubic-bezier(.22,1,.36,1);
  box-shadow:var(--shl);
}
.dhd{
  padding:18px 20px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.dpan-body{flex:1;overflow-y:auto;padding:18px 20px}

/* ── Page headers ── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:10px}
.ptit{font-family:var(--fd);font-size:24px;font-weight:400;font-style:italic;color:var(--ink);line-height:1.15;letter-spacing:-.3px}
.psub{font-size:11.5px;color:var(--ink4);margin-top:3px;font-family:var(--fm)}

/* ── Grids ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}

/* ── Filter bar ── */
.fbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.chip{
  padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;
  border:1px solid var(--bd);background:var(--sur);cursor:pointer;
  transition:all .12s;color:var(--ink4);font-family:var(--ff);
}
.chip:hover{border-color:var(--bd2);color:var(--ink);background:var(--bg2)}
.chip.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.clbl{font-size:10px;color:var(--ink5);font-family:var(--fm);letter-spacing:.5px}
.slbl2{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink5);margin-bottom:9px;font-family:var(--fm)}

/* ── Divider ── */
.div{height:1px;background:var(--bd);margin:16px 0}

/* ── Empty ── */
.empty{padding:40px;text-align:center;color:var(--ink4);font-size:13px}
.empty-icon{font-size:32px;opacity:.3;margin-bottom:8px}

/* ── Mono / Serif ── */
.mono{font-family:var(--fm)}
.serif{font-family:var(--fd);font-style:italic}

/* ── Table ── */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 13px;font-size:9px;font-weight:700;color:var(--ink5);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--bd);font-family:var(--fm)}
td{padding:10px 13px;border-bottom:1px solid var(--bg3);font-size:13px;vertical-align:middle}
tr:last-child td{border:none}
tbody tr{transition:background .1s}
tbody tr:hover td{background:var(--bg2)}

/* ── Priority flags ── */
.flag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10.5px;font-weight:600;border:1px solid}
.flag-red{background:var(--rdb);color:var(--rd);border-color:var(--rdbd)}
.flag-orange{background:var(--acb);color:var(--ac);border-color:var(--acbd)}
.flag-blue{background:var(--blb);color:var(--bl);border-color:var(--blbd)}
.flag-gray{background:var(--bg3);color:var(--ink4);border-color:var(--bd)}

/* ── Timeline ── */
.tl-wrap{position:relative;padding-left:26px}
.tl-wrap::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:1.5px;background:linear-gradient(180deg,var(--ac),var(--bd))}
.tl-dot{position:absolute;left:0;width:18px;height:18px;border-radius:50%;background:var(--ac);border:2.5px solid var(--sur);box-shadow:0 0 0 1px var(--ac);z-index:1;top:4px;transition:all .2s}
.tl-dot.done{background:var(--gn);box-shadow:0 0 0 1px var(--gn)}

/* ── Recurrence ── */
.rec-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:20px;font-size:9.5px;font-family:var(--fm);background:var(--pub);color:var(--pu);border:1px solid var(--pubd)}

/* ── Assignee ── */
.assignee-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:10.5px;background:var(--blb);color:var(--bl);border:1px solid var(--blbd)}

/* ── Kanban ── */
.kcol{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r3);padding:12px;min-height:200px}
.kchd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--bd)}
.kcard{
  background:var(--sur);border:1px solid var(--bd);border-radius:var(--r2);
  padding:11px 12px;margin-bottom:6px;cursor:grab;
  transition:all .15s;box-shadow:var(--sh);
}
.kcard:hover{box-shadow:var(--shm);border-color:var(--bd2)}
.kcard:active{cursor:grabbing;transform:rotate(.5deg)}
.kcol.drag-over{border-color:var(--ac);background:var(--acb)}

/* ── Rich editor ── */
.ewrap{border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;background:var(--sur)}
.etbar{display:flex;align-items:center;gap:1px;padding:6px 10px;border-bottom:1px solid var(--bd);background:var(--bg2);flex-wrap:wrap}
.etbtn{padding:4px 7px;border-radius:4px;border:none;background:transparent;color:var(--ink3);cursor:pointer;font-size:12px;font-weight:600;transition:all .1s;font-family:var(--ff)}
.etbtn:hover{background:var(--bg3);color:var(--ink)}
.etsep{width:1px;height:16px;background:var(--bd);margin:0 3px;flex-shrink:0}
.ebody{overflow-y:auto;max-height:440px}
.ebody [contenteditable]{font-family:var(--fd);font-size:15px;font-style:italic;line-height:1.9;color:var(--ink);outline:none;min-height:280px;padding:22px 26px}
.ebody [contenteditable]:empty::before{content:attr(data-ph);color:var(--ink5);pointer-events:none}
.ewc{padding:5px 10px;font-size:9.5px;color:var(--ink5);font-family:var(--fm);background:var(--bg2);border-top:1px solid var(--bd);text-align:right;letter-spacing:.3px}

/* ── Todo item ── */
.todo-item{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r3);box-shadow:var(--sh);transition:all .15s}
.todo-item:hover .todo-hover-show{opacity:1}
.todo-hover-show{opacity:0;transition:opacity .15s}

/* ── Habit grid ── */
.hdot{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:var(--bg3);color:var(--ink5);transition:all .2s;flex-shrink:0}
.hdot.done{color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}

/* ── Favicon component ── */
function Fav({url,title,size=18}){
  const [err,setErr]=useState(false);
  const init=(title||'?').slice(0,2).toUpperCase();
  let furl=null;
  try{const h=new URL(url.startsWith('http')?url:'https://'+url).hostname;furl=`https://www.google.com/s2/favicons?domain=${h}&sz=32`;}catch{}
  if(err||!furl)return <div style={{width:size,height:size,borderRadius:4,background:'var(--ac)',color:'#fff',fontSize:size*.4,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,flexShrink:0}}>{init}</div>;
  return <img src={furl} alt="" style={{width:size,height:size,borderRadius:4,flexShrink:0}} onError={()=>setErr(true)}/>;
}

/* ── Progress Ring ── */
function Ring({size=80,stroke=6,pct,color='var(--ac)',bg='var(--bg3)',children}){
  const r=size/2-stroke;
  const circ=2*Math.PI*r;
  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bg} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={String(circ)} strokeDashoffset={String(circ*(1-pct/100))}
          strokeLinecap="round" className="pom-ring"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>{children}</div>
    </div>
  );
}

/* ── Mini sparkline ── */
function Sparkline({data,color='var(--ac)',height=32,width=120}){
  if(!data||data.length<2)return null;
  const max=Math.max(...data,1);
  const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-(v/max)*height}`).join(' ');
  return(
    <svg width={width} height={height} style={{overflow:'visible'}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity=".7"/>
      <circle cx={(data.length-1)/(data.length-1)*width} cy={height-(data[data.length-1]/max)*height} r="3" fill={color}/>
    </svg>
  );
}

    }catch{setChatHist([...msgs,{role:'assistant',content:'Bağlantı hatası.'}]);}
    setChatWait(false);
  };

  /* Nav item */
  const Nav=({id,label,ic,badge,soft})=>(
    <button className={`ni${tab===id?' on':''}`} onClick={()=>setTab(id)}>
      <span className="ni-ic">{ic}</span>
      <span style={{flex:1}}>{label}</span>
      {badge>0&&<span className="ni-bd">{badge}</span>}
      {soft!==undefined&&<span className="ni-soft">{soft}</span>}
    </button>
  );

  const curQ=D.quotes[quoteIdx%(D.quotes.length||1)];

/* ────────────────────── CALENDAR PAGE (top-level component) ────────────────────── */
function CalPage({D,setD,setDetail,setModal,calView,setCalView,calDate,setCalDate}){
  const events=D.calEvents||[];
  const baseDate=new Date(calDate+'T12:00');
  const weekStart=new Date(baseDate);weekStart.setDate(weekStart.getDate()-weekStart.getDay()+1);
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);return d.toISOString().split('T')[0];});
  const monthStart=new Date(baseDate.getFullYear(),baseDate.getMonth(),1);
  const monthDays=[];
  const firstDay=(monthStart.getDay()||7)-1;
  for(let i=0;i<firstDay;i++){const d=new Date(monthStart);d.setDate(d.getDate()-firstDay+i);monthDays.push({date:d.toISOString().split('T')[0],cur:false});}
  const dInMonth=new Date(baseDate.getFullYear(),baseDate.getMonth()+1,0).getDate();
  for(let i=1;i<=dInMonth;i++){const d=new Date(baseDate.getFullYear(),baseDate.getMonth(),i);monthDays.push({date:d.toISOString().split('T')[0],cur:true});}
  const getEventsFor=date=>events.filter(ev=>{if(ev.date===date)return true;if(ev.recurrence==='Haftalık'){const evDay=new Date(ev.date+'T12:00').getDay();const qDay=new Date(date+'T12:00').getDay();return evDay===qDay&&ev.date<=date;}if(ev.recurrence==='Günlük'&&ev.date<=date)return true;if(ev.recurrence==='Aylık'){const evD=new Date(ev.date+'T12:00').getDate();const qD=new Date(date+'T12:00').getDate();return evD===qD&&ev.date<=date;}return false;});
  const navDate=delta=>{const d=new Date(calDate+'T12:00');if(calView==='week')d.setDate(d.getDate()+delta*7);else if(calView==='month')d.setMonth(d.getMonth()+delta);else d.setDate(d.getDate()+delta);setCalDate(d.toISOString().split('T')[0]);};
  const lbl=calView==='month'?new Date(calDate+'T12:00').toLocaleDateString('tr-TR',{month:'long',year:'numeric'}):calView==='week'?`${fmtShort(weekDays[0])} – ${fmtShort(weekDays[6])}`:fmtDate(calDate);
  const tdStr=today();
  return(
    <div>
      <div className="ph" style={{marginBottom:12}}>
        <div><div className="ptit" style={{fontSize:15}}>Takvim</div></div>
        <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{background:'var(--bg2)',borderRadius:'var(--r)',border:'1px solid var(--bd)',display:'flex',overflow:'hidden'}}>
            {['day','week','month'].map(v=><button key={v} onClick={()=>setCalView(v)} style={{padding:'5px 11px',border:'none',background:calView===v?'var(--ac)':'transparent',color:calView===v?'#fff':'var(--ink3)',cursor:'pointer',fontFamily:'var(--ff)',fontSize:12,fontWeight:500,transition:'all .15s'}}>{v==='day'?'Gün':v==='week'?'Hafta':'Ay'}</button>)}
          </div>
          <button className="ibtn" onClick={()=>navDate(-1)}>‹</button>
          <span style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:14,minWidth:140,textAlign:'center',color:'var(--ink)'}}>{lbl}</span>
          <button className="ibtn" onClick={()=>navDate(1)}>›</button>
          <button className="btn btns btng" onClick={()=>setCalDate(today())}>Bugün</button>
          <button className="btn btnp btns" onClick={()=>setModal({type:'calEvent'})}>+ Etkinlik</button>
        </div>
      </div>
      {calView==='month'&&(
        <div className="card" style={{overflow:'hidden'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',borderBottom:'1px solid var(--bd)',background:'var(--bg2)'}}>
            {['Pt','Sa','Ça','Pe','Cu','Ct','Pz'].map(d=><div key={d} className="mono" style={{padding:'9px',textAlign:'center',fontSize:9,color:'var(--ink5)',fontWeight:700,letterSpacing:1}}>{d}</div>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
            {monthDays.map((day,i)=>{
              const dayEvs=getEventsFor(day.date);const isT=day.date===tdStr;
              return(
                <div key={i} style={{minHeight:80,borderRight:'1px solid var(--bg3)',borderBottom:'1px solid var(--bg3)',padding:'5px 4px',background:!day.cur?'var(--bg2)':isT?'var(--acb)':undefined}}>
                  <div className="mono" style={{fontSize:11,fontWeight:isT?700:400,width:22,height:22,borderRadius:isT?'50%':4,background:isT?'var(--ac)':'transparent',color:isT?'#fff':day.cur?'var(--ink3)':'var(--ink6)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:2}}>{new Date(day.date+'T12:00').getDate()}</div>
                  {dayEvs.slice(0,2).map(ev=><div key={ev.id} className="cal-ev" style={{background:ev.color+'18',color:ev.color,borderLeft:`2px solid ${ev.color}`}} onClick={()=>setDetail({type:'calEvent',item:ev})}>{ev.time&&<span className="mono" style={{fontSize:8,marginRight:2,opacity:.7}}>{ev.time}</span>}{ev.title}</div>)}
                  {dayEvs.length>2&&<div style={{fontSize:10,color:'var(--ink5)',padding:'1px 4px'}}>+{dayEvs.length-2}</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}
      {calView==='week'&&(
        <div className="card" style={{overflow:'auto'}}>
          <div style={{display:'grid',gridTemplateColumns:'44px repeat(7,1fr)',minWidth:520}}>
            <div style={{borderBottom:'1px solid var(--bd)',padding:'8px 0',background:'var(--bg2)'}}/>
            {weekDays.map((d,i)=>{const isT=d===tdStr;return <div key={i} style={{borderBottom:'1px solid var(--bd)',padding:'8px',textAlign:'center',background:isT?'var(--acb)':undefined}}>
              <div className="mono" style={{fontSize:9,color:isT?'var(--ac)':'var(--ink5)',fontWeight:700,letterSpacing:.8}}>{['PT','SA','ÇA','PE','CU','CT','PZ'][i]}</div>
              <div style={{fontFamily:'var(--fd)',fontStyle:'italic',color:isT?'var(--ac)':'var(--ink)',fontSize:17}}>{new Date(d+'T12:00').getDate()}</div>
            </div>;})}
            {weekDays.map(d=>{const dayEvs=getEventsFor(d);return <div key={d} style={{borderRight:'1px solid var(--bg3)',borderBottom:'1px solid var(--bg3)',padding:5,minHeight:110}}>
              {dayEvs.map(ev=><div key={ev.id} className="cal-ev" style={{background:ev.color+'18',color:ev.color,borderLeft:`2px solid ${ev.color}`,marginBottom:3}} onClick={()=>setDetail({type:'calEvent',item:ev})}>
                {ev.time&&<span className="mono" style={{fontSize:9,marginRight:3,opacity:.7}}>{ev.time}</span>}{ev.title}
                {ev.recurrence&&ev.recurrence!=='Tekrar Yok'&&<span style={{marginLeft:4,fontSize:9,opacity:.5}}>{RECURRENCE_IC[ev.recurrence]||''}</span>}
              </div>)}
            </div>;})}
            <div style={{padding:'6px',background:'var(--bg2)'}}><div className="mono" style={{fontSize:9,color:'var(--ink5)',textAlign:'center',paddingTop:6}}>GMT+3</div></div>
          </div>
        </div>
      )}
      {calView==='day'&&(
        <div className="card cp">
          <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:16,marginBottom:12,color:'var(--ink)'}}>{fmtDate(calDate)}</div>
          {getEventsFor(calDate).length===0?<div className="empty" style={{padding:'16px 0'}}>Bu gün için etkinlik yok.</div>:
          getEventsFor(calDate).map(ev=>(
            <div key={ev.id} style={{display:'flex',gap:12,padding:'10px 0',borderBottom:'1px solid var(--bg3)',cursor:'pointer'}} onClick={()=>setDetail({type:'calEvent',item:ev})}>
              <div style={{width:3,background:ev.color,borderRadius:2,flexShrink:0}}/>
              <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{ev.title}</div>{ev.time&&<div className="mono" style={{fontSize:11,color:'var(--ink4)',marginTop:2}}>{ev.time}{ev.endTime?` – ${ev.endTime}`:''}</div>}</div>
              {ev.recurrence&&ev.recurrence!=='Tekrar Yok'&&<span className="rec-badge">{RECURRENCE_IC[ev.recurrence]} {ev.recurrence}</span>}
              <button className="ibtn" onClick={ev2=>{ev2.stopPropagation();setD(prev=>({...prev,calEvents:(prev.calEvents||[]).filter(x=>x.id!==ev.id)}))}}>×</button>
            </div>
          ))}
        </div>
      )}
      <div className="card cp" style={{marginTop:10}}>
        <div className="slbl2">Yaklaşan Etkinlikler</div>
        {(D.calEvents||[]).filter(ev=>ev.date>=tdStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5).map(ev=>(
          <div key={ev.id} style={{display:'flex',gap:10,alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--bg3)'}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:ev.color,flexShrink:0}}/>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{ev.title}</div><div className="mono" style={{fontSize:10.5,color:'var(--ink4)'}}>{fmtShort(ev.date)}{ev.time?` · ${ev.time}`:''}</div></div>
            {ev.recurrence&&ev.recurrence!=='Tekrar Yok'&&<span className="rec-badge">{ev.recurrence}</span>}
            <button className="ibtn" onClick={()=>setD(prev=>({...prev,calEvents:(prev.calEvents||[]).filter(x=>x.id!==ev.id)}))}>×</button>
          </div>
        ))}
        {(D.calEvents||[]).filter(ev=>ev.date>=tdStr).length===0&&<div style={{fontSize:12,color:'var(--ink5)',padding:'10px 0',fontStyle:'italic'}}>Yaklaşan etkinlik yok.</div>}
      </div>
    </div>
  );
}

  /* ────────────────────── NOTES PAGE ────────────────────── */
  const NotesPage=()=>{
    const notes=D.notes||[];
    const cats=['Tümü',...new Set(notes.map(n=>n.category))];
    let filtered=notes;
    if(noteSearch.trim()){const q=noteSearch.toLowerCase();filtered=filtered.filter(n=>(n.title+n.content+(n.tags||[]).join(' ')).toLowerCase().includes(q));}
    if(noteCat!=='Tümü')filtered=filtered.filter(n=>n.category===noteCat);
    filtered=[...filtered.filter(n=>n.pinned),...filtered.filter(n=>!n.pinned)];
    if(noteSort==='updated')filtered.sort((a,b)=>b.updatedAt.localeCompare(a.updatedAt));
    else if(noteSort==='created')filtered.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
    else filtered.sort((a,b)=>a.title.localeCompare(b.title));
    return(
      <div className="afu">
        <div className="ph">
          <div><div className="ptit">Notlar</div><div className="psub">{notes.length} not · zengin metin editörü</div></div>
          <div style={{display:'flex',gap:7}}>
            <select value={noteSort} onChange={e=>setNoteSort(e.target.value)} style={{width:'auto',fontSize:12,padding:'5px 10px',borderRadius:20}}>
              <option value="updated">Son güncellenen</option><option value="created">Son eklenen</option><option value="title">A–Z</option>
            </select>
            <button className="btn btnp btns" onClick={()=>setModal({type:'note'})}>+ Yeni Not</button>
          </div>
        </div>
        <div style={{display:'flex',gap:9,marginBottom:14,alignItems:'center'}}>
          <div className="search-wrap" style={{flex:1,maxWidth:280}}>
            <input value={noteSearch} onChange={e=>setNoteSearch(e.target.value)} placeholder="Notlarda ara…" style={{padding:'6px 10px 6px 28px',borderRadius:20}}/>
            <span className="search-ic">⌕</span>
          </div>
          <div className="fbar" style={{marginBottom:0}}>
            {cats.map(c=><button key={c} className={`chip${noteCat===c?' on':''}`} onClick={()=>setNoteCat(c)} style={{padding:'3px 10px',fontSize:11}}>{c}</button>)}
          </div>
        </div>
        <div className="g3">
          {filtered.map(note=>(
            <div key={note.id} className="note-card" style={{padding:'14px 16px',cursor:'pointer',background:note.color&&note.color!=='var(--sur)'?note.color:undefined,position:'relative'}} onClick={()=>setDetail({type:'note',item:note})}>
              {note.pinned&&<div style={{position:'absolute',top:10,right:10,fontSize:11,opacity:.6}}>📌</div>}
              <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontWeight:400,fontSize:14.5,marginBottom:5,color:'var(--ink)',paddingRight:18,lineHeight:1.3}}>{note.title}</div>
              <div className="mono" style={{fontSize:9.5,color:'var(--ink5)',marginBottom:8,letterSpacing:.3}}>{note.category} · {note.updatedAt?fmtShort(note.updatedAt):'—'}</div>
              <div style={{fontSize:12.5,color:'var(--ink3)',lineHeight:1.7,display:'-webkit-box',WebkitLineClamp:4,WebkitBoxOrient:'vertical',overflow:'hidden'}} dangerouslySetInnerHTML={{__html:note.content||'<em style="color:var(--ink5)">Boş not…</em>'}}/>
              {(note.tags||[]).length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:9}}>{note.tags.map(t=><span key={t} className="tag" style={{fontSize:10}}>{t}</span>)}</div>}
              <div style={{display:'flex',gap:4,marginTop:10}}>
                <button className="ibtn" style={{width:22,height:22,fontSize:10}} onClick={ev=>{ev.stopPropagation();setD(prev=>({...prev,notes:(prev.notes||[]).map(n=>n.id===note.id?{...n,pinned:!n.pinned}:n)}));}}>📌</button>
                <button className="ibtn" style={{width:22,height:22,fontSize:10,marginLeft:'auto'}} onClick={ev=>{ev.stopPropagation();if(confirm('Sil?'))setD(prev=>({...prev,notes:(prev.notes||[]).filter(n=>n.id!==note.id)}));}}>×</button>
              </div>
            </div>
          ))}
          {filtered.length===0&&<div className="card empty" style={{gridColumn:'1/-1'}}><div className="empty-icon">📝</div>Not bulunamadı.</div>}
        </div>
      </div>
    );
  };

  /* ────────────────────── PAGE RENDERER ────────────────────── */

    switch(tab){

    /* ── DASHBOARD ── */
    case 'dashboard':{
      const frog=D.todos.find(t=>!t.done&&t.priority==='Acil & Önemli')||D.todos.find(t=>!t.done);
      const l7=last7();
      const habitSparkData=D.habits.map(h=>l7.filter(d=>(h.logs||[]).includes(d)).length);
      const completedToday=D.todos.filter(t=>t.done).length;
      return(
        <div className="afu">
          {/* Hero */}
          <div className="dash-hero" style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <div className="hero-greeting">{greetingText()}</div>
                {curQ&&<div key={quoteIdx} className="hero-quote">"{curQ.text.slice(0,90)}{curQ.text.length>90?'…':''}"</div>}
                {curQ&&<div className="hero-author">— {curQ.author}</div>}
              </div>
              <div style={{display:'flex',gap:16,alignItems:'center',flexShrink:0,marginLeft:24}}>
                <ClockFull/>
              </div>
            </div>
          </div>

          {/* Stats row */}
          <div className="g5" style={{marginBottom:14}}>
            {[
              {l:'Aktif Hedef',v:D.goals.length,d:'hedef',ic:'🎯',c:'var(--ink)'},

                <div className="snum" style={{color:s.c}}>{s.v}</div>
                <div className="slbl">{s.l}</div>
                <div className="sdesc">{s.d}</div>

          </div>

          <div className="g2" style={{marginBottom:14}}>
            {/* One Thing + Frog */}
            <div className="card cp">
              <div className="slbl2">🎯 Bugünün Tek Ana Hedefi</div>
              {(D.oneThing?.text)?(
                <div style={{marginBottom:14,padding:'12px 14px',background:'var(--acb)',borderRadius:'var(--r2)',border:'1px solid var(--acbd)',borderLeft:'3px solid var(--ac)'}}>
                  <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:16,color:'var(--ink)',lineHeight:1.4,marginBottom:8}}>{D.oneThing.text}</div>

                </div>
              ):(
                <div style={{padding:'10px 12px',background:'var(--bg2)',borderRadius:'var(--r)',marginBottom:12,color:'var(--ink5)',fontSize:12.5,fontStyle:'italic'}}>
                  The One Thing henüz belirlenmedi. <button className="btn btnxs btng" style={{marginLeft:6}} onClick={()=>setTab('todos')}>Belirle →</button>
                </div>

              <div className="slbl2" style={{marginBottom:8}}>⚡ Günün 3 İşi</div>
              {(D.top3||[]).map((t,i)=>(
                <div key={t.id} style={{display:'flex',gap:7,alignItems:'center',padding:'5px 0',borderBottom:'1px solid var(--bg3)'}}>
                  <input type="checkbox" className="chk" checked={t.done} onChange={()=>setD(prev=>({...prev,top3:(prev.top3||[]).map(x=>x.id===t.id?{...x,done:!x.done}:x)}))}/>
                  <span style={{width:16,height:16,borderRadius:'50%',background:i===0?'var(--ac)':i===1?'var(--bl)':'var(--gn)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,flexShrink:0}}>{i+1}</span>
                  <span style={{flex:1,fontSize:12.5,color:t.done?'var(--ink4)':'var(--ink)',textDecoration:t.done?'line-through':'none'}}>{t.text}</span>
                </div>
              ))}
              {(D.top3||[]).length===0&&<div style={{color:'var(--ink5)',fontSize:12,fontStyle:'italic'}}>Bugünün 3 işi belirlenmedi.</div>}
              <button className="btn btns btng" style={{marginTop:10,width:'100%',justifyContent:'center'}} onClick={()=>{setTab('todos');setTodoTab('onething');}}>Yönet →</button>
            </div>

            {/* Timer */}
            <div className="card cp">
              <div className="slbl2">⏱ Odak Zamanlayıcısı</div>

                    <div className="mono" style={{fontSize:8,color:'var(--ink5)',letterSpacing:.5}}>{tOn?'DEVAM':'BEKLE'}</div>
                  </div>
                </Ring>
                <div style={{flex:1}}>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>

                      <button key={m} onClick={()=>{setTMode(m);setTLeft(DURS[m]);setTOn(false);}} style={{fontSize:11,padding:'3px 9px',borderRadius:20,border:`1.5px solid ${tMode===m?'var(--ac)':'var(--bd)'}`,background:tMode===m?'var(--acb)':'transparent',color:tMode===m?'var(--ac)':'var(--ink4)',cursor:'pointer',fontFamily:'var(--ff)',fontWeight:tMode===m?600:400,transition:'all .15s'}}>

              {D.habits.map(h=>{
                const s=streak(h.logs);
                return(
                  <div key={h.id} style={{display:'grid',gridTemplateColumns:'150px 1fr 80px',gap:8,alignItems:'center'}}>

                      <span style={{fontSize:12.5,color:'var(--ink3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.name}</span>
                    </div>
                    <div style={{display:'flex',gap:4}}>
                      {l7.map((d,i)=>{const done=(h.logs||[]).includes(d),isT=i===6;return(
                        <div key={i} className={`hdot${done?' done':''}${isT&&!done?' today':''}`}
                          onClick={isT?()=>togHabit(h.id):undefined}
                          title={d}
                          style={{background:done?h.color:undefined}}>
                          {done?'✓':''}
                        </div>
                      );})}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:5}}>
                      {s>0&&<span className="streak-fire" style={{color:h.color}}>🔥 {s}</span>}

              <div style={{display:'grid',gridTemplateColumns:'150px 1fr 80px',gap:8,marginTop:4}}>
                <div/>
                <div style={{display:'flex',gap:4}}>{l7.map((d,i)=><div key={i} className="mono" style={{width:20,textAlign:'center',fontSize:9,color:i===6?'var(--ac)':'var(--ink6)',fontWeight:i===6?700:400}}>{dayLbl(d)}</div>)}</div>
                <div/>

            </div>
          </div>

          <div className="g2">
            {/* Goals */}
            <div className="card cp">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:13}}>
                <div className="slbl2" style={{marginBottom:0}}>🎯 Smart Hedefler</div>
                <button className="btn btns btng" onClick={()=>setTab('goals')}>Tümü →</button>
              </div>
              {D.goals.map(g=>{const p=pct((g.actionPlan||[]).filter(s=>s.done).length,(g.actionPlan||[]).length);return(
                <div key={g.id} style={{marginBottom:13,cursor:'pointer',padding:'9px 11px',borderRadius:'var(--r2)',border:'1px solid var(--bd)',background:'var(--sur2)',transition:'all .15s'}}

                  onMouseEnter={ev=>ev.currentTarget.style.borderColor='var(--bd2)'}
                  onMouseLeave={ev=>ev.currentTarget.style.borderColor='var(--bd)'}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                    <span style={{fontSize:13,fontWeight:500,fontFamily:'var(--fd)',fontStyle:'italic'}}>{g.isFrog?'🐸 ':''}{g.title}</span>
                    <span className="mono" style={{fontSize:10.5,color:p>=70?'var(--gn)':p>=30?'var(--ac)':'var(--ink4)',fontWeight:700}}>{p}%</span>
                  </div>
                  <div className="pb" style={{height:3}}><div className="pf" style={{width:p+'%',background:p>=70?'var(--gn)':p>=30?'var(--ac)':'var(--ink3)'}}/></div>
                  <div style={{marginTop:4,fontSize:11,color:'var(--ink5)'}}>{(g.actionPlan||[]).filter(s=>s.done).length}/{(g.actionPlan||[]).length} aksiyon tamamlandı</div>
                </div>
              );})}
            </div>

            {/* Activity log */}
            <div className="card cp">
              <div className="slbl2">⚡ Son Aktiviteler</div>
              {(D.logs||[]).slice(0,9).map((log,i)=>(
                <div key={i} className="tli">
                  <div className={`tldot ${log.type||''}`}/>
                  <div><div style={{fontSize:12.5,color:'var(--ink2)'}}>{log.action}</div><div className="mono" style={{fontSize:10,color:'var(--ink5)'}}>{log.time}</div></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ── GOALS ── */
    case 'goals':{
      const GOAL_CATS=['Tümü','İş','Sağlık','Finans','Kişisel','Diğer'];
      const GOAL_PRIS=['Tümü','Yüksek','Orta','Düşük'];

      const catCls={İş:'cat-is',Sağlık:'cat-health',Finans:'cat-finance',Kişisel:'cat-personal'};
      const priBg={Yüksek:'var(--rd)',Orta:'var(--ac)',Düşük:'var(--gn)'};
      const priClr={Yüksek:'var(--rdb)',Orta:'var(--acb)',Düşük:'var(--gnb)'};

      let goals=fl(D.goals,['title','desc','notes','category']);
      if(gCat!=='Tümü')goals=goals.filter(g=>g.category===gCat);
      if(gPri!=='Tümü')goals=goals.filter(g=>g.priority===gPri);

      // Aggregate stats
      const totalGoals=D.goals.length;
      const totalSteps=D.goals.reduce((s,g)=>(s+(g.actionPlan||[]).length),0);
      const doneSteps=D.goals.reduce((s,g)=>(s+(g.actionPlan||[]).filter(a=>a.done).length),0);
      const overdueGoals=D.goals.filter(g=>g.deadline&&daysLeft(g.deadline)<0).length;
      const overdueSteps=D.goals.reduce((s,g)=>(s+(g.actionPlan||[]).filter(a=>!a.done&&a.date&&daysLeft(a.date)<0).length),0);
      const smartComplete=D.goals.filter(g=>g.specificText&&g.measurableText&&g.achievableText&&g.relevantText&&g.deadline).length;

      const SmartRing=({pct:p,size=52})=>{
        const r=size/2-5;const c=2*Math.PI*r;
        const col=p>=70?'var(--gn)':p>=30?'var(--ac)':'var(--rd)';
        return(
          <svg width={size} height={size} style={{transform:'rotate(-90deg)',flexShrink:0}}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg3)" strokeWidth="4"/>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth="4"
              strokeDasharray={c} strokeDashoffset={c*(1-p/100)} strokeLinecap="round"
              style={{transition:'stroke-dashoffset .6s ease'}}/>
          </svg>
        );
      };

      return(
        <div className="afu">
          {/* Hero banner */}
          <div className="goal-dash-hero">

              <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:19,marginBottom:10,lineHeight:1.3}}>"Planı olmayan hedef, sadece bir temennidir."</div>
              <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                {[
                  {l:'Aktif Hedef',v:totalGoals,ic:'🎯'},
                  {l:'SMART Tamamlanan',v:`${smartComplete}/${totalGoals}`,ic:'✓'},
                  {l:'Geciken Hedef',v:overdueGoals,ic:'⚠'},
                  {l:'Toplam İlerleme',v:`${pct(doneSteps,totalSteps)}%`,ic:'↗'},

                  <div key={s.l} style={{textAlign:'center',opacity:.85}}>
                    <div style={{fontSize:9,opacity:.55,letterSpacing:.5,fontFamily:'var(--fm)',textTransform:'uppercase',marginBottom:1}}>{s.l}</div>
                    <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:18,lineHeight:1}}>{s.ic} {s.v}</div>
                  </div>

              </div>
            </div>
          </div>

          {/* Header */}
          <div className="ph">
            <div>
              <div className="ptit">Smart Hedefler</div>
              <div className="psub">{goals.length} hedef · {overdueSteps} geciken adım · {doneSteps}/{totalSteps} tamamlandı</div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button className={`btn btns ${gView==='cards'?'btnp':'btng'}`} onClick={()=>setGView('cards')} title="Kart görünümü">⊞</button>
              <button className={`btn btns ${gView==='list'?'btnp':'btng'}`} onClick={()=>setGView('list')} title="Liste görünümü">☰</button>
              <button className="btn btnp" onClick={()=>setModal({type:'goal'})}>+ Yeni Hedef</button>
            </div>
          </div>

          {/* Filters */}
          <div className="goal-filters">
            <span className="clbl">Kategori:</span>
            {GOAL_CATS.map(c=><button key={c} className={`chip${gCat===c?' on':''}`} onClick={()=>setGCat(c)} style={{padding:'3px 10px',fontSize:11}}>{c}</button>)}
            <span className="clbl" style={{marginLeft:6}}>Öncelik:</span>
            {GOAL_PRIS.map(p=><button key={p} className={`chip${gPri===p?' on':''}`} onClick={()=>setGPri(p)} style={{padding:'3px 10px',fontSize:11}}>{p}</button>)}

            <div className="g2">

                const doneCnt=ap.filter(s=>s.done).length;

                const dl=g.deadline?daysLeft(g.deadline):null;
                const sc=[g.specificText,g.measurableText,g.achievableText,g.relevantText,g.deadline].filter(Boolean).length;

                const nextStep=ap.find(s=>!s.done);
                return(
                  <div key={g.id} className="goal-card" style={{position:'relative',paddingLeft:6}} onClick={()=>setDetail({type:'goal',item:g})}>

                      {/* Top row */}
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:9}}>

                          <div style={{display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}}>
                            <span className={`cat-badge ${catCls[g.category]||'cat-other'}`}>{g.category||'Diğer'}</span>

                            {dl!==null&&<span className={`tag ${dl<0?'tr':dl<14?'ta':''}`}>{dl<0?`${-dl}g geçti`:dl===0?'Bugün':dl+'g kaldı'}</span>}

                          </div>
                        </div>
                        <div style={{display:'flex',gap:8,alignItems:'center',marginLeft:10,flexShrink:0}}>
                          <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <SmartRing pct={p} size={50}/>
                            <div style={{position:'absolute',fontFamily:'var(--fd)',fontStyle:'italic',fontSize:11,fontWeight:700,color:p>=70?'var(--gn)':p>=30?'var(--ac)':'var(--rd)'}}>{p}%</div>
                          </div>
                          <button className="ibtn" onClick={ev=>{ev.stopPropagation();delItem(g,'goals');}}>×</button>
                        </div>
                      </div>

                      {/* Description */}
                      <p style={{fontSize:12.5,color:'var(--ink3)',lineHeight:1.7,marginBottom:11}}>{(g.desc||'').slice(0,120)}{(g.desc||'').length>120?'…':''}</p>

                      {/* Measurable row */}
                      {(g.currentVal||g.targetVal)&&(
                        <div style={{padding:'7px 10px',background:'var(--bg2)',borderRadius:'var(--r)',border:'1px solid var(--bd)',marginBottom:10,fontSize:12.5,display:'flex',gap:10,alignItems:'center'}}>
                          <span style={{color:'var(--ink4)',fontFamily:'var(--fm)',fontSize:11}}>{g.currentVal}</span>
                          <div style={{flex:1,height:4,background:'var(--bg3)',borderRadius:2,overflow:'hidden'}}>
                            <div style={{height:'100%',width:p+'%',background:'var(--ac)',borderRadius:2,transition:'width .4s ease'}}/>
                          </div>
                          <span style={{color:'var(--ac)',fontWeight:700,fontFamily:'var(--fm)',fontSize:11}}>{g.targetVal}</span>
                        </div>
                      )}

                      {/* Next step */}
                      {nextStep&&(
                        <div style={{padding:'7px 10px',background:'var(--acb)',borderRadius:'var(--r)',border:'1px solid var(--acbd)',marginBottom:10,display:'flex',gap:8,alignItems:'center'}} onClick={ev=>ev.stopPropagation()}>
                          <span style={{fontSize:10,fontFamily:'var(--fm)',color:'var(--actext)',fontWeight:700,flexShrink:0}}>SONRAKI</span>
                          <span style={{fontSize:12.5,color:'var(--ink2)',flex:1}}>{nextStep.action}</span>
                          <input type="checkbox" className="chk" checked={nextStep.done}
                            onChange={()=>setD(prev=>({...prev,goals:prev.goals.map(x=>x.id===g.id?{...x,actionPlan:(x.actionPlan||[]).map(y=>y.id===nextStep.id?{...y,done:!y.done}:y)}:x)}))}/>
                        </div>
                      )}

                      {/* SMART score pills */}
                      <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>
                        {[['S',g.specificText],['M',g.measurableText],['A',g.achievableText],['R',g.relevantText],['T',g.deadline]].map(([k,v])=>(
                          <span key={k} className={`smart-pill ${v?'met':'unmet'}`}>{v?'✓':''} {k}</span>
                        ))}
                        <span style={{marginLeft:'auto',fontSize:10,fontFamily:'var(--fm)',color:'var(--ink5)'}}>{sc}/5 SMART</span>
                      </div>

                      {/* Footer */}
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <span className="mono" style={{fontSize:10,color:'var(--ink5)'}}>{doneCnt}/{ap.length} adım</span>
                        <span style={{fontSize:10,color:'var(--ink5)',fontFamily:'var(--fm)'}}>
                          {g.startDate?fmtShort(g.startDate)+' →':''} {g.deadline?fmtShort(g.deadline):''}
                        </span>
                      </div>
                    </div>
                  </div>
                );
              })}
              {goals.length===0&&<div className="card empty" style={{gridColumn:'1/-1'}}><div className="empty-icon">🎯</div>Hedef bulunamadı.</div>}
            </div>
          ):(
            /* List view */
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {/* Column header */}
              <div style={{display:'grid',gridTemplateColumns:'2fr 100px 90px 90px 100px 32px',gap:8,padding:'6px 14px',fontSize:10,fontFamily:'var(--fm)',color:'var(--ink5)',textTransform:'uppercase',letterSpacing:.5,borderBottom:'1px solid var(--bd)'}}>
                <span>Hedef</span><span>Kategori</span><span>Öncelik</span><span>Son Tarih</span><span style={{textAlign:'center'}}>İlerleme</span><span/>
              </div>
              {goals.map(g=>{
                const ap=g.actionPlan||[];const p=pct(ap.filter(s=>s.done).length,ap.length);
                const dl=g.deadline?daysLeft(g.deadline):null;
                return(
                  <div key={g.id} style={{display:'grid',gridTemplateColumns:'2fr 100px 90px 90px 100px 32px',gap:8,padding:'10px 14px',background:'var(--sur)',border:'1px solid var(--bd)',borderRadius:'var(--r2)',alignItems:'center',cursor:'pointer',transition:'all .12s'}}
                    onClick={()=>setDetail({type:'goal',item:g})}
                    onMouseEnter={ev=>ev.currentTarget.style.borderColor='var(--bd2)'}
                    onMouseLeave={ev=>ev.currentTarget.style.borderColor='var(--bd)'}>
                    <div>
                      <div style={{fontWeight:600,fontSize:13,color:'var(--ink)',marginBottom:2}}>{g.isFrog?'🐸 ':''}{g.title}</div>
                      <div style={{fontSize:11,color:'var(--ink4)'}}>{ap.filter(s=>s.done).length}/{ap.length} adım</div>
                    </div>
                    <span className={`cat-badge ${catCls[g.category]||'cat-other'}`}>{g.category||'Diğer'}</span>
                    <span style={{fontSize:12,color:priBg[g.priority]||'var(--ink4)',fontWeight:600}}>{g.priority||'—'}</span>
                    <span className="mono" style={{fontSize:11,color:dl!==null&&dl<0?'var(--rd)':dl!==null&&dl<14?'var(--ac)':'var(--ink4)'}}>{g.deadline?fmtShort(g.deadline):'—'}</span>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <div className="pb" style={{flex:1,height:5}}><div className="pf" style={{width:p+'%',background:p>=70?'var(--gn)':p>=30?'var(--ac)':'var(--ink3)'}}/></div>
                      <span className="mono" style={{fontSize:10,minWidth:28,color:p>=70?'var(--gn)':p>=30?'var(--ac)':'var(--ink4)',fontWeight:700}}>{p}%</span>
                    </div>
                    <button className="ibtn" onClick={ev=>{ev.stopPropagation();delItem(g,'goals');}}>×</button>
                  </div>
                );
              })}
              {goals.length===0&&<div className="card empty"><div className="empty-icon">🎯</div>Hedef bulunamadı.</div>}
            </div>
          )}
        </div>
      );
    }

    /* ── TODOS ── */
    case 'todos':{
      const cats=['Tümü',...(D.todoCats||TODO_CATS_DEFAULT)];
      let todos=fl(D.todos,['text','category','notes','mainAssignee']);
      if(fPri!=='Tümü')todos=todos.filter(t=>t.priority===fPri);
      if(fCat!=='Tümü')todos=todos.filter(t=>t.category===fCat);
      if(fSt==='Bekleyen'||fSt==='Bekliyor')todos=todos.filter(t=>!t.done&&t.status!=='Tamamlandı'&&t.status!=='İptal');
      else if(fSt==='Bitti'||fSt==='Tamamlandı')todos=todos.filter(t=>t.done||t.status==='Tamamlandı');
      else if(fSt==='Yapılıyor')todos=todos.filter(t=>t.status==='Yapılıyor');
      else if(fSt==='İptal')todos=todos.filter(t=>t.status==='İptal');
      if(fAssignee!=='Tümü')todos=todos.filter(t=>t.mainAssignee===fAssignee||(t.subAssignees||[]).includes(fAssignee));
      const sorted=[...todos.filter(t=>!t.done).sort((a,b)=>PRI_O(a.priority)-PRI_O(b.priority)),...todos.filter(t=>t.done)];

      const allDone=D.todos.filter(t=>t.done).length;
      const totalAll=D.todos.length;
      const dayPct=pct(allDone,totalAll);

      // Sub-tab nav
      const TAB_ITEMS=[
        {id:'tasks',label:'☐ Görevler'},
        {id:'calendar',label:'📅 Takvim'},
        {id:'onething',label:'🎯 The One Thing'},
        {id:'nottodo',label:'🚫 Yapılmayacaklar'},
        {id:'timeblock',label:'⏰ Time Blocking'},
        {id:'review',label:'📊 Haftalık Review'},
      ];

      return(
        <div className="afu">
          {/* Header */}
          <div className="ph">
            <div><div className="ptit">Görev Yönetimi</div><div className="psub">{D.todos.filter(t=>!t.done).length} bekleyen · {overdue} gecikmiş · %{dayPct} tamamlandı</div></div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn btns btng" onClick={()=>exportTodosExcel(sorted)}>⬇ Excel</button>
              <button className="btn btns btng" onClick={()=>exportTodosPDF(sorted)}>🖨 PDF</button>
              <button className="btn btnp" onClick={()=>setModal({type:'todo'})}>+ Yeni Görev</button>
            </div>
          </div>

          {/* Daily progress bar */}
          <div style={{marginBottom:14,padding:'12px 16px',background:'var(--sur)',border:'1px solid var(--bd)',borderRadius:'var(--r2)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
              <span style={{fontSize:12,fontWeight:600,color:'var(--ink3)'}}>Günlük İlerleme</span>
              <span className="mono" style={{fontSize:11,color:dayPct>=70?'var(--gn)':dayPct>=30?'var(--ac)':'var(--ink4)',fontWeight:700}}>{allDone}/{totalAll} · %{dayPct}</span>
            </div>
            <div className="pb" style={{height:8,borderRadius:4}}>
              <div className="pf" style={{width:dayPct+'%',background:dayPct>=70?'var(--gn)':dayPct>=30?'var(--ac)':'var(--ac)',borderRadius:4,transition:'width .4s ease'}}/>
            </div>
          </div>

          {/* Sub-tab nav */}
          <div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:16,borderBottom:'2px solid var(--bd)',paddingBottom:0}}>
            {TAB_ITEMS.map(ti=>(
              <button key={ti.id} onClick={()=>setTodoTab(ti.id)}
                style={{padding:'8px 13px',border:'none',background:'none',cursor:'pointer',fontFamily:'var(--ff)',fontSize:12.5,fontWeight:todoTab===ti.id?700:400,color:todoTab===ti.id?'var(--ac)':'var(--ink4)',borderBottom:`2px solid ${todoTab===ti.id?'var(--ac)':'transparent'}`,marginBottom:-2,transition:'all .15s',borderRadius:0}}>
                {ti.label}
              </button>
            ))}
          </div>

          {/* ── TASKS sub-tab ── */}
          {todoTab==='tasks'&&(
            <div>
              {/* Stats row */}
              <div className="g4" style={{marginBottom:14}}>
                {[
                  {l:'Bekliyor',v:D.todos.filter(t=>t.status==='Bekliyor'||(!t.status&&!t.done)).length,ic:'⏳',c:'var(--ink4)'},
                  {l:'Yapılıyor',v:D.todos.filter(t=>t.status==='Yapılıyor').length,ic:'⚙️',c:'var(--bl)'},
                  {l:'Tamamlandı',v:D.todos.filter(t=>t.done||t.status==='Tamamlandı').length,ic:'✅',c:'var(--gn)'},
                  {l:'Gecikmiş',v:overdue,ic:'🔴',c:overdue>0?'var(--rd)':'var(--gn)'},
                ].map(s=>(
                  <div key={s.l} className="card scard" style={{padding:'12px 10px'}}>
                    <div style={{fontSize:16,opacity:.6,marginBottom:2}}>{s.ic}</div>
                    <div className="snum" style={{color:s.c,fontSize:20}}>{s.v}</div>
                    <div className="slbl">{s.l}</div>
                  </div>
                ))}
              </div>

              {/* Ağırlıklı ilerleme */}
              {(()=>{
                const totalW=D.todos.reduce((s,t)=>s+(t.weight||10),0);
                const doneW=D.todos.filter(t=>t.done||t.status==='Tamamlandı').reduce((s,t)=>s+(t.weight||10),0);
                const wp=pct(doneW,totalW);
                return(
                  <div style={{marginBottom:14,padding:'12px 16px',background:'var(--sur)',border:'1px solid var(--bd)',borderRadius:'var(--r2)'}}>

                      <div>
                        <span style={{fontSize:12.5,fontWeight:600,color:'var(--ink3)'}}>Ağırlıklı İlerleme</span>
