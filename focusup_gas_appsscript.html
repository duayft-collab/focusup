                    fontSize:11,fontWeight:700,color:'var(--ac)',flexShrink:0}}>
                    {m.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
                  </div>
                  <span style={{fontWeight:500,color:'var(--ink)'}}>{m}</span>
                  <button onClick={()=>removeMember(m)} style={{width:18,height:18,borderRadius:4,border:'none',
                    background:'var(--rdb)',color:'var(--rd)',cursor:'pointer',fontSize:11,
                    display:'flex',alignItems:'center',justifyContent:'center',marginLeft:2}}>×</button>
                </div>
              ))}
            </div>
            {members.length===0&&<div style={{fontSize:13,color:'var(--ink5)',padding:'12px 0'}}>Henüz ekip üyesi yok.</div>}
          </div>

          {/* Data Management */}
          <div className="card cp" style={{marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:14,color:'var(--ink)',marginBottom:14}}>💾 Veri Yönetimi</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <button className="btn btng btns" style={{fontSize:12}} onClick={exportAll}>⬇ JSON Yedek Al</button>
              <label style={{cursor:'pointer'}}>
                <input type="file" accept=".json" style={{display:'none'}} onChange={importAll}/>
                <span className="btn btns" style={{fontSize:12,display:'inline-flex',alignItems:'center',gap:5,
                  padding:'7px 13px',borderRadius:'var(--r)',border:'1px solid var(--bd)',
                  background:'var(--sur)',color:'var(--ink)',fontFamily:'var(--ff)',fontWeight:600,cursor:'pointer'}}>⬆ JSON Geri Yükle</span>
              </label>
            </div>
            <div style={{marginTop:10,padding:'9px 12px',background:'var(--rdb)',border:'1px solid var(--rdbd)',
              borderRadius:'var(--r)',fontSize:12,color:'#7f1d1d'}}>
              ⚠ Geri yükleme tüm mevcut veriyi değiştirir. Önce yedek almayı unutmayın.
            </div>
          </div>

          {/* GAS Connection */}
          <div className="card cp" style={{marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:14,color:'var(--ink)',marginBottom:10}}>☁️ Google Apps Script Bağlantısı</div>
            {(GAS_URL||GAS_MODE)?(
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <span style={{fontSize:13,color:'var(--gn)',fontWeight:600}}>✅ Bağlı</span>
                  <span style={{fontSize:11,color:'var(--ink5)',fontFamily:'var(--fm)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:300}}>Apps Script (GAS Mode)</span>
                </div>
                <div style={{fontSize:12,color:'var(--ink4)'}}>Veriler otomatik olarak Google Sheets'e kaydediliyor.</div>
              </div>
            ):(
              <div>
                <div style={{fontSize:12,color:'var(--ink3)',lineHeight:1.7,marginBottom:10}}>
                  Google Sheets database bağlamak için:<br/>
                  1. <strong>script.google.com</strong> → Yeni proje<br/>
                  2. Aşağıdaki <code style={{fontFamily:'var(--fm)',background:'var(--bg2)',padding:'1px 5px',borderRadius:4}}>Code.gs</code> kodunu yapıştır<br/>
                  3. <strong>Deploy → Web App</strong> → URL'yi kopyala<br/>
                  4. Bu dosyayı açın → <code style={{fontFamily:'var(--fm)',background:'var(--bg2)',padding:'1px 5px',borderRadius:4}}>Index.html olarak Apps Script'e yükleyin
                </div>
                <div style={{padding:'10px 13px',background:'var(--bg2)',borderRadius:'var(--r)',fontSize:11,fontFamily:'var(--fm)',color:'var(--ink3)',lineHeight:1.6,border:'1px solid var(--bd)'}}>
                  Dosyanızın başında şunu bulun:<br/>
                  <code style={{color:'var(--ac)'}}>{'// Apps Script otomatik çalışıyor'}</code><br/>
                  ve URL satırını güncelleyin.
                </div>
              </div>
            )}
          </div>

          {/* App Info */}
          <div className="card" style={{padding:'14px 18px'}}>
            <div style={{fontSize:12,color:'var(--ink4)',lineHeight:1.8}}>
              <div style={{fontWeight:700,fontSize:13,color:'var(--ink)',marginBottom:6}}>FocusUp Pro</div>
              <div>Versiyon: v8 · Tüm veriler tarayıcıda saklanır</div>
              <div style={{marginTop:4,fontSize:11,color:'var(--ink5)'}}>Görevler: {D.todos.length} · Hedefler: {D.goals.length} · Alışkanlıklar: {D.habits.length} · Alıntılar: {D.quotes.length} · Yer İmleri: {(D.bookmarks||[]).length}</div>
            </div>
          </div>
        </div>
      );
    }

    /* ── CHALLENGES ── */
    case 'challenges':{
      const chs=D.challenges||[];
      const DIFF={1:'★☆☆☆☆',2:'★★☆☆☆',3:'★★★☆☆',4:'★★★★☆',5:'★★★★★'};
      const DC={1:'var(--gn)',2:'#65a30d',3:'#d97706',4:'#ea580c',5:'var(--rd)'};
      const curQStr=(()=>{const m=new Date().getMonth();return 'Q'+Math.ceil((m+1)/3)+' '+new Date().getFullYear();})();
      return(
        <div className="afu">
          <div className="ph">
            <div><div className="ptit">⚡ Challenges</div><div className="psub">3 Ayda 1 · Sınırları Aş · Her çeyrek yeni bir meydan okuma</div></div>
            <button className="btn btnp" onClick={()=>setModal({type:'challenge'})}>+ Challenge</button>
          </div>
          <div style={{background:'linear-gradient(135deg,#0f0c1a,#1a0a2e)',borderRadius:'var(--r3)',padding:'24px 28px',marginBottom:16,position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:-50,right:-50,width:220,height:220,borderRadius:'50%',background:'rgba(139,92,246,.1)',pointerEvents:'none'}}/>
            <div style={{position:'absolute',bottom:-30,left:60,width:140,height:140,borderRadius:'50%',background:'rgba(79,70,229,.08)',pointerEvents:'none'}}/>
            <div style={{fontSize:9,fontFamily:'var(--fm)',letterSpacing:3,color:'rgba(255,255,255,.3)',textTransform:'uppercase',marginBottom:10}}>{curQStr} · Aktif Çeyrek</div>
            <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:20,color:'rgba(255,255,255,.9)',lineHeight:1.4,marginBottom:16,maxWidth:460}}>
              "Büyüme daima konforsuzluğun tam sınırında gerçekleşir."
            </div>
            <div style={{display:'flex',gap:20}}>
              {[{ic:'✅',v:chs.filter(c=>c.status==='Tamamlandı').length,l:'Tamamlanan'},{ic:'🔥',v:chs.filter(c=>c.status==='Devam Ediyor').length,l:'Aktif'},{ic:'⏳',v:chs.filter(c=>c.status==='Bekliyor').length,l:'Sırada'}].map(s=>(
                <div key={s.l}><div style={{fontSize:20,fontWeight:700,color:'#fff'}}>{s.ic} {s.v}</div><div style={{fontSize:9,color:'rgba(255,255,255,.4)',fontFamily:'var(--fm)',letterSpacing:.5,marginTop:3}}>{s.l}</div></div>
              ))}
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {chs.map(ch=>{
              const isActive=ch.status==='Devam Ediyor',isDone=ch.status==='Tamamlandı';
              return(
                <div key={ch.id} className="card" style={{padding:'18px 20px',borderLeft:'4px solid '+(isDone?'var(--gn)':isActive?'#8b5cf6':'var(--bd)')}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                        <span style={{fontSize:26,flexShrink:0}}>{ch.badge||'⚡'}</span>
                        <div>
                          <div style={{fontWeight:700,fontSize:14,color:'var(--ink)'}}>{ch.title}</div>
                          <div style={{fontSize:10,color:'var(--ink5)',fontFamily:'var(--fm)',marginTop:2}}>{ch.quarter} · {ch.category}</div>
                        </div>
                      </div>
                      <div style={{fontSize:12.5,color:'var(--ink3)',lineHeight:1.65,marginBottom:10}}>{ch.desc}</div>
                      <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                        <span style={{fontSize:14,color:DC[ch.difficulty]||'var(--rd)',letterSpacing:2}}>{DIFF[ch.difficulty]}</span>
                        <span style={{fontSize:10,color:'var(--ink5)',fontFamily:'var(--fm)'}}>Zorluk {ch.difficulty}/5</span>
                        {isActive&&<span style={{fontSize:11,fontWeight:600,color:'#8b5cf6',background:'rgba(139,92,246,.1)',padding:'2px 9px',borderRadius:12}}>🔥 Devam Ediyor</span>}
                        {isDone&&<span style={{fontSize:11,fontWeight:600,color:'var(--gn)',background:'var(--gnb)',padding:'2px 9px',borderRadius:12}}>✅ Tamamlandı!</span>}
                      </div>
                      {ch.reflection&&<div style={{marginTop:10,padding:'9px 12px',background:'var(--gnb)',border:'1px solid var(--gnbd)',borderRadius:'var(--r)',fontSize:12,color:'var(--ink3)',fontStyle:'italic',lineHeight:1.55}}>💬 {ch.reflection}</div>}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:5,flexShrink:0,alignItems:'flex-end'}}>
                      <select value={ch.status} onChange={ev=>setD(prev=>({...prev,challenges:prev.challenges.map(x=>x.id===ch.id?{...x,status:ev.target.value}:x)}))} style={{fontSize:11,padding:'4px 8px',borderRadius:'var(--r)',border:'1px solid var(--bd)',background:'var(--sur)',fontFamily:'var(--ff)',cursor:'pointer'}}>
                        <option>Bekliyor</option><option>Devam Ediyor</option><option>Tamamlandı</option><option>Bırakıldı</option>
                      </select>
                      <button className="ibtn" style={{width:22,height:22,fontSize:11}} onClick={()=>setD(prev=>({...prev,challenges:prev.challenges.filter(x=>x.id!==ch.id)}))}>×</button>
                    </div>
                  </div>
                </div>
              );
            })}
            {chs.length===0&&<div className="card empty"><div className="empty-icon">⚡</div><div style={{fontWeight:600,marginBottom:4}}>İlk Challenge'ını Oluştur</div><div style={{fontSize:12,color:'var(--ink5)'}}>3 ayda bir kendini zorlayan, konfor alanının dışında bir meydan okuma belirle.</div></div>}
          </div>
        </div>
      );
    }

    default:return <div className="empty">Sayfa bulunamadı.</div>;
    }
  };

  /* ────────────────────── DETAIL PANEL ────────────────────── */
  const detailPanel=()=>{
    if(!detail)return null;
    const{type,item}=detail;
    const cur=(type==='goal'?D.goals:type==='book'?D.books:type==='coaching'?(D.coaching||[]):type==='journal'?D.journal:type==='note'?(D.notes||[]):type==='calEvent'?(D.calEvents||[]):[]).find(i=>i.id===item.id)||item;
    return(
      <div className="dover">
        <div className="dbg" onClick={()=>setDetail(null)}/>
        <div className="dpan">
          <div className="dhd">
            <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:15,color:'var(--ink)'}}>Detay</div>
            <button className="ibtn" onClick={()=>setDetail(null)}>×</button>
          </div>
          <div className="dpan-body">
            {type==='goal'&&(
              <div>
                {/* Title + tags */}
                <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontWeight:400,fontSize:19,marginBottom:8,lineHeight:1.3,color:'var(--ink)'}}>{cur.isFrog?'🐸 ':''}{cur.title}</div>
                <div style={{display:'flex',gap:5,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
                  {cur.category&&<span className={`cat-badge ${{İş:'cat-is',Sağlık:'cat-health',Finans:'cat-finance',Kişisel:'cat-personal'}[cur.category]||'cat-other'}`}>{cur.category}</span>}
                  <span className="tag tt">{cur.quarter}</span>
                  {cur.priority&&<span className="tag" style={{background:{Yüksek:'var(--rdb)',Orta:'var(--acb)',Düşük:'var(--gnb)'}[cur.priority],color:{Yüksek:'var(--rd)',Orta:'var(--ac)',Düşük:'var(--gn)'}[cur.priority],borderColor:{Yüksek:'var(--rdbd)',Orta:'var(--acbd)',Düşük:'var(--gnbd)'}[cur.priority]}}>{cur.priority}</span>}
                  {cur.deadline&&daysLeft(cur.deadline)!==null&&<span className={`tag ${daysLeft(cur.deadline)<0?'tr':daysLeft(cur.deadline)<14?'ta':''}`}>{daysLeft(cur.deadline)<0?`${-daysLeft(cur.deadline)}g geçti`:daysLeft(cur.deadline)+'g kaldı'}</span>}
                  <button className="btn btns btng" style={{marginLeft:'auto',fontSize:11}} onClick={()=>setModal({type:'goalEdit',gid:cur.id,item:cur})}>✏ Düzenle</button>
                  <button className="btn btnd btns" style={{fontSize:11}} onClick={()=>{if(confirm('Hedefi sil?')){delItem(cur,'goals');}}}>🗑</button>
                </div>

                {/* Stats row */}
                {(()=>{
                  const ap=cur.actionPlan||[];
                  const doneCnt=ap.filter(s=>s.done).length;
                  const p=pct(doneCnt,ap.length);
                  const overdueSt=ap.filter(s=>!s.done&&s.date&&daysLeft(s.date)<0).length;
                  return(
                    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
                      {[
                        {l:'Tamamlanan',v:`${doneCnt}/${ap.length}`,c:p>=70?'var(--gn)':p>=30?'var(--ac)':'var(--ink)'},
                        {l:'Genel İlerleme',v:`${p}%`,c:p>=70?'var(--gn)':p>=30?'var(--ac)':'var(--rd)'},
                        {l:'Geciken Adım',v:overdueSt,c:overdueSt>0?'var(--rd)':'var(--gn)'},
                      ].map(s=>(
                        <div key={s.l} className="goal-stat-box">
                          <div className="goal-stat-val" style={{color:s.c}}>{s.v}</div>
                          <div className="goal-stat-lbl">{s.l}</div>
                        </div>
                      ))}
                    </div>
                  );
                })()}

                {/* Progress bar */}
                {(()=>{const ap=cur.actionPlan||[];const p=pct(ap.filter(s=>s.done).length,ap.length);return(
                  <div style={{marginBottom:14}}>
                    <div className="pb" style={{height:7,borderRadius:4}}><div className="pf" style={{width:p+'%',background:p>=70?'var(--gn)':p>=30?'var(--ac)':'var(--ink3)',borderRadius:4}}/></div>
                  </div>
                );})()}

                {/* Description */}
                {cur.desc&&<p style={{fontSize:13,color:'var(--ink2)',lineHeight:1.8,marginBottom:14,padding:'10px 13px',background:'var(--bg2)',borderRadius:'var(--r)',border:'1px solid var(--bd)'}}>{cur.desc}</p>}

                {/* Measurable target */}
                {(cur.currentVal||cur.targetVal)&&(
                  <div style={{padding:'10px 13px',background:'var(--acb)',borderRadius:'var(--r)',border:'1px solid var(--acbd)',marginBottom:14,display:'flex',gap:12,alignItems:'center'}}>
                    <div style={{textAlign:'center'}}>
                      <div style={{fontSize:10,fontFamily:'var(--fm)',color:'var(--actext)',marginBottom:2}}>MEVCUT</div>
                      <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:17,color:'var(--ink3)'}}>{cur.currentVal}</div>
                    </div>
                    <div style={{flex:1,height:3,background:'var(--acbd)',borderRadius:2,position:'relative'}}>
                      <div style={{position:'absolute',left:0,top:0,height:'100%',background:'var(--ac)',borderRadius:2,width:(()=>{const ap=cur.actionPlan||[];return pct(ap.filter(s=>s.done).length,ap.length)+'%';})()}}/>
                    </div>
                    <div style={{textAlign:'center'}}>
                      <div style={{fontSize:10,fontFamily:'var(--fm)',color:'var(--actext)',marginBottom:2}}>HEDEF</div>
                      <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:17,color:'var(--ac)',fontWeight:600}}>{cur.targetVal}</div>
                    </div>
                  </div>
                )}

                {/* Date range */}
                {(cur.startDate||cur.deadline)&&(
                  <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14,fontSize:12.5,color:'var(--ink3)'}}>
                    <span>📅</span>
                    {cur.startDate&&<span>{fmtDate(cur.startDate)}</span>}
                    {cur.startDate&&cur.deadline&&<span style={{color:'var(--ink6)'}}>→</span>}
                    {cur.deadline&&<span style={{fontWeight:600}}>{fmtDate(cur.deadline)}</span>}
                  </div>
                )}

                {/* SMART Criteria */}
                <div className="slbl2" style={{marginBottom:8,display:'flex',alignItems:'center'}}>SMART Kriterleri <InfoTip text="SMART hedefler %42 daha fazla başarıya ulaşır (Dr. Gail Matthews araştırması). Specific=net, Measurable=ölçülebilir, Achievable=gerçekçi, Relevant=önemli, Time-bound=tarihli. Tüm 5 kriter dolarsa hedef gerçek bir plan olur." icon="?"/></div>
                <div className="smart-check-grid" style={{marginBottom:16}}>
                  {[
                    ['S','Özgül (Specific)',cur.specificText],
                    ['M','Ölçülebilir (Measurable)',cur.measurableText],
                    ['A','Ulaşılabilir (Achievable)',cur.achievableText],
                    ['R','İlgili (Relevant)',cur.relevantText],
                    ['T','Zamanlı (Time-bound)',cur.deadline?`Son tarih: ${fmtDate(cur.deadline)}`:null],
                  ].map(([k,l,v])=>(
                    <div key={k} className={`smart-check-item ${v?'met':'unmet'}`} style={k==='T'?{gridColumn:'1/-1'}:{}}>
                      <div style={{minWidth:20,height:20,borderRadius:'50%',background:v?'var(--gn)':'var(--bg3)',color:v?'#fff':'var(--ink5)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,fontFamily:'var(--fm)',flexShrink:0}}>{v?'✓':k}</div>
                      <div>
                        <div style={{fontSize:10,fontFamily:'var(--fm)',fontWeight:700,letterSpacing:.3,opacity:.65,marginBottom:2}}>{l}</div>
                        <div style={{fontSize:12,lineHeight:1.4}}>{v||<span style={{fontStyle:'italic',opacity:.5}}>Tanımlanmamış</span>}</div>
                      </div>
                    </div>
                  ))}
                </div>

                {/* Overdue warning */}
                {(()=>{const over=(cur.actionPlan||[]).filter(s=>!s.done&&s.date&&daysLeft(s.date)<0);return over.length>0?(
                  <div className="warning-banner">⚠ {over.length} eylem adımı gecikiyor: {over.map(s=>s.action).join(', ').slice(0,80)}</div>
                ):null;})()}

                {/* Action Plan */}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div className="slbl2" style={{marginBottom:0}}>Eylem Planı</div>
                  <div style={{display:'flex',gap:5}}>
                    <button className="btn btnxs btng" onClick={()=>exportActionPlanPDF(cur)}>🖨 PDF</button>
                    <button className="btn btnxs btng" onClick={()=>setModal({type:'apStep',gid:cur.id})}>+ Adım</button>
                  </div>
                </div>

                <div style={{display:'flex',flexDirection:'column',gap:0}}>
                  {(cur.actionPlan||[]).map((step,i)=>{
                    const stepDl=step.date?daysLeft(step.date):null;
                    const stepOverdue=!step.done&&step.date&&stepDl<0;
                    return(
                      <div key={step.id} style={{display:'flex',gap:12,padding:'10px 0',borderBottom:'1px solid var(--bg3)'}}>
                        {/* Node */}
                        <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
                          <div style={{width:22,height:22,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,fontFamily:'var(--fm)',
                            background:step.done?'var(--gn)':stepOverdue?'var(--rdb)':'var(--bg2)',
                            border:`2px solid ${step.done?'var(--gnbd)':stepOverdue?'var(--rdbd)':'var(--bd)'}`,
                            color:step.done?'#fff':stepOverdue?'var(--rd)':'var(--ink5)'}}>
                            {step.done?'✓':i+1}
                          </div>
                          {i<(cur.actionPlan||[]).length-1&&<div style={{width:1.5,flex:1,minHeight:10,background:'var(--bd)',marginTop:3}}/>}
                        </div>
                        {/* Content */}
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',gap:7,alignItems:'flex-start',marginBottom:4}}>
                            <input type="checkbox" className="chk" checked={step.done} onChange={()=>setD(prev=>({...prev,goals:prev.goals.map(x=>x.id===cur.id?{...x,actionPlan:(x.actionPlan||[]).map(y=>y.id===step.id?{...y,done:!y.done}:y)}:x)}))}/>
                            <div style={{flex:1}}>
                              <div style={{fontSize:13,fontWeight:step.done?400:500,color:step.done?'var(--ink4)':'var(--ink)',textDecoration:step.done?'line-through':'none',lineHeight:1.4}}>{step.action}</div>
                            </div>
                            <button className="ibtn" style={{width:24,height:24,fontSize:11,flexShrink:0,background:'var(--acb)',color:'var(--ac)',border:'1px solid var(--acbd)'}} title="Düzenle" onClick={()=>setModal({type:'apStepEdit',gid:cur.id,sid:step.id,step})}>✏</button>
                            <button className="ibtn" style={{width:20,height:20,fontSize:10,flexShrink:0}} onClick={()=>setD(prev=>({...prev,goals:prev.goals.map(x=>x.id===cur.id?{...x,actionPlan:(x.actionPlan||[]).filter(y=>y.id!==step.id)}:x)}))}>×</button>
                          </div>
                          <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginLeft:22}}>
                            {step.priority&&<span style={{fontSize:10,fontFamily:'var(--fm)',padding:'1px 6px',borderRadius:20,background:{Yüksek:'var(--rdb)',Orta:'var(--acb)',Düşük:'var(--gnb)'}[step.priority]||'var(--bg2)',color:{Yüksek:'var(--rd)',Orta:'var(--ac)',Düşük:'var(--gn)'}[step.priority]||'var(--ink4)',border:`1px solid ${{Yüksek:'var(--rdbd)',Orta:'var(--acbd)',Düşük:'var(--gnbd)'}[step.priority]||'var(--bd)'}`}}>{step.priority}</span>}
                            {step.responsible&&<span style={{fontSize:10,color:'var(--ink4)',background:'var(--bg2)',padding:'1px 6px',borderRadius:20,border:'1px solid var(--bd)',fontFamily:'var(--fm)'}}>👤 {step.responsible}</span>}
                            {step.date&&<span className="mono" style={{fontSize:10,color:stepOverdue?'var(--rd)':stepDl!==null&&stepDl<=3?'var(--ac)':'var(--ink5)'}}>📅 {fmtShort(step.date)}{stepOverdue?' ⚠':''}</span>}
                            {step.result&&<span style={{fontSize:10,color:'var(--ink4)',fontStyle:'italic'}}>→ {step.result}</span>}
                          </div>
                          {/* Progress bar for step */}
                          {step.progress!==undefined&&step.progress>0&&!step.done&&(
                            <div style={{marginLeft:22,marginTop:5}}>
                              <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                                <span style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--ink5)'}}>İlerleme</span>
                                <span style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--ink4)'}}>{step.progress}%</span>
                              </div>
                              <div className="pb" style={{height:3}}><div className="pf" style={{width:step.progress+'%',background:'var(--ac)'}}/></div>
                            </div>
                          )}
                          {/* Sub-steps */}
                          {(step.subSteps||[]).length>0&&(
                            <div style={{marginLeft:22,marginTop:7,padding:'8px 10px',background:'var(--bg2)',borderRadius:'var(--r)',border:'1px solid var(--bd)'}}>
                              <div style={{fontSize:9.5,fontFamily:'var(--fm)',color:'var(--ink5)',textTransform:'uppercase',letterSpacing:.5,marginBottom:5,fontWeight:700}}>Alt Adımlar — {(step.subSteps||[]).filter(ss=>ss.done).length}/{(step.subSteps||[]).length}</div>
                              {(step.subSteps||[]).map(ss=>(
                                <div key={ss.id} className="sub-step">
                                  <input type="checkbox" className="chk" checked={ss.done}
                                    onChange={()=>setD(prev=>({...prev,goals:prev.goals.map(x=>x.id===cur.id?{...x,actionPlan:(x.actionPlan||[]).map(y=>y.id===step.id?{...y,subSteps:(y.subSteps||[]).map(z=>z.id===ss.id?{...z,done:!z.done}:z)}:y)}:x)}))}/>
                                  <span style={{fontSize:12,color:ss.done?'var(--ink4)':'var(--ink)',textDecoration:ss.done?'line-through':'none',flex:1}}>{ss.text}</span>
                                  <button className="ibtn" style={{width:16,height:16,fontSize:9}}
                                    onClick={()=>setD(prev=>({...prev,goals:prev.goals.map(x=>x.id===cur.id?{...x,actionPlan:(x.actionPlan||[]).map(y=>y.id===step.id?{...y,subSteps:(y.subSteps||[]).filter(z=>z.id!==ss.id)}:y)}:x)}))}>×</button>
                                </div>
                              ))}
                              <div style={{marginTop:5}}>
                                <input placeholder="Alt adım ekle… (Enter)"
                                  style={{width:'100%',fontSize:11.5,padding:'4px 8px',borderRadius:'var(--r)',border:'1px dashed var(--bd)',fontFamily:'var(--ff)',background:'transparent'}}
                                  onKeyDown={ev=>{if(ev.key==='Enter'&&ev.target.value.trim()){const txt=ev.target.value.trim();setD(prev=>({...prev,goals:prev.goals.map(x=>x.id===cur.id?{...x,actionPlan:(x.actionPlan||[]).map(y=>y.id===step.id?{...y,subSteps:[...(y.subSteps||[]),{id:uid(),text:txt,done:false}]}:y)}:x)}));ev.target.value='';}}}/>
                              </div>
                            </div>
                          )}
                          {(step.subSteps||[]).length===0&&(
                            <div style={{marginLeft:22,marginTop:4}}>
                              <input placeholder="+ alt adım ekle… (Enter)"
                                style={{fontSize:11,padding:'3px 8px',borderRadius:'var(--r)',border:'1px dashed var(--bd)',fontFamily:'var(--ff)',background:'transparent',width:'100%'}}
                                onKeyDown={ev=>{if(ev.key==='Enter'&&ev.target.value.trim()){const txt=ev.target.value.trim();setD(prev=>({...prev,goals:prev.goals.map(x=>x.id===cur.id?{...x,actionPlan:(x.actionPlan||[]).map(y=>y.id===step.id?{...y,subSteps:[...(y.subSteps||[]),{id:uid(),text:txt,done:false}]}:y)}:x)}));ev.target.value='';}}}/>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                  {(cur.actionPlan||[]).length===0&&<div style={{padding:'16px 0',color:'var(--ink5)',fontSize:12,fontStyle:'italic',textAlign:'center'}}>Henüz eylem adımı yok. "+ Adım" ile ekle.</div>}
                </div>
              </div>
            )}
            {type==='book'&&(
              <div>
                <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontWeight:400,fontSize:17,marginBottom:3,color:'var(--ink)'}}>{cur.title}</div>
                <div style={{fontSize:13,color:'var(--ink4)',marginBottom:12}}>— {cur.author}</div>
                <div style={{display:'flex',gap:7,marginBottom:14,alignItems:'center'}}>
                  <select value={cur.status} style={{width:'auto',fontSize:12,padding:'4px 9px',borderRadius:20}} onChange={ev=>setD(prev=>({...prev,books:prev.books.map(x=>x.id===cur.id?{...x,status:ev.target.value}:x)}))}>
                    {BOOK_ST.map(s=><option key={s}>{s}</option>)}
                  </select>
                  {cur.status==='Bitti'&&<div style={{display:'flex',gap:1}}>{[1,2,3,4,5].map(r=><button key={r} style={{background:'none',border:'none',cursor:'pointer',fontSize:18,color:r<=(cur.rating||0)?cur.color||'var(--ac)':'var(--bg3)',padding:'0 1px',transition:'color .1s'}} onClick={()=>setD(prev=>({...prev,books:prev.books.map(x=>x.id===cur.id?{...x,rating:r}:x)}))}>★</button>)}</div>}
                </div>
                {cur.pagesTotal>0&&<div style={{marginBottom:14}}>
                  <div style={{display:'flex',gap:9,alignItems:'center',marginBottom:7}}>
                    <input type="number" value={cur.pagesDone||0} min={0} max={cur.pagesTotal} style={{width:75}} onChange={ev=>setD(prev=>({...prev,books:prev.books.map(x=>x.id===cur.id?{...x,pagesDone:parseInt(ev.target.value)||0}:x)}))}/>
                    <span style={{color:'var(--ink4)'}}>/ {cur.pagesTotal}</span>
                    <span className="mono" style={{color:cur.color||'var(--ac)',fontWeight:700}}>{pct(cur.pagesDone,cur.pagesTotal)}%</span>
                  </div>
                  <div className="pb" style={{height:6}}><div className="pf" style={{width:pct(cur.pagesDone,cur.pagesTotal)+'%',background:cur.color||'var(--ac)'}}/></div>
                </div>}
                <div className="slbl2">Notlar</div>
                <textarea rows={8} value={cur.notes||''} placeholder="Notlar, alıntılar, fikirler…" style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:14,lineHeight:1.8}} onChange={ev=>setD(prev=>({...prev,books:prev.books.map(x=>x.id===cur.id?{...x,notes:ev.target.value}:x)}))}/>
              </div>
            )}
            {type==='coaching'&&(
              <div>
                <div style={{fontSize:28,marginBottom:10}}>{TYPE_IC[cur.type]||'📋'}</div>
                <span className={`tag ${TYPE_CL[cur.type]||''}`} style={{marginBottom:12,display:'inline-flex'}}>{cur.type}</span>
                <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontWeight:400,fontSize:17,marginBottom:7,marginTop:10,color:'var(--ink)'}}>{cur.title}</div>
                {cur.category&&<div className="mono" style={{fontSize:11.5,color:'var(--ink4)',marginBottom:14}}>{cur.category}</div>}
                <div style={{fontSize:13.5,color:'var(--ink)',lineHeight:1.9,whiteSpace:'pre-line',fontFamily:'var(--fd)',fontStyle:'italic'}}>{cur.content}</div>
              </div>
            )}
            {type==='journal'&&<JEditor entry={cur} onSave={updated=>setD(prev=>({...prev,journal:prev.journal.map(e=>e.id===updated.id?updated:e)}))}/>}
            {type==='note'&&(
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:13}}>
                  <input value={cur.title||''} style={{fontSize:16,fontFamily:'var(--fd)',fontStyle:'italic',fontWeight:400,border:'none',background:'transparent',color:'var(--ink)',flex:1,padding:0,outline:'none'}} onChange={ev=>setD(prev=>({...prev,notes:(prev.notes||[]).map(n=>n.id===cur.id?{...n,title:ev.target.value,updatedAt:today()}:n)}))} placeholder="Not başlığı…"/>
                  <button className="ibtn" onClick={()=>setD(prev=>({...prev,notes:(prev.notes||[]).map(n=>n.id===cur.id?{...n,pinned:!n.pinned,updatedAt:today()}:n)}))}>📌</button>
                </div>
                <div style={{display:'flex',gap:5,marginBottom:13,flexWrap:'wrap'}}>
                  <span className="tag">{cur.category}</span>
                  {(cur.tags||[]).map(t=><span key={t} className="tag" style={{fontSize:10}}>{t}</span>)}
                  <span className="mono" style={{fontSize:9.5,color:'var(--ink5)'}}>Güncellendi: {cur.updatedAt||'—'}</span>
                </div>
                <RichEditor value={cur.content} onChange={html=>setD(prev=>({...prev,notes:(prev.notes||[]).map(n=>n.id===cur.id?{...n,content:html,updatedAt:today()}:n)}))} placeholder="Notunuzu yazın…" minH={320}/>
              </div>
            )}
            {type==='calEvent'&&(
              <div>
                <div style={{display:'flex',gap:10,marginBottom:5}}>
                  <div style={{width:14,height:14,borderRadius:'50%',background:cur.color,marginTop:4,flexShrink:0}}/>
                  <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontWeight:400,fontSize:18,flex:1,color:'var(--ink)'}}>{cur.title}</div>
                </div>
                <div className="mono" style={{fontSize:12,color:'var(--ink4)',marginBottom:13}}>{fmtDate(cur.date)}{cur.time?` · ${cur.time}`:''}{cur.endTime?` – ${cur.endTime}`:''}</div>
                {cur.recurrence&&cur.recurrence!=='Tekrar Yok'&&<div style={{marginBottom:11}}><span className="rec-badge">{RECURRENCE_IC[cur.recurrence]} {cur.recurrence}</span></div>}
                {cur.notes&&<div style={{padding:'9px 12px',background:'var(--bg2)',borderRadius:'var(--r)',border:'1px solid var(--bd)',marginBottom:13,fontSize:13,color:'var(--ink3)'}}>{cur.notes}</div>}
                {(cur.attendees||[]).length>0&&<div style={{marginBottom:13}}><div className="slbl2">Katılımcılar</div><div style={{display:'flex',flexWrap:'wrap',gap:4}}>{cur.attendees.map(a=><span key={a} className="assignee-chip">👤 {a}</span>)}</div></div>}
                <button className="btn btnd btns" onClick={()=>{if(confirm('Sil?')){setD(prev=>({...prev,calEvents:(prev.calEvents||[]).filter(x=>x.id!==cur.id)}));setDetail(null);}}}>🗑 Etkinliği Sil</button>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  /* ────────────────────── MODAL ────────────────────── */
  const modalEl=()=>{
    if(!modal)return null;
    const t=modal.type;
    const TITLES={goal:'Yeni SMART Hedef',goalEdit:'✏ Hedefi Düzenle',todo:'Yeni Görev',todoEdit:'✏ Görevi Düzenle',challenge:'⚡ Yeni Challenge',subtask:'Alt Görev Ekle',subtaskEdit:'✏ Alt Görevi Düzenle',book:'Kitap Ekle',habit:'Yeni Alışkanlık',kanban:'Yeni Kart',journal:'Journal Girişi',quote:'Alıntı Ekle',coaching:'Koçluk İçeriği',bookmark:'Yer İmi Ekle',note:'Yeni Not',calEvent:'Yeni Etkinlik',todoCat:'Kategori Yönet',apStep:'Eylem Adımı Ekle',apStepEdit:'✏ Eylem Adımı Düzenle'};
    return(
      <div className="backdrop" onClick={ev=>{if(ev.target===ev.currentTarget)setModal(null);}}>
        <div className={`modal${t==='goal'||t==='coaching'||t==='todo'||t==='challenge'?' mlg':''}`}>
          <div className="mhd">
            <span className="mtit">{TITLES[t]||t}</span>
            <button className="ibtn" onClick={()=>setModal(null)}>×</button>
          </div>
          <form onSubmit={submit}>
            <div className="mbd">
              {t==='goal'&&<>
                <div className="fr2"><div className="field"><label>Hedef Başlığı *</label><input name="title" required placeholder="Hedefiniz nedir?"/></div><div className="field"><label>Kategori</label><select name="category"><option>İş</option><option>Sağlık</option><option>Finans</option><option>Kişisel</option><option>Diğer</option></select></div></div>
                <div className="field"><label>Hedef Açıklaması</label><textarea name="desc" rows={2} placeholder="Detaylı açıklama — bu hedefe neden ulaşmak istiyorsunuz?"/></div>
                <div className="fr3"><div className="field"><label>Çeyrek</label><select name="quarter"><option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option></select></div><div className="field"><label>Öncelik</label><select name="priority"><option>Yüksek</option><option>Orta</option><option>Düşük</option></select></div><div className="field"><label>🐸 Yüksek Öncelik</label><div style={{display:'flex',alignItems:'center',gap:8,height:38}}><input type="checkbox" name="isFrog" className="chk"/><span style={{fontSize:12.5,color:'var(--ink3)'}}>Kurbağayı Ye!</span></div></div></div>
                <div className="fr2"><div className="field"><label>Başlangıç Tarihi</label><input type="date" name="startDate"/></div><div className="field"><label>Bitiş Tarihi (T)</label><input type="date" name="deadline"/></div></div>
                <div className="fr2"><div className="field"><label>Mevcut Değer</label><input name="currentVal" placeholder="ör. %18, 49$ MRR"/></div><div className="field"><label>Hedef Değer</label><input name="targetVal" placeholder="ör. %12, 500$ MRR"/></div></div>
                <div style={{background:'var(--bg2)',borderRadius:'var(--r)',padding:'12px 14px',marginBottom:12,border:'1px solid var(--bd)'}}>
                  <div className="slbl2" style={{marginBottom:10}}>SMART Kriterleri</div>
                  <div className="field"><label>S — Özgül (Specific)</label><input name="specificText" placeholder="Hedef tam olarak nedir? Ne, kim, nerede, nasıl?"/></div>
                  <div className="field"><label>M — Ölçülebilir (Measurable)</label><input name="measurableText" placeholder="Başarıyı nasıl ölçeceksiniz? Hangi metrik?"/></div>
                  <div className="field"><label>A — Ulaşılabilir (Achievable)</label><input name="achievableText" placeholder="Bu hedef gerçekçi mi? Hangi kaynaklar mevcut?"/></div>
                  <div className="field" style={{marginBottom:0}}><label>R — İlgili (Relevant)</label><input name="relevantText" placeholder="Bu hedef genel stratejinizle nasıl bağlantılı?"/></div>
                </div>
              </>}
              {t==='todo'&&<>
                <div className="field"><label>Görev Adı *</label><input name="text" required placeholder="Ne yapılacak?"/></div>
                <div className="field"><label>Açıklama / Notlar</label><textarea name="notes" rows={2} placeholder="Görev ile ilgili detaylar, bağlam, kaynaklar…"/></div>
                <div className="fr3"><div className="field"><label>Öncelik</label><select name="priority"><option value="Normal">🔵 Normal</option><option value="Önemli">🟠 Önemli</option><option value="Acil & Önemli">🚩 Acil & Önemli</option><option value="Düşük">⚪ Düşük</option></select></div><div className="field"><label>Durum</label><select name="status"><option value="Bekliyor">⏳ Bekliyor</option><option value="Yapılıyor">⚙️ Yapılıyor</option><option value="Tamamlandı">✅ Tamamlandı</option><option value="İptal">🚫 İptal</option></select></div><div className="field"><label>Kategori</label><select name="category">{(D.todoCats||TODO_CATS_DEFAULT).map(c=><option key={c}>{c}</option>)}</select></div></div>
                <div className="fr3"><div className="field"><label>Başlangıç</label><input type="date" name="start"/></div><div className="field"><label>Bitiş</label><input type="date" name="end"/></div><div className="field"><label>Tahmini Süre (sa)</label><input type="number" name="estHours" min={0.5} step={0.5} placeholder="2"/></div></div>
                <div className="fr2"><div className="field"><label>Ağırlık % <span style={{fontSize:10,color:'var(--ink5)',fontWeight:400}}>(proje içindeki önem)</span></label><input type="number" name="weight" min={1} max={100} defaultValue={10} placeholder="10"/></div><div className="field"><label>Tekrar</label><select name="recurrence">{RECURRENCE.map(r=><option key={r}>{r}</option>)}</select></div></div>
                <div className="fr2"><div className="field"><label>Ana Sorumlu</label><select name="mainAssignee"><option value="">— Seç</option>{(D.teamMembers||TEAM_MEMBERS).map(m=><option key={m}>{m}</option>)}</select></div><div className="field"><label>Alt Sorumlular (virgülle)</label><input name="subAssignees" placeholder="Ali, Ayşe…"/></div></div>
              </>}
              {t==='subtask'&&<>
                <div className="field"><label>Alt Görev *</label><input name="text" required/></div>
                <div className="field"><label>Sorumlu</label><select name="assignee"><option value="">— Seç</option>{(D.teamMembers||[]).map(m=><option key={m}>{m}</option>)}</select></div>
              </>}
              {t==='book'&&<>
                <div className="field"><label>Başlık *</label><input name="title" required/></div>
                <div className="fr2"><div className="field"><label>Yazar</label><input name="author"/></div><div className="field"><label>Sayfa Sayısı</label><input type="number" name="pagesTotal"/></div></div>
                <div className="fr2"><div className="field"><label>Başlangıç</label><input type="date" name="startDate"/></div><div className="field"><label>Hedef Bitiş</label><input type="date" name="endDate"/></div></div>
                <div className="field"><label>Renk</label><input type="color" name="color" defaultValue="#4F46E5" style={{height:38,borderRadius:'var(--r)',cursor:'pointer'}}/></div>
              </>}
              {t==='habit'&&<>
                <div className="field"><label>Ad *</label><input name="name" required placeholder="Alışkanlık adı"/></div>
                <div className="fr2"><div className="field"><label>Emoji</label><input name="emoji" placeholder="🎯" maxLength={2}/></div><div className="field"><label>Renk</label><input type="color" name="color" defaultValue="#4F46E5" style={{height:38,borderRadius:'var(--r)',cursor:'pointer'}}/></div></div>
              </>}
              {t==='kanban'&&<>
                <div className="field"><label>Kart *</label><input name="text" required/></div>
                <div className="fr2"><div className="field"><label>Öncelik</label><select name="priority"><option>Normal</option><option>Önemli</option><option value="Acil & Önemli">Acil & Önemli</option></select></div><div className="field"><label>Sütun</label><select name="column"><option value="todo">Yapılacak</option><option value="inprogress">Devam</option><option value="review">İnceleme</option><option value="done">Bitti</option></select></div></div>
                <div className="field"><label>Etiketler (virgülle)</label><input name="tags" placeholder="Dev, Tasarım"/></div>
              </>}
              {t==='journal'&&<>
                <div className="fr2"><div className="field"><label>Kategori</label><input name="category" placeholder="Şükran, Yansıma…"/></div><div className="field"><label>Ruh Hali</label><select name="mood">{MOODS.map((m,i)=><option key={i} value={i}>{m} {MOOD_L[i]}</option>)}</select></div></div>
                <p style={{fontSize:12,color:'var(--ink4)',fontStyle:'italic'}}>Kaydet sonrası editör açılır.</p>
              </>}
              {t==='quote'&&<>
                <div className="field"><label>Alıntı *</label><textarea name="text" rows={3} required/></div>
                <div className="fr2"><div className="field"><label>Yazar</label><input name="author"/></div><div className="field"><label>Kategori</label><input name="category"/></div></div>
                <div className="fr2"><div className="field"><label>Arka Plan</label><input type="color" name="bg" defaultValue="#18160F" style={{height:38,borderRadius:'var(--r)',cursor:'pointer'}}/></div><div className="field"><label>Yazı</label><input type="color" name="fg" defaultValue="#F0EDE4" style={{height:38,borderRadius:'var(--r)',cursor:'pointer'}}/></div></div>
              </>}
              {t==='coaching'&&<>
                <div className="fr2"><div className="field"><label>Başlık *</label><input name="title" required/></div><div className="field"><label>Tür</label><select name="type">{COACH_T.map(c=><option key={c}>{c}</option>)}</select></div></div>
                <div className="field"><label>Kategori</label><input name="category" placeholder="Üretkenlik…"/></div>
                <div className="field"><label>İçerik *</label><textarea name="content" rows={6} required/></div>
              </>}
              {t==='bookmark'&&<>
                <div className="field"><label>URL *</label><input name="url" placeholder="https://example.com" required style={{fontFamily:'var(--fm)',fontSize:12}}/></div>
                <div className="fr2"><div className="field"><label>Ad</label><input name="title"/></div><div className="field"><label>Kategori</label><input name="category" placeholder="Dev, AI…"/></div></div>
                <div className="field"><label>Amaç</label><input name="purpose" placeholder="Bu siteyi neden kaydediyorsunuz?"/></div>
                <div className="field"><label>Notlar</label><textarea name="notes" rows={2}/></div>
              </>}
              {t==='note'&&<>
                <div className="field"><label>Başlık *</label><input name="title" required placeholder="Not başlığı…"/></div>
                <div className="fr2"><div className="field"><label>Kategori</label><select name="category">{NOTE_CATS.map(c=><option key={c}>{c}</option>)}</select></div><div className="field"><label>Renk</label><select name="color"><option value="var(--sur)">⬜ Varsayılan</option><option value="#FBF2E8">🟡 Sarı</option><option value="#EEF3FB">🔵 Mavi</option><option value="#EAF5EF">🟢 Yeşil</option><option value="#F2EDFB">🟣 Mor</option><option value="#FBF0EE">🔴 Kırmızı</option></select></div></div>
                <div className="field"><label>Etiketler (virgülle)</label><input name="tags" placeholder="proje, fikir…"/></div>
                <p style={{fontSize:12,color:'var(--ink4)',fontStyle:'italic'}}>Kaydettikten sonra zengin metin editörü açılacak.</p>
              </>}
              {t==='calEvent'&&<>
                <div className="field"><label>Başlık *</label><input name="title" required/></div>
                <div className="fr2"><div className="field"><label>Tarih *</label><input type="date" name="date" defaultValue={today()} required/></div><div className="field"><label>Tekrar</label><select name="recurrence">{RECURRENCE.map(r=><option key={r}>{r}</option>)}</select></div></div>
                <div className="fr2"><div className="field"><label>Başlangıç Saati</label><input type="time" name="time"/></div><div className="field"><label>Bitiş Saati</label><input type="time" name="endTime"/></div></div>
                <div className="field"><label>Renk</label><input type="color" name="color" defaultValue="#1A52B8" style={{height:38,borderRadius:'var(--r)',cursor:'pointer'}}/></div>
                <div className="field"><label>Katılımcılar (virgülle)</label><input name="attendees" placeholder="Ali Yılmaz, Ayşe…"/></div>
                <div className="field"><label>Notlar</label><textarea name="notes" rows={2}/></div>
              </>}
              {t==='todoCat'&&<>
                <div className="field"><label>Yeni Kategori Adı *</label><input name="cat" required placeholder="ör. Eğitim"/></div>
                <div style={{marginTop:10}}>
                  <div className="slbl2">Mevcut Kategoriler</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                    {(D.todoCats||[]).map(c=>(
                      <div key={c} style={{display:'flex',gap:4,alignItems:'center',padding:'3px 9px',borderRadius:20,background:'var(--bg2)',border:'1px solid var(--bd)',fontSize:12}}>
                        {c}
                        <button type="button" style={{border:'none',background:'none',cursor:'pointer',color:'var(--rd)',fontWeight:700,fontSize:12,padding:'0 2px',lineHeight:1}} onClick={()=>{if(confirm('Sil?'))setD(prev=>({...prev,todoCats:(prev.todoCats||[]).filter(x=>x!==c)}))}}>×</button>
                      </div>
                    ))}
                  </div>
                </div>
              </>}
              {t==='apStep'&&<>
                <div className="field"><label>Aksiyon Adımı *</label><textarea name="action" rows={2} required placeholder="Bu adımda ne yapılacak?"/></div>
                <div className="fr2"><div className="field"><label>Öncelik</label><select name="priority"><option>Yüksek</option><option>Orta</option><option>Düşük</option></select></div><div className="field"><label>Sorumlu</label><select name="responsible"><option value="">— Seç</option>{(D.teamMembers||TEAM_MEMBERS).map(m=><option key={m}>{m}</option>)}</select></div></div>
                <div className="fr2"><div className="field"><label>Hedef Tarih</label><input type="date" name="date"/></div><div className="field"><label>Beklenen Sonuç</label><input name="result" placeholder="Ne elde edilecek?"/></div></div>
                <div className="field"><label>Notlar</label><textarea name="notes" rows={2}/></div>
              </>}
              {t==='apStepEdit'&&(()=>{const s=modal.step||{};return(<>
                <div className="field"><label>Aksiyon Adımı *</label><textarea name="action" rows={2} required defaultValue={s.action}/></div>
                <div className="fr2">
                  <div className="field"><label>Öncelik</label>
                    <select name="priority" defaultValue={s.priority||'Orta'}>
                      <option>Yüksek</option><option>Orta</option><option>Düşük</option>
                    </select>
                  </div>
                  <div className="field"><label>Sorumlu</label>
                    <select name="responsible" defaultValue={s.responsible||''}>
                      <option value="">— Seç</option>
                      {(D.teamMembers||TEAM_MEMBERS).map(m=><option key={m}>{m}</option>)}
                    </select>
                  </div>
                </div>
                <div className="fr2">
                  <div className="field"><label>Hedef Tarih</label><input type="date" name="date" defaultValue={s.date}/></div>
                  <div className="field"><label>Beklenen Sonuç</label><input name="result" defaultValue={s.result} placeholder="Ne elde edilecek?"/></div>
                </div>
                <div className="field"><label>İlerleme % (0–100)</label><input type="number" name="progress" min={0} max={100} defaultValue={s.progress||0}/></div>
                <div className="field"><label>Notlar</label><textarea name="notes" rows={2} defaultValue={s.notes}/></div>
              </>);})()}
              {t==='subtaskEdit'&&(()=>{const s=modal.item||{};return(<>
                <div className="field"><label>Alt Görev Adı *</label><input name="text" required defaultValue={s.text}/></div>
                <div className="field"><label>Sorumlu</label>
                  <select name="assignee" defaultValue={s.assignee||''}>
                    <option value="">— Seç</option>
                    {(D.teamMembers||TEAM_MEMBERS).map(m=><option key={m}>{m}</option>)}
                  </select>
                </div>
              </>);})()}
              {t==='goalEdit'&&(()=>{const g=modal.item||{};return(<>
                <div className="fr2"><div className="field"><label>Hedef Başlığı *</label><input name="title" required defaultValue={g.title}/></div><div className="field"><label>Çeyrek</label><select name="quarter" defaultValue={g.quarter||'Q1'}><option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option></select></div></div>
                <div className="field"><label>Açıklama</label><textarea name="desc" rows={3} defaultValue={g.desc}/></div>
                <div className="fr2"><div className="field"><label>Öncelik</label><select name="priority" defaultValue={g.priority||'Orta'}><option>Yüksek</option><option>Orta</option><option>Düşük</option></select></div><div className="field"><label>Kategori</label><select name="category" defaultValue={g.category||'İş'}><option>İş</option><option>Sağlık</option><option>Finans</option><option>Kişisel</option><option>Diğer</option></select></div></div>
                <div className="fr2"><div className="field"><label>Başlangıç</label><input type="date" name="startDate" defaultValue={g.startDate}/></div><div className="field"><label>Son Tarih</label><input type="date" name="deadline" defaultValue={g.deadline}/></div></div>
                <div className="fr2"><div className="field"><label>Mevcut Değer</label><input name="currentVal" defaultValue={g.currentVal} placeholder="ör. 49$ MRR"/></div><div className="field"><label>Hedef Değer</label><input name="targetVal" defaultValue={g.targetVal} placeholder="ör. 500$ MRR"/></div></div>
                <div style={{padding:'10px 12px',background:'var(--acb)',border:'1px solid var(--acbd)',borderRadius:'var(--r)',marginBottom:4}}>
                  <div style={{fontSize:10,fontFamily:'var(--fm)',color:'var(--actext)',fontWeight:700,marginBottom:8,letterSpacing:.5}}>SMART KRİTERLERİ</div>
                  <div className="field" style={{marginBottom:7}}><label>S — Özgül: Ne tam olarak?</label><textarea name="specificText" rows={2} defaultValue={g.specificText} placeholder="ör. Nijerya'da 15 B2B müşteri kazanmak"/></div>
                  <div className="field" style={{marginBottom:7}}><label>M — Ölçülebilir: Nasıl ölçeceğiz?</label><textarea name="measurableText" rows={2} defaultValue={g.measurableText} placeholder="ör. İmzalanan sözleşme sayısı"/></div>
                  <div className="field" style={{marginBottom:7}}><label>A — Ulaşılabilir: Bu mümkün mü?</label><textarea name="achievableText" rows={2} defaultValue={g.achievableText} placeholder="ör. Mevcut kaynaklarla yapılabilir"/></div>
                  <div className="field"><label>R — İlgili: Neden önemli?</label><textarea name="relevantText" rows={2} defaultValue={g.relevantText} placeholder="ör. Ana büyüme stratejimizle uyumlu"/></div>
                </div>
                <div className="fr2" style={{marginTop:4}}>
                  <div className="field"><label>Kişi Adı / İş Kolu</label><input name="responsible" defaultValue={g.responsible}/></div>
                  <div className="field"><label style={{display:'flex',gap:7,alignItems:'center',cursor:'pointer'}}><input type="checkbox" name="isFrog" defaultChecked={!!g.isFrog}/> 🐸 Kurbağa Hedefi (En önemli)</label></div>
                </div>
                <div className="field"><label>Notlar</label><textarea name="notes" rows={2} defaultValue={g.notes}/></div>
              </>);})()}
              {t==='todoEdit'&&(()=>{const td=modal.item||{};return(<>
                <div className="field"><label>Görev Adı *</label><input name="text" required defaultValue={td.text}/></div>
                <div className="field"><label>Açıklama / Notlar</label><textarea name="notes" rows={2} defaultValue={td.notes}/></div>
                <div className="fr3">
                  <div className="field"><label>Öncelik</label><select name="priority" defaultValue={td.priority||'Normal'}><option value="Normal">🔵 Normal</option><option value="Önemli">🟠 Önemli</option><option value="Acil & Önemli">🚩 Acil & Önemli</option><option value="Düşük">⚪ Düşük</option></select></div>
                  <div className="field"><label>Durum</label><select name="status" defaultValue={td.status||'Bekliyor'}><option value="Bekliyor">⏳ Bekliyor</option><option value="Yapılıyor">⚙️ Yapılıyor</option><option value="Tamamlandı">✅ Tamamlandı</option><option value="İptal">🚫 İptal</option></select></div>
                  <div className="field"><label>Kategori</label><select name="category" defaultValue={td.category}>{(D.todoCats||TODO_CATS_DEFAULT).map(c=><option key={c}>{c}</option>)}</select></div>
                </div>
                <div className="fr3">
                  <div className="field"><label>Başlangıç</label><input type="date" name="start" defaultValue={td.start}/></div>
                  <div className="field"><label>Bitiş</label><input type="date" name="end" defaultValue={td.end}/></div>
                  <div className="field"><label>Tahmini Süre (sa)</label><input type="number" name="estHours" min={0.5} step={0.5} defaultValue={td.estHours}/></div>
                </div>
                <div className="fr2">
                  <div className="field"><label>Ağırlık %</label><input type="number" name="weight" min={1} max={100} defaultValue={td.weight||10}/></div>
                  <div className="field"><label>Tekrar</label><select name="recurrence" defaultValue={td.recurrence||'Tekrar Yok'}>{RECURRENCE.map(r=><option key={r}>{r}</option>)}</select></div>
                </div>
                <div className="fr2">
                  <div className="field"><label>Ana Sorumlu</label><select name="mainAssignee" defaultValue={td.mainAssignee||''}><option value="">— Seç</option>{(D.teamMembers||TEAM_MEMBERS).map(m=><option key={m}>{m}</option>)}</select></div>
                  <div className="field"><label>Alt Sorumlular (virgülle)</label><input name="subAssignees" defaultValue={(td.subAssignees||[]).join(', ')}/></div>
                </div>
              </>);})()}
              {t==='challenge'&&(()=>{
                const curQ2=(()=>{const m=new Date().getMonth();return 'Q'+Math.ceil((m+1)/3)+' '+new Date().getFullYear();})();
                return(<>
                  <div className="field"><label>Başlık *</label><input name="challenge_title" placeholder="3 ayda 50km koş…" required/></div>
                  <div className="field"><label>Açıklama / Kurallar</label><textarea name="challenge_desc" rows={3} placeholder="Detaylar, kurallar, nasıl ölçeceğiz…"/></div>
                  <div className="fr2">
                    <div className="field"><label>Kategori</label><select name="challenge_cat"><option>Zihin</option><option>Beden</option><option>Cesaret</option><option>İnşa</option><option>Sosyal</option><option>Yaratıcı</option></select></div>
                    <div className="field"><label>Zorluk</label><select name="challenge_diff"><option value="3">3 — Orta</option><option value="4">4 — Zor</option><option value="5">5 — Çılgın</option><option value="2">2 — Kolay</option></select></div>
                  </div>
                  <div className="fr2">
                    <div className="field"><label>Çeyrek</label><input name="challenge_quarter" defaultValue={curQ2}/></div>
                    <div className="field"><label>Badge Emoji</label><input name="challenge_badge" placeholder="⚡" maxLength={2}/></div>
                  </div>
                  <div className="fr2">
                    <div className="field"><label>Başlangıç</label><input name="challenge_start" type="date"/></div>
                    <div className="field"><label>Bitiş</label><input name="challenge_end" type="date"/></div>
                  </div>
                </>);
              })()}
            </div>
            <div className="mft">
              <button type="button" className="btn btng" onClick={()=>setModal(null)}>İptal</button>
              <button type="submit" className="btn btnp">Kaydet</button>
            </div>
          </form>
        </div>
      </div>
    );
  };

  /* ────────────────────── RENDER ────────────────────── */
  return(
    <div className="app">
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="logo">
          <div className="lmark">
            <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
              <path d="M9 2L11.2 7H16.5L12.2 10.3L13.9 15.5L9 12.2L4.1 15.5L5.8 10.3L1.5 7H6.8L9 2Z" fill="white"/>
            </svg>
          </div>
          <div>
            <div className="lname">FocusUp Pro</div>
            <div className="lver">PERSONAL OS · V6</div>
          </div>
        </div>
        <div className="sbody">
          <Nav id="dashboard" label="Dashboard" ic="◈"/>
          <Nav id="review" label="Haftalık İnceleme" ic="↗"/>
          <Nav id="coach" label="AI Koç" ic="🧠"/>
          
          <div className="nsec">Planlama</div>
          <Nav id="goals" label="Smart Hedefler" ic="🎯"/>
          <Nav id="todos" label="Görevler & Takvim" ic="☐" badge={overdue}/>
          <Nav id="kanban" label="Kanban" ic="⊞"/>
          <Nav id="habits" label="Alışkanlıklar" ic="◐" soft={`${todayH}/${D.habits.length}`}/>
          <div className="nsec">Bilgi & İçerik</div>
          <Nav id="notes" label="Notlar" ic="📝" soft={(D.notes||[]).length}/>
          <Nav id="books" label="Okuma Listesi" ic="📚"/>
          <Nav id="journal" label="Journal" ic="✍️"/>
          <Nav id="quotes" label="Alıntılar" ic="❝"/>
          <Nav id="routines" label="Rutinler" ic="🔄"/>
          <Nav id="bookmarks" label="Yer İmleri" ic="🔖" soft={(D.bookmarks||[]).length}/>
          <div className="nsec">Gelişim</div>
          <Nav id="challenges" label="Challenges" ic="⚡"/>
          <Nav id="coaching" label="Koçluk Merkezi" ic="🧭"/>
          <Nav id="settings" label="Ayarlar" ic="⚙"/>
        </div>
        <div className="sfoot">
          <button style={{display:'flex',alignItems:'center',gap:7,padding:'7px 10px',borderRadius:'var(--r)',cursor:'pointer',width:'100%',border:'none',background:'none',color:'var(--ink4)',fontSize:12.5,fontFamily:'var(--ff)',transition:'all .15s'}}
            onClick={()=>setDark(d=>!d)}
            onMouseEnter={ev=>ev.currentTarget.style.background='var(--bg3)'}
            onMouseLeave={ev=>ev.currentTarget.style.background='none'}>
            <span style={{fontSize:13}}>{dark?'☀️':'🌙'}</span>
            <span>{dark?'Aydınlık':'Karanlık'} Mod</span>
            <span className="mono" style={{marginLeft:'auto',fontSize:9,letterSpacing:.5,opacity:.5}}>{dark?'LIGHT':'DARK'}</span>
          </button>
          <div className="sfrow" style={{marginTop:4}}>
            <button className="btn btnxs btng" style={{flex:1,justifyContent:'center'}} onClick={()=>exportJSON(D)}>⬇ Yedek</button>
            <label className="btn btnxs btng" style={{flex:1,justifyContent:'center',cursor:'pointer'}}>⬆ Aktar
              <input type="file" style={{display:'none'}} accept=".json" onChange={ev=>{const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{setD(JSON.parse(e.target.result));}catch{alert('Geçersiz dosya.');}};r.readAsText(f);}}/>
            </label>
          </div>
        </div>
      </aside>

      {/* Main */}
      <div className="main">
        {/* Topbar */}
        <div className="topbar">
          <div className="topdate">
            <span className="mono" style={{fontSize:11}}>{new Date().toLocaleDateString('tr-TR',{weekday:'short',day:'2-digit',month:'short'})} · H{weekNum()}</span>
          </div>
          <div className="ticker-wrap">
            {curQ&&<span key={quoteIdx} className="ticker-text">"{curQ.text.slice(0,80)}{curQ.text.length>80?'…':''}" — {curQ.author}</span>}
          </div>
          {(GAS_URL||GAS_MODE)&&(
            <div style={{display:'flex',alignItems:'center',gap:5,fontSize:10.5,fontFamily:'var(--fm)',letterSpacing:.3,
              color:gasStatus==='error'?'var(--rd)':gasStatus==='saving'?'var(--ac)':gasStatus==='saved'?'var(--gn)':'var(--ink5)',
              padding:'3px 8px',borderRadius:20,border:'1px solid var(--bd)',background:'var(--sur)',cursor:'default',flexShrink:0}}
              title={gasStatus==='error'?'Bağlantı hatası - veriler kaydedilemiyor':gasStatus==='loading'?'Yükleniyor...':gasStatus==='saving'?'Kaydediliyor...':gasStatus==='saved'?'Kaydedildi':'Bağlı'}>
              <span>{gasStatus==='loading'?'⏳':gasStatus==='saving'?'💾':gasStatus==='saved'?'✅':gasStatus==='error'?'⚠️':'☁️'}</span>
              <span>{gasStatus==='loading'?'Yükleniyor':gasStatus==='saving'?'Kaydediyor':gasStatus==='saved'?'Kaydedildi':gasStatus==='error'?'Hata':'Bağlı'}</span>
            </div>
          )}
          <div className="bellw">
            <button className="ibtn" onClick={()=>setTab('todos')} title="Gecikmiş görevler">🔔</button>
            {overdue>0&&<div className="bellb">{overdue}</div>}
          </div>
          <button className="ibtn" onClick={()=>setQnote(v=>!v)} title="Hızlı not">✎</button>
          <div className="search-wrap">
            <span className="search-ic">⌕</span>
            <input value={search} onChange={ev=>setSearch(ev.target.value)} placeholder="Ara…"/>
          </div>
          <div className="topdate">
            <Clock style={{fontFamily:'var(--fm)',fontSize:12,letterSpacing:-.5}}/>
          </div>
        </div>

        {/* Content */}
        <div className="content">{page()}</div>
      </div>

      {/* Quick note panel */}
      {qnote&&(
        <div className="qwrap">
          <div className="qpan">
            <div className="slbl2" style={{marginBottom:9}}>Hızlı Not</div>
            <textarea value={qtext} onChange={ev=>setQtext(ev.target.value)}
              onKeyDown={ev=>{if(ev.key==='Enter'&&(ev.metaKey||ev.ctrlKey)){if(qtext.trim()){upd({...D,quickNotes:[{id:uid(),text:qtext.trim(),createdAt:today()},...(D.quickNotes||[])]},`Not eklendi`,'b');setQtext('');setQnote(false);}}}}
              placeholder="Fikri yakala… (⌘+Enter)" rows={3} style={{marginBottom:8,fontFamily:'var(--fd)',fontStyle:'italic',fontSize:14}} autoFocus/>
            <div style={{display:'flex',gap:5}}>
              <button className="btn btnp btns" style={{flex:1}} onClick={()=>{if(qtext.trim()){upd({...D,quickNotes:[{id:uid(),text:qtext.trim(),createdAt:today()},...(D.quickNotes||[])]},`Not eklendi`,'b');setQtext('');setQnote(false);}}}>Kaydet</button>
              <button className="btn btns btng" onClick={()=>{setQnote(false);setQtext('');}}>İptal</button>
            </div>
            {(D.quickNotes||[]).length>0&&(
              <div style={{marginTop:11,borderTop:'1px solid var(--bd)',paddingTop:9}}>
                <div className="slbl2">Son Notlar</div>
                {(D.quickNotes||[]).slice(0,3).map(n=>(
                  <div key={n.id} style={{fontSize:12,color:'var(--ink3)',padding:'4px 0',borderBottom:'1px solid var(--bg3)',display:'flex',justifyContent:'space-between',gap:6,alignItems:'flex-start'}}>
                    <span style={{flex:1,fontFamily:'var(--fd)',fontStyle:'italic'}}>{n.text}</span>
                    <button style={{border:'none',background:'none',cursor:'pointer',color:'var(--ink5)',fontSize:11,flexShrink:0}} onClick={()=>setD(prev=>({...prev,quickNotes:(prev.quickNotes||[]).filter(x=>x.id!==n.id)}))}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {detailPanel()}
      {modalEl()}
      {printQ&&<StudioModal q={printQ} quotes={D.quotes||[]} onClose={()=>setPrintQ(null)} D={D} setD={setD}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
