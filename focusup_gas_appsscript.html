<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FocusUp Pro v6</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Cabinet+Grotesk:wght@300;400;500;600;700;800&family=Commit+Mono:ital,wght@0,100;0,400;1,100&display=swap" rel="stylesheet"/>
<style>
/* Apps Script Web App tam ekran fix */
html, body { height: 100% !important; margin: 0; padding: 0; overflow: hidden !important; }
#root { width: 100vw; height: 100vh; overflow: hidden; display: block; }
.app { width: 100vw !important; }
</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══════════════════════════════════════════════
   FOCUSUP PRO — Design System v7
   Aesthetic: Linear × Notion — Clean SaaS
   ══════════════════════════════════════════════ */
:root{
  --ff:'Cabinet Grotesk',sans-serif;
  --fd:'Instrument Serif',serif;
  --fm:'Commit Mono',monospace;

  /* Clean neutral grays — Notion/Linear inspired */
  --bg:#F7F7F8;
  --bg2:#F0F0F1;
  --bg3:#E5E5E6;
  --sur:#FFFFFF;
  --sur2:#FAFAFA;
  --bd:#E5E5E5;
  --bd2:#D4D4D4;

  --ink:#111111;
  --ink2:#1F1F1F;
  --ink3:#404040;
  --ink4:#737373;
  --ink5:#A3A3A3;
  --ink6:#D4D4D4;

  /* Accent: Indigo — purposeful, confident */
  --ac:#4F46E5;
  --ac2:#6366F1;
  --ac3:#818CF8;
  --acb:#EEF2FF;
  --acbd:#C7D2FE;
  --actext:#3730A3;

  /* Semantic */
  --gn:#16A34A;--gnb:#F0FDF4;--gnbd:#BBF7D0;
  --rd:#DC2626;--rdb:#FEF2F2;--rdbd:#FECACA;
  --bl:#2563EB;--blb:#EFF6FF;--blbd:#BFDBFE;
  --pu:#7C3AED;--pub:#F5F3FF;--pubd:#DDD6FE;
  --tl:#0D9488;--tlb:#F0FDFA;--tlbd:#99F6E4;
  --or:#EA580C;--orb:#FFF7ED;--orbd:#FED7AA;

  /* Shadows — subtle, precise */
  --sh:0 1px 2px rgba(0,0,0,.05),0 1px 4px rgba(0,0,0,.04);
  --shm:0 4px 12px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --shl:0 8px 24px rgba(0,0,0,.1),0 4px 8px rgba(0,0,0,.05);

  /* Radius — slightly tighter */
  --r:5px;--r2:8px;--r3:10px;--r4:14px;

  /* 8px spacing grid */
  --sp1:4px;--sp2:8px;--sp3:12px;--sp4:16px;--sp5:20px;--sp6:24px;--sp8:32px;

  --sw:212px;--th:48px;
}

[data-dark]{
  --bg:#0A0A0A;--bg2:#111111;--bg3:#1A1A1A;
  --sur:#141414;--sur2:#1C1C1C;
  --bd:#262626;--bd2:#383838;
  --ink:#FAFAFA;--ink2:#E5E5E5;--ink3:#A3A3A3;--ink4:#737373;--ink5:#404040;--ink6:#262626;
  --ac:#6366F1;--ac2:#818CF8;--ac3:#A5B4FC;--acb:#1E1B4B;--acbd:#312E81;--actext:#A5B4FC;
  --gn:#22C55E;--gnb:#052E16;--gnbd:#166534;
  --rd:#EF4444;--rdb:#1C0A0A;--rdbd:#7F1D1D;
  --bl:#3B82F6;--blb:#0C1A3A;--blbd:#1E3A6E;
  --pu:#A78BFA;--pub:#1E1040;--pubd:#4C1D95;
  --tl:#2DD4BF;--tlb:#021B18;--tlbd:#0F4440;
  --or:#F97316;--orb:#1C0A00;--orbd:#7C2D12;
  --sh:0 1px 3px rgba(0,0,0,.5);
  --shm:0 4px 16px rgba(0,0,0,.6);
  --shl:0 12px 32px rgba(0,0,0,.7);
}

html,body{height:100%;overflow:hidden}
body{
  font-family:var(--ff);background:var(--bg);color:var(--ink);
  font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;
  letter-spacing:-.01em;
}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes tickerScroll{0%{opacity:0;transform:translateY(4px)}10%,90%{opacity:1;transform:none}100%{opacity:0;transform:translateY(-4px)}}

.afu{animation:fadeUp .18s cubic-bezier(.22,1,.36,1)}
.afi{animation:fadeIn .12s ease}
.asi{animation:slideIn .18s cubic-bezier(.22,1,.36,1)}
.asi2{animation:scaleIn .16s cubic-bezier(.22,1,.36,1)}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{
  width:var(--sw);min-width:var(--sw);
  background:var(--sur);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;flex-shrink:0;
}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Topbar */
.topbar{
  height:var(--th);min-height:var(--th);
  background:var(--sur);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 var(--sp5);gap:var(--sp2);flex-shrink:0;
}
.content{flex:1;overflow-y:auto;padding:var(--sp5) var(--sp6) 48px}

/* Logo */
.logo{padding:var(--sp3) var(--sp3) var(--sp3);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:var(--sp2)}
.lmark{width:26px;height:26px;border-radius:6px;background:var(--ac);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lname{font-size:13.5px;font-weight:600;color:var(--ink);letter-spacing:-.3px;line-height:1}
.lver{font-size:9px;color:var(--ink5);font-family:var(--fm);letter-spacing:.4px;margin-top:1px}

/* Nav — Linear-style */
.sbody{flex:1;overflow-y:auto;padding:var(--sp2) var(--sp1) var(--sp2)}
.nsec{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--ink5);padding:var(--sp3) var(--sp2) var(--sp1);font-family:var(--fm)}
.ni{
  display:flex;align-items:center;gap:var(--sp2);padding:5px var(--sp2);
  border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--ink4);
  border:none;background:none;width:100%;text-align:left;font-family:var(--ff);font-weight:400;
  transition:background .08s,color .08s;
}
.ni:hover{background:var(--bg2);color:var(--ink2)}
.ni.on{background:var(--bg2);color:var(--ink);font-weight:500}
.ni-ic{font-size:14px;width:18px;text-align:center;flex-shrink:0;opacity:.55}
.ni.on .ni-ic{opacity:1}
.ni-bd{margin-left:auto;background:var(--rd);color:#fff;font-size:8px;font-weight:600;padding:1px 5px;border-radius:10px;font-family:var(--fm);min-width:16px;text-align:center}
.ni-soft{margin-left:auto;color:var(--ink5);font-size:10px;font-family:var(--fm)}
.sfoot{padding:var(--sp2) var(--sp1) var(--sp3);border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:2px}
.sfrow{display:flex;gap:var(--sp1)}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:var(--sp1);
  padding:5px 11px;border-radius:var(--r);
  border:1px solid var(--bd);background:var(--sur);color:var(--ink3);
  font-family:var(--ff);font-size:12.5px;font-weight:500;cursor:pointer;
  transition:all .08s;white-space:nowrap;line-height:1.4;
}
.btn:hover{background:var(--bg2);border-color:var(--bd2);color:var(--ink)}
.btn:active{background:var(--bg3)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btnp{background:var(--ac);color:#fff;border-color:var(--ac)}
.btnp:hover{background:var(--ac2);border-color:var(--ac2);color:#fff}
.btns{padding:4px 9px;font-size:12px}
.btnxs{padding:2px 7px;font-size:11px;border-radius:4px}
.btng{background:transparent;border-color:transparent;color:var(--ink4)}
.btng:hover{background:var(--bg2);border-color:transparent;color:var(--ink)}
.btnd{color:var(--rd);border-color:var(--rdbd);background:var(--rdb)}
.btnd:hover{background:var(--rd);color:#fff;border-color:var(--rd)}
.ibtn{
  width:26px;height:26px;padding:0;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r);border:none;background:transparent;cursor:pointer;
  color:var(--ink5);font-size:12px;transition:all .08s;flex-shrink:0;
}
.ibtn:hover{background:var(--bg2);color:var(--ink)}

/* Cards */
.card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r3)}
.cp{padding:var(--sp4) var(--sp5)}
.ch{cursor:pointer}
.ch:hover{border-color:var(--bd2);box-shadow:var(--sh)}

/* Stat card — clean numbers */
.scard{padding:var(--sp4) var(--sp4)}
.snum{font-size:24px;font-weight:600;line-height:1;margin-bottom:2px;letter-spacing:-.5px}
.slbl{font-size:10px;color:var(--ink5);font-weight:500;text-transform:uppercase;letter-spacing:.06em;font-family:var(--fm);margin-top:3px}
.sdesc{font-size:11px;color:var(--ink5);margin-top:2px}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:var(--r);font-size:11px;font-weight:500;background:var(--bg2);color:var(--ink4);border:1px solid var(--bd)}
.tg{background:var(--gnb);color:var(--gn);border-color:var(--gnbd)}
.tr{background:var(--rdb);color:var(--rd);border-color:var(--rdbd)}
.ta{background:var(--acb);color:var(--ac);border-color:var(--acbd)}
.tb{background:var(--blb);color:var(--bl);border-color:var(--blbd)}
.tp{background:var(--pub);color:var(--pu);border-color:var(--pubd)}
.tt{background:var(--tlb);color:var(--tl);border-color:var(--tlbd)}

/* Forms */
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:11px;font-weight:500;color:var(--ink4)}
input,textarea,select{
  background:var(--bg2);border:1px solid var(--bd);color:var(--ink);
  font-family:var(--ff);border-radius:var(--r);padding:7px 10px;
  font-size:13px;outline:none;width:100%;
  transition:border-color .08s,box-shadow .08s;
  -webkit-appearance:none;
}
input:focus,textarea:focus,select:focus{
  border-color:var(--ac);background:var(--sur);
  box-shadow:0 0 0 2px var(--acbd);
}
input::placeholder,textarea::placeholder{color:var(--ink5)}
select option{background:var(--sur)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp2)}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--sp2)}
.chk{
  width:14px;height:14px;border-radius:3px;
  border:1.5px solid var(--bd2);background:var(--sur);cursor:pointer;
  appearance:none;flex-shrink:0;position:relative;transition:all .08s;
}
.chk:checked{background:var(--ac);border-color:var(--ac)}
.chk:checked::after{content:'✓';position:absolute;color:#fff;font-size:8px;font-weight:700;top:50%;left:50%;transform:translate(-50%,-50%)}

/* Progress */
.pb{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.22,1,.36,1)}

/* Modal */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;display:flex;align-items:center;justify-content:center;padding:var(--sp5);backdrop-filter:blur(4px);animation:fadeIn .1s ease}
.modal{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r4);width:100%;max-width:520px;box-shadow:var(--shl);max-height:90vh;display:flex;flex-direction:column;animation:scaleIn .16s cubic-bezier(.22,1,.36,1)}
.mlg{max-width:640px}
.mhd{padding:var(--sp3) var(--sp5);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mtit{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.2px}
.mbd{padding:var(--sp4);overflow-y:auto;flex:1}
.mft{padding:var(--sp3) var(--sp4);border-top:1px solid var(--bd);display:flex;gap:var(--sp2);justify-content:flex-end;flex-shrink:0}

/* Drawer */
.dover{position:fixed;inset:0;z-index:200;display:flex}
.dbg{flex:1;background:rgba(0,0,0,.12);backdrop-filter:blur(2px)}
.dpan{width:400px;background:var(--sur);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;animation:slideIn .18s cubic-bezier(.22,1,.36,1);box-shadow:var(--shl)}
.dhd{padding:var(--sp3) var(--sp4);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dpan-body{flex:1;overflow-y:auto;padding:var(--sp4)}

/* Page headers */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:var(--sp4);gap:var(--sp3)}
.ptit{font-size:18px;font-weight:600;color:var(--ink);line-height:1.2;letter-spacing:-.4px}
.psub{font-size:12px;color:var(--ink5);margin-top:2px}
.slbl2{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink5);margin-bottom:var(--sp2);font-family:var(--fm)}

/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp3)}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp3)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp2)}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--sp2)}

/* Filter bar */
.fbar{display:flex;align-items:center;gap:var(--sp1);flex-wrap:wrap;margin-bottom:var(--sp3)}
.chip{padding:3px 10px;border-radius:var(--r);font-size:12px;font-weight:500;border:1px solid var(--bd);background:var(--sur);cursor:pointer;transition:all .08s;color:var(--ink4);font-family:var(--ff)}
.chip:hover{border-color:var(--bd2);color:var(--ink);background:var(--bg2)}
.chip.on{background:var(--ink);color:var(--sur);border-color:var(--ink)}
[data-dark] .chip.on{background:var(--sur2);color:var(--ink);border-color:var(--bd2)}
.clbl{font-size:10px;color:var(--ink5);font-family:var(--fm)}
.div{height:1px;background:var(--bd);margin:var(--sp4) 0}
.empty{padding:40px var(--sp5);text-align:center;color:var(--ink5);font-size:13px}
.empty-icon{font-size:24px;opacity:.3;margin-bottom:var(--sp2)}
.mono{font-family:var(--fm)}
.serif{font-family:var(--fd);font-style:italic}

/* Table */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px var(--sp3);font-size:10px;font-weight:600;color:var(--ink5);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);font-family:var(--fm)}
td{padding:9px var(--sp3);border-bottom:1px solid var(--bg3);font-size:13px;vertical-align:middle}
tr:last-child td{border:none}
tbody tr:hover td{background:var(--bg2)}

/* Priority flags */
.flag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:var(--r);font-size:11px;font-weight:500;border:1px solid}
.flag-red{background:var(--rdb);color:var(--rd);border-color:var(--rdbd)}
.flag-orange{background:var(--orb);color:var(--or);border-color:var(--orbd)}
.flag-blue{background:var(--blb);color:var(--bl);border-color:var(--blbd)}
.flag-gray{background:var(--bg2);color:var(--ink5);border-color:var(--bd)}

/* Timeline */
.tl-wrap{position:relative;padding-left:22px}
.tl-wrap::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--bd)}
.tl-dot{position:absolute;left:0;width:14px;height:14px;border-radius:50%;background:var(--ac);border:2px solid var(--sur);z-index:1;top:4px}
.tl-dot.done{background:var(--gn)}
.rec-badge{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:var(--r);font-size:10px;font-family:var(--fm);background:var(--pub);color:var(--pu);border:1px solid var(--pubd)}
.assignee-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:var(--r);font-size:11px;background:var(--bg2);color:var(--ink4);border:1px solid var(--bd)}

/* Kanban */
.kcol{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r3);padding:var(--sp3);min-height:200px}
.kchd{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp3);padding-bottom:var(--sp2);border-bottom:1px solid var(--bd)}
.kcard{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r2);padding:10px var(--sp3);margin-bottom:var(--sp2);cursor:grab;transition:border-color .08s;box-shadow:var(--sh)}
.kcard:hover{border-color:var(--bd2);box-shadow:var(--shm)}
.kcard:active{cursor:grabbing}
.kcol.drag-over{border-color:var(--ac);background:var(--acb)}

/* Rich editor */
.ewrap{border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;background:var(--sur)}
.etbar{display:flex;align-items:center;gap:1px;padding:5px var(--sp2);border-bottom:1px solid var(--bd);background:var(--bg2);flex-wrap:wrap}
.etbtn{padding:3px 6px;border-radius:var(--r);border:none;background:transparent;color:var(--ink4);cursor:pointer;font-size:12px;font-weight:600;transition:all .08s;font-family:var(--ff)}
.etbtn:hover{background:var(--bg3);color:var(--ink)}
.etsep{width:1px;height:14px;background:var(--bd);margin:0 3px;flex-shrink:0}
.ebody{overflow-y:auto;max-height:400px}
.ebody [contenteditable]{font-family:var(--fd);font-size:14px;font-style:italic;line-height:1.85;color:var(--ink);outline:none;min-height:240px;padding:var(--sp5) var(--sp6)}
.ebody [contenteditable]:empty::before{content:attr(data-ph);color:var(--ink5);pointer-events:none}
.ewc{padding:4px 10px;font-size:9px;color:var(--ink5);font-family:var(--fm);background:var(--bg2);border-top:1px solid var(--bd);text-align:right}

/* Todo item */
.todo-item{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r2);transition:border-color .08s}
.todo-item:hover{border-color:var(--bd2)}
.todo-hover-show{opacity:0;transition:opacity .1s}
.todo-item:hover .todo-hover-show{opacity:1}

/* Habit */
.hdot{width:19px;height:19px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:var(--bg3);color:var(--ink5);transition:all .12s;flex-shrink:0}
.hdot.done{color:#fff}
.hdot.today:not(.done){border:1.5px dashed var(--bd2);cursor:pointer}
.hdot.today:not(.done):hover{border-color:var(--ac);background:var(--acb)}

/* Pomodoro */
.pom-ring{transition:stroke-dashoffset 1s linear}

/* Calendar */
.cal-ev{border-radius:3px;padding:2px 5px;font-size:11px;font-weight:500;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .1s}
.cal-ev:hover{opacity:.75}

/* Notes */
.note-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r3);transition:border-color .08s}
.note-card:hover{border-color:var(--bd2);box-shadow:var(--sh)}

/* Quote */
.q-card{border-radius:var(--r3);padding:var(--sp4) var(--sp4);display:flex;flex-direction:column;justify-content:space-between;min-height:140px;cursor:pointer;transition:box-shadow .15s}
.q-card:hover{box-shadow:var(--shm)}

/* Ticker */
.ticker-wrap{flex:1;overflow:hidden;text-align:center;padding:0 var(--sp4)}
.ticker-text{font-family:var(--fd);font-style:italic;font-size:12px;color:var(--ink5);display:inline-block;animation:tickerScroll 8s ease infinite}

/* Print */
.pbdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);animation:fadeIn .12s ease}

/* Quick note */
.qwrap{position:fixed;bottom:var(--sp5);right:var(--sp5);z-index:100}
.qpan{position:absolute;bottom:46px;right:0;width:268px;background:var(--sur);border:1px solid var(--bd);border-radius:var(--r3);box-shadow:var(--shl);padding:var(--sp3);animation:scaleIn .14s ease;transform-origin:bottom right}

/* Bell */
.bellw{position:relative;display:inline-flex}

const exportTodosExcel=(todos)=>{
  const rows=todos.map(t=>({'Görev':t.text,'Öncelik':t.priority,'Kategori':t.category,'Durum':t.done?'Tamamlandı':'Bekliyor','Ana Sorumlu':t.mainAssignee||'','Alt Sorumlular':(t.subAssignees||[]).join(', '),'Başlangıç':t.start||'','Bitiş':t.end||'','Notlar':t.notes||'','Tekrar':t.recurrence||''}));
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,'Görevler',ws);XLSX.writeFile(wb,'Görevler.xlsx');
};

function Fav({url,title,size=18}){

  try{const h=new URL(url.startsWith('http')?url:'https://'+url).hostname;furl=`https://www.google.com/s2/favicons?domain=${h}&sz=32`;}catch{}

/* ── Rich Editor ── */
function RichEditor({value,onChange,minH=200,placeholder='Notunuzu yazın…'}){
  const ref=useRef(null);

  const ex=(cmd,val=null)=>{document.execCommand(cmd,false,val);ref.current?.focus();};
  const btns=[{l:'B',c:'bold',s:{fontWeight:700}},{l:'İ',c:'italic',s:{fontStyle:'italic'}},{l:'U',c:'underline',s:{textDecoration:'underline'}},null,{l:'H2',c:'formatBlock',v:'h2'},{l:'H3',c:'formatBlock',v:'h3'},null,{l:'• Liste',c:'insertUnorderedList'},{l:'1. Liste',c:'insertOrderedList'},null,{l:'Temizle',c:'removeFormat'}];
  return(
    <div className="ewrap" style={{fontFamily:'var(--ff)'}}>
      <div className="etbar">{btns.map((b,i)=>b===null?<div key={i} className="etsep"/>:<button key={i} className="etbtn" type="button" style={b.s||{}} onClick={()=>ex(b.c,b.v||null)}>{b.l}</button>)}</div>
      <div className="ebody">
        <div ref={ref} contentEditable suppressContentEditableWarning data-ph={placeholder}

}

/* ── Progress Ring ── */
function Ring({size=80,stroke=6,pct,color='var(--ac)',bg='var(--bg3)',children}){
  const r=size/2-stroke;
  const circ=2*Math.PI*r;
  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bg} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={String(circ)} strokeDashoffset={String(circ*(1-pct/100))}
          strokeLinecap="round" className="pom-ring"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>{children}</div>
    </div>
  );
}

/* ── Mini sparkline ── */
function Sparkline({data,color='var(--ac)',height=32,width=120}){
  if(!data||data.length<2)return null;
  const max=Math.max(...data,1);
  const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-(v/max)*height}`).join(' ');
  return(
    <svg width={width} height={height} style={{overflow:'visible'}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity=".7"/>
      <circle cx={(data.length-1)/(data.length-1)*width} cy={height-(data[data.length-1]/max)*height} r="3" fill={color}/>
    </svg>
  );
}

}

function TimeBlockTab({D,setD}){
  const[tbStart,setTbStart]=useState('09:00');
  const[tbEnd,setTbEnd]=useState('10:00');
  const[tbLabel,setTbLabel]=useState('');
  const[tbColor,setTbColor]=useState('#4F46E5');
  const addBlock=()=>{
    if(!tbStart||!tbEnd||!tbLabel.trim())return;
    setD(prev=>({...prev,timeBlocks:[...(prev.timeBlocks||[]),{id:uid(),start:tbStart,end:tbEnd,label:tbLabel.trim(),color:tbColor}]}));
    setTbLabel('');
  };
  return(
    <div>
      <div style={{marginBottom:12,padding:'12px 16px',background:'var(--blb)',border:'1px solid var(--blbd)',borderRadius:'var(--r2)',display:'flex',gap:10,alignItems:'center'}}>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:'var(--bl)',marginBottom:2,display:'flex',alignItems:'center',gap:6}}>⏰ Zaman Bloklama <InfoTip text="Cal Newport'un Deep Work kitabından: Günü 1-2 saatlik bloklara bölerek her bloğa tek görev atayın. %40 daha derin çalışma sağlar." icon="?"/></div>
          <div style={{fontSize:12,color:'var(--ink4)'}}>Görevleri saatlere yerleştirerek proaktif çalışın.</div>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:2,marginBottom:14}}>
        {['09','10','11','12','13','14','15','16','17','18'].map(hr=>{
          const block=(D.timeBlocks||[]).find(b=>b.start.startsWith(hr));
          return(
            <div key={hr} style={{display:'flex',gap:8,alignItems:'stretch',minHeight:40}}>
              <div className="mono" style={{width:40,fontSize:10,color:'var(--ink5)',flexShrink:0,paddingTop:11,textAlign:'right'}}>{hr}:00</div>
              <div style={{width:1,background:'var(--bd)',flexShrink:0}}/>
              {block?(
                <div style={{flex:1,padding:'6px 12px',background:block.color+'18',borderRadius:'var(--r)',borderLeft:`3px solid ${block.color}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div>
                    <div style={{fontSize:12.5,fontWeight:600,color:'var(--ink)'}}>{block.label}</div>
                    <div className="mono" style={{fontSize:9.5,color:'var(--ink5)'}}>{block.start} – {block.end}</div>
                  </div>
                  <button className="ibtn" style={{width:20,height:20,fontSize:10}} onClick={()=>setD(prev=>({...prev,timeBlocks:(prev.timeBlocks||[]).filter(x=>x.id!==block.id)}))}>×</button>
                </div>
              ):(
                <div style={{flex:1,borderRadius:'var(--r)',border:'1px dashed var(--bg3)',display:'flex',alignItems:'center',padding:'0 12px',opacity:.4}}>
                  <span style={{fontSize:11,color:'var(--ink5)',fontFamily:'var(--fm)'}}>boş</span>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{padding:'14px 16px',background:'var(--bg2)',borderRadius:'var(--r2)',border:'1px solid var(--bd)'}}>
        <div style={{fontSize:12,fontWeight:600,color:'var(--ink)',marginBottom:10}}>Yeni Blok Ekle</div>
        <div className="fr3" style={{marginBottom:8}}>
          <div className="field"><label>Başlangıç</label><input type="time" value={tbStart} onChange={e=>setTbStart(e.target.value)}/></div>
          <div className="field"><label>Bitiş</label><input type="time" value={tbEnd} onChange={e=>setTbEnd(e.target.value)}/></div>
          <div className="field"><label>Renk</label><input type="color" value={tbColor} onChange={e=>setTbColor(e.target.value)} style={{height:38,borderRadius:'var(--r)',cursor:'pointer'}}/></div>
        </div>
        <div className="field" style={{marginBottom:10}}><label>Aktivite</label>
          <input value={tbLabel} onChange={e=>setTbLabel(e.target.value)} placeholder="Bu saatte ne yapılacak?"
            onKeyDown={e=>{if(e.key==='Enter')addBlock();}}/>
        </div>
        <button className="btn btnp" onClick={addBlock} disabled={!tbLabel.trim()}>+ Blok Ekle</button>
      </div>
    </div>
  );
}

/* ────────────────────── CALENDAR PAGE (top-level component) ────────────────────── */
function CalPage({D,setD,setDetail,setModal,calView,setCalView,calDate,setCalDate}){
  const events=D.calEvents||[];
  const baseDate=new Date(calDate+'T12:00');
  const weekStart=new Date(baseDate);weekStart.setDate(weekStart.getDate()-weekStart.getDay()+1);
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);return d.toISOString().split('T')[0];});
  const monthStart=new Date(baseDate.getFullYear(),baseDate.getMonth(),1);
  const monthDays=[];
  const firstDay=(monthStart.getDay()||7)-1;
  for(let i=0;i<firstDay;i++){const d=new Date(monthStart);d.setDate(d.getDate()-firstDay+i);monthDays.push({date:d.toISOString().split('T')[0],cur:false});}
  const dInMonth=new Date(baseDate.getFullYear(),baseDate.getMonth()+1,0).getDate();
  for(let i=1;i<=dInMonth;i++){const d=new Date(baseDate.getFullYear(),baseDate.getMonth(),i);monthDays.push({date:d.toISOString().split('T')[0],cur:true});}
  const getEventsFor=date=>events.filter(ev=>{if(ev.date===date)return true;if(ev.recurrence==='Haftalık'){const evDay=new Date(ev.date+'T12:00').getDay();const qDay=new Date(date+'T12:00').getDay();return evDay===qDay&&ev.date<=date;}if(ev.recurrence==='Günlük'&&ev.date<=date)return true;if(ev.recurrence==='Aylık'){const evD=new Date(ev.date+'T12:00').getDate();const qD=new Date(date+'T12:00').getDate();return evD===qD&&ev.date<=date;}return false;});
  const navDate=delta=>{const d=new Date(calDate+'T12:00');if(calView==='week')d.setDate(d.getDate()+delta*7);else if(calView==='month')d.setMonth(d.getMonth()+delta);else d.setDate(d.getDate()+delta);setCalDate(d.toISOString().split('T')[0]);};
  const lbl=calView==='month'?new Date(calDate+'T12:00').toLocaleDateString('tr-TR',{month:'long',year:'numeric'}):calView==='week'?`${fmtShort(weekDays[0])} – ${fmtShort(weekDays[6])}`:fmtDate(calDate);
  const tdStr=today();
  return(
    <div>
      <div className="ph" style={{marginBottom:12}}>
        <div><div className="ptit" style={{fontSize:15}}>Takvim</div></div>
        <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{background:'var(--bg2)',borderRadius:'var(--r)',border:'1px solid var(--bd)',display:'flex',overflow:'hidden'}}>
            {['day','week','month'].map(v=><button key={v} onClick={()=>setCalView(v)} style={{padding:'5px 11px',border:'none',background:calView===v?'var(--ac)':'transparent',color:calView===v?'#fff':'var(--ink3)',cursor:'pointer',fontFamily:'var(--ff)',fontSize:12,fontWeight:500,transition:'all .15s'}}>{v==='day'?'Gün':v==='week'?'Hafta':'Ay'}</button>)}
          </div>
          <button className="ibtn" onClick={()=>navDate(-1)}>‹</button>
          <span style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:14,minWidth:140,textAlign:'center',color:'var(--ink)'}}>{lbl}</span>
          <button className="ibtn" onClick={()=>navDate(1)}>›</button>
          <button className="btn btns btng" onClick={()=>setCalDate(today())}>Bugün</button>
          <button className="btn btnp btns" onClick={()=>setModal({type:'calEvent'})}>+ Etkinlik</button>
        </div>
      </div>
      {calView==='month'&&(
        <div className="card" style={{overflow:'hidden'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',borderBottom:'1px solid var(--bd)',background:'var(--bg2)'}}>
            {['Pt','Sa','Ça','Pe','Cu','Ct','Pz'].map(d=><div key={d} className="mono" style={{padding:'9px',textAlign:'center',fontSize:9,color:'var(--ink5)',fontWeight:700,letterSpacing:1}}>{d}</div>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
            {monthDays.map((day,i)=>{
              const dayEvs=getEventsFor(day.date);const isT=day.date===tdStr;
              return(
                <div key={i} style={{minHeight:80,borderRight:'1px solid var(--bg3)',borderBottom:'1px solid var(--bg3)',padding:'5px 4px',background:!day.cur?'var(--bg2)':isT?'var(--acb)':undefined}}>

  /* ────────────────────── NOTES PAGE ────────────────────── */

                      style={{opacity:t.done?.5:depBlocked?.7:1,borderLeft:`3px solid ${(PRI_CFG[t.priority]||{}).color||'var(--bd)'}`}}
                      draggable
                      onDragStart={ev=>{ev.dataTransfer.setData('todoId',String(t.id));ev.currentTarget.classList.add('dragging');}}
                      onDragEnd={ev=>ev.currentTarget.classList.remove('dragging')}
                      onDragOver={ev=>{ev.preventDefault();ev.currentTarget.classList.add('drop-zone-active');}}
                      onDragLeave={ev=>ev.currentTarget.classList.remove('drop-zone-active')}
                      onDrop={ev=>{
                        ev.currentTarget.classList.remove('drop-zone-active');
                        const dragId=parseInt(ev.dataTransfer.getData('todoId'));
                        if(dragId===t.id)return;
                        setD(prev=>{
                          const ts=[...prev.todos];
                          const fromIdx=ts.findIndex(x=>x.id===dragId);
                          const toIdx=ts.findIndex(x=>x.id===t.id);
                          if(fromIdx<0||toIdx<0)return prev;
                          const [moved]=ts.splice(fromIdx,1);ts.splice(toIdx,0,moved);
                          return{...prev,todos:ts};
                        });
                      }}>
                      <div style={{padding:'10px 14px',display:'flex',alignItems:'center',gap:8,cursor:'pointer',minHeight:52}} onClick={()=>setExpTask(exp?null:t.id)} tabIndex={0} onKeyDown={ev=>{if(ev.key===' '||ev.key==='Enter'){ev.preventDefault();setExpTask(exp?null:t.id);}}}>
                        {/* Drag handle */}
                        <span className="drag-handle" title="Sürükle ile yeniden sırala" onClick={ev=>ev.stopPropagation()} style={{fontSize:13,color:'var(--ink6)',flexShrink:0}}>⠿</span>
                        <input type="checkbox" className="chk" checked={!!t.done} onChange={()=>togTodo(t.id)} onClick={ev=>ev.stopPropagation()} style={{flexShrink:0}}/>
                        {/* Priority color dot */}
                        <span style={{width:8,height:8,borderRadius:'50%',background:(PRI_CFG[t.priority]||{}).color||'var(--bd)',flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0,overflow:'hidden'}}>
                          {/* Title row */}
                          <div style={{fontWeight:t.done?400:600,textDecoration:t.done?'line-through':'none',fontSize:13,color:t.done?'var(--ink4)':'var(--ink)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',marginBottom:2}}>{t.text}</div>
                          {/* Meta row — compact single line */}
                          <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'nowrap',overflow:'hidden'}}>
                            <span className={`status-badge ${stCls}`} style={{fontSize:9.5,padding:'1px 6px',flexShrink:0}}>{stIc} {t.status||'Bekliyor'}</span>
                            <span className="tag" style={{fontSize:9.5,padding:'1px 6px',flexShrink:0,whiteSpace:'nowrap'}}>{t.category}</span>
                            {t.mainAssignee&&<span style={{fontSize:10,color:'var(--ink4)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:80,flexShrink:1}}>👤 {t.mainAssignee.split(' ')[0]}</span>}
                            {t.end&&<span className="mono" style={{fontSize:9.5,color:over?'var(--rd)':dl!==null&&dl<=2?'var(--ac)':'var(--ink5)',whiteSpace:'nowrap',flexShrink:0}}>📅 {fmtShort(t.end)}{over?' ⚠':''}</span>}
                            {(t.subtasks||[]).length>0&&<span className="mono" style={{fontSize:9.5,color:subPct===100?'var(--gn)':'var(--ink4)',whiteSpace:'nowrap',flexShrink:0}}>{sdone}/{t.subtasks.length}</span>}
                            {depBlocked&&<span style={{fontSize:9.5,color:'var(--ac)',whiteSpace:'nowrap',flexShrink:0}}>🔗</span>}
                          </div>
                          {/* Sub-task progress bar */}
                          {(t.subtasks||[]).length>0&&(
                            <div style={{marginTop:3,display:'flex',gap:6,alignItems:'center'}}>
                              <div className="pb" style={{flex:1,height:2}}><div className="pf" style={{width:subPct+'%',background:subPct===100?'var(--gn)':'var(--ac)'}}/></div>
                            </div>
                          )}
                        </div>
                        {/* Right side actions — always visible, compact */}
                        <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                          <select value={t.status||'Bekliyor'}
                            style={{fontSize:10,padding:'2px 5px',borderRadius:12,border:'1px solid var(--bd)',background:'var(--bg2)',fontFamily:'var(--ff)',cursor:'pointer',maxWidth:90}}
                            onClick={ev=>ev.stopPropagation()}
                            onChange={ev=>setD(prev=>({...prev,todos:prev.todos.map(x=>x.id===t.id?{...x,status:ev.target.value,done:ev.target.value==='Tamamlandı'}:x)}))}>
                            <option value="Bekliyor">⏳</option>
                            <option value="Yapılıyor">⚙️</option>
                            <option value="Tamamlandı">✅</option>
                            <option value="İptal">🚫</option>
                          </select>
                          <span style={{fontSize:11,color:'var(--ink4)',flexShrink:0,display:'inline-block',transition:'transform .18s',transform:exp?'rotate(180deg)':'rotate(0)'}}>▾</span>
                          <button className="ibtn" style={{width:24,height:24,fontSize:10,flexShrink:0,background:'var(--acb)',color:'var(--ac)',border:'1px solid var(--acbd)'}} title="Düzenle" onClick={ev=>{ev.stopPropagation();setModal({type:'todoEdit',tid:t.id,item:t});}}>✏</button>
                          <button className="ibtn" style={{width:22,height:22,fontSize:10,flexShrink:0}} onClick={ev=>{ev.stopPropagation();delItem(t,'todos');}}>×</button>
                        </div>
                      </div>
                      {exp&&(
                        <div style={{padding:'0 15px 14px',borderTop:'1px solid var(--bg3)'}}>
                          {/* Notes */}
                          {t.notes&&<div style={{padding:'8px 11px',background:'var(--acb)',borderRadius:'var(--r)',margin:'10px 0 8px',fontSize:12.5,color:'var(--ink2)',borderLeft:'3px solid var(--ac)'}} dangerouslySetInnerHTML={{__html:t.notes}}/>}
                          {/* Meta row */}
                          <div style={{display:'flex',gap:10,flexWrap:'wrap',fontSize:12,color:'var(--ink4)',margin:'8px 0',padding:'8px 0',borderBottom:'1px solid var(--bg3)'}}>
                            {t.start&&<span>▶ {fmtDate(t.start)}</span>}
                            {t.end&&<span>◼ {fmtDate(t.end)}</span>}
                            {t.estHours&&<span>⏱ {t.estHours}sa tahmini</span>}
                            <span className="weight-badge">%{t.weight||10} ağırlık</span>
                          </div>
                          {/* Dependency info */}
                          {(t.dependsOn||[]).length>0&&(
                            <div style={{marginBottom:10,padding:'7px 10px',background:depBlocked?'var(--rdb)':'var(--gnb)',borderRadius:'var(--r)',border:`1px solid ${depBlocked?'var(--rdbd)':'var(--gnbd)'}`,fontSize:12}}>
                              {depBlocked?'⚠ Bağımlı görevler tamamlanmadı:':'✓ Bağımlılıklar karşılandı'} {(t.dependsOn||[]).map(depId=>{const dep=D.todos.find(x=>x.id===depId);return dep?<span key={depId} style={{marginLeft:5,fontWeight:600}}>{dep.text}</span>:null;})}
                            </div>
                          )}
                          {/* Links section */}
                          <div style={{marginBottom:10}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                              <div className="slbl2" style={{marginBottom:0}}>🔗 Bağlantılar</div>
                              <button className="btn btnxs btng" onClick={()=>{const url=prompt('URL ekle:');if(url)setD(prev=>({...prev,todos:prev.todos.map(x=>x.id===t.id?{...x,links:[...(x.links||[]),url.trim()]}:x)}));}}>+ Link</button>
                            </div>
                            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                              {(t.links||[]).map((l,li)=>(
                                <div key={li} style={{display:'flex',alignItems:'center',gap:3}}>
                                  <a href={l} target="_blank" rel="noopener noreferrer" className="link-chip">🔗 {getDomain(l)}</a>
                                  <button className="ibtn" style={{width:16,height:16,fontSize:9}} onClick={()=>setD(prev=>({...prev,todos:prev.todos.map(x=>x.id===t.id?{...x,links:(x.links||[]).filter((_,i)=>i!==li)}:x)}))}>×</button>
                                </div>
                              ))}
                              {(t.links||[]).length===0&&<span style={{fontSize:11,color:'var(--ink6)',fontStyle:'italic'}}>Bağlantı yok.</span>}
                            </div>
                          </div>
                          {/* Sub-tasks */}
                          <div>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}>
                              <div className="slbl2" style={{marginBottom:0}}>Alt Görevler ({sdone}/{(t.subtasks||[]).length})</div>
                              <button className="btn btnxs btng" onClick={()=>setModal({type:'subtask',tid:t.id})}>+ Ekle</button>
                            </div>
                            {(t.subtasks||[]).length>0&&<div style={{marginBottom:8}}><div className="pb" style={{height:3}}><div className="pf" style={{width:pct(sdone,(t.subtasks||[]).length)+'%',background:pct(sdone,(t.subtasks||[]).length)===100?'var(--gn)':'var(--ac)'}}/></div></div>}
                            {(t.subtasks||[]).map(s=>(
                              <div key={s.id} className="sub-item">
                                <input type="checkbox" className="chk" checked={s.done} onChange={()=>togSub(t.id,s.id)} style={{marginTop:3}}/>
                                <div style={{flex:1}}>
                                  <div style={{fontSize:12.5,color:s.done?'var(--ink4)':'var(--ink)',textDecoration:s.done?'line-through':'none'}}>{s.text}</div>
                                  <div style={{display:'flex',gap:7,marginTop:2}}>
                                    {s.assignee&&<span className="assignee-chip" style={{fontSize:9.5}}>👤 {s.assignee}</span>}
                                    {s.updatedAt&&<span className="mono" style={{fontSize:9,color:'var(--ink6)'}}>🕐 {fmtTS(s.updatedAt)}</span>}
                                  </div>
                                </div>
                                <button className="ibtn" style={{width:22,height:22,fontSize:10,background:'var(--acb)',color:'var(--ac)',border:'1px solid var(--acbd)'}} title="Düzenle" onClick={()=>setModal({type:'subtaskEdit',tid:t.id,sid:s.id,item:s})}>✏</button>
                                <button className="ibtn" style={{width:20,height:20,fontSize:10}} onClick={()=>setD(prev=>({...prev,todos:prev.todos.map(x=>x.id===t.id?{...x,subtasks:(x.subtasks||[]).filter(y=>y.id!==s.id)}:x)}))}>×</button>
                              </div>
                            ))}
                          </div>
                          {/* Dependency setter */}
                          <div style={{marginTop:10,borderTop:'1px solid var(--bg3)',paddingTop:10}}>
                            <div className="slbl2" style={{marginBottom:6}}>🔗 Bağımlılık Ekle</div>
                            <select style={{fontSize:12,padding:'5px 9px',borderRadius:'var(--r)',border:'1px solid var(--bd)',fontFamily:'var(--ff)',background:'var(--bg2)'}}
                              onChange={ev=>{const depId=parseInt(ev.target.value);if(depId&&!(t.dependsOn||[]).includes(depId))setD(prev=>({...prev,todos:prev.todos.map(x=>x.id===t.id?{...x,dependsOn:[...(x.dependsOn||[]),depId]}:x)}));ev.target.value='';}}
                              defaultValue="">
                              <option value="">Bu görev için önce yapılması gereken görevi seç…</option>
                              {D.todos.filter(x=>x.id!==t.id&&!x.done).map(x=><option key={x.id} value={x.id}>{x.text.slice(0,50)}</option>)}
                            </select>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                {sorted.length===0&&<div className="card empty"><div className="empty-icon">☑️</div>Filtrele ile eşleşen görev yok.</div>}
              </div>
            </div>
          )}

          {/* ── CALENDAR sub-tab ── */}
          {todoTab==='calendar'&&<CalPage D={D} setD={setD} setDetail={setDetail} setModal={setModal} calView={calView} setCalView={setCalView} calDate={calDate} setCalDate={setCalDate}/>}

          {/* ── THE ONE THING sub-tab ── */}
          {todoTab==='onething'&&(
            <div>
              {/* Hero question */}
              <div style={{background:'linear-gradient(135deg,#18160F 0%,#2E1A0E 100%)',borderRadius:'var(--r4)',padding:'28px 32px',color:'#fff',marginBottom:18,textAlign:'center',position:'relative',overflow:'hidden'}}>
                <div style={{position:'absolute',top:-30,left:-30,width:180,height:180,borderRadius:'50%',background:'rgba(184,98,26,.12)',pointerEvents:'none'}}/>
                <div style={{fontSize:40,marginBottom:12}}>🎯</div>
                <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:20,lineHeight:1.5,opacity:.9,marginBottom:6,maxWidth:480,margin:'0 auto 10px'}}>
                  "Bugün yapılırsa diğer işleri kolaylaştıracak veya gereksiz kılacak tek şey nedir?"
                </div>
                <div style={{fontSize:11,opacity:.4,fontFamily:'var(--fm)',letterSpacing:.5}}>— THE ONE THING · Gary Keller</div>
                <div style={{marginTop:14,display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
                  {[
                    {ic:'🎯',t:'Odak',d:'Günde 1 şeye odaklanmak, 10 şeye dağılmaktan 3x daha verimlidir'},
                    {ic:'⚡',t:'Domino Etkisi',d:'Doğru seçilen 1 görev, diğer görevleri otomatik kolaylaştırır'},
                    {ic:'🏆',t:'Araştırma',d:'Gary Keller\'ın çalışması: En başarılı insanlar her gün "tek şeye" odaklanır'},
                    {ic:'🧠',t:'Bilişsel Yük',d:'Beyin aynı anda 1 görevi en iyi işler — çok görev, kaliteyi düşürür'},
                  ].map(tip=>(
                    <div key={tip.ic} className="info-tip" style={{background:'rgba(255,255,255,.08)',padding:'8px 12px',borderRadius:'var(--r2)',border:'1px solid rgba(255,255,255,.12)'}}>
                      <span style={{fontSize:16}}>{tip.ic}</span>
                      <span style={{fontSize:12,marginLeft:6,opacity:.8}}>{tip.t}</span>
                      <span className="tip-bubble" style={{background:'var(--sur)',color:'var(--ink)',border:'1px solid var(--bd)'}}>{tip.d}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Current One Thing */}
              <div style={{marginBottom:18,padding:'20px 22px',background:'var(--sur)',border:'2px solid var(--ac)',borderRadius:'var(--r3)',boxShadow:'var(--shm)'}}>
                <div style={{fontSize:10,fontFamily:'var(--fm)',color:'var(--ac)',letterSpacing:1,textTransform:'uppercase',marginBottom:10,fontWeight:700}}>Bugünün Tek Ana Hedefi</div>
                {(D.oneThing?.text)?(
                  <div>
                    <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:20,color:'var(--ink)',lineHeight:1.4,marginBottom:14}}>{D.oneThing.text}</div>
                    <div style={{display:'flex',gap:8}}>
                      <button className="btn btnp btns" onClick={()=>{if(confirm('Bu görevi tamamlandı olarak işaretle?'))setD(prev=>({...prev,oneThing:{text:'',date:null}}));}}>✓ Tamamlandı</button>
                      <button className="btn btns btng" onClick={()=>setD(prev=>({...prev,oneThing:{text:'',date:null}}))}>Değiştir</button>
                    </div>
                  </div>
                ):(
                  <div>
                    <textarea placeholder="Bugünün en kritik, diğer her şeyi kolaylaştıracak tek işini yaz…"
                      rows={3} style={{width:'100%',fontFamily:'var(--fd)',fontStyle:'italic',fontSize:15,padding:'10px 12px',borderRadius:'var(--r)',border:'1px solid var(--bd)',marginBottom:10,resize:'vertical',background:'var(--bg2)'}}
                      id="oneThingInput"/>
                    <button className="btn btnp" onClick={()=>{const el=document.getElementById('oneThingInput');if(el&&el.value.trim())setD(prev=>({...prev,oneThing:{text:el.value.trim(),date:today()}}));}}>Hedefimi Belirle</button>
                  </div>
                )}
              </div>

                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                  <div>
                    <div className="slbl2" style={{marginBottom:2,display:'flex',alignItems:'center'}}>⚡ Günün 3 İşi <InfoTip text="MIT (Most Important Tasks) sistemi: Her sabah 1 büyük + 2 küçük iş seçin. Sadece bunları tamamlasanız bile günü başarılı saymış olursunuz. CEO'ların %73'ü bu sistemi kullanır." icon="?"/></div>
                    <div style={{fontSize:11.5,color:'var(--ink4)'}}>1 büyük iş + 2 küçük iş. CEO'ların kullandığı sistem.</div>
                  </div>
                  <span className="mono" style={{fontSize:12,color:'var(--ink4)'}}>{(D.top3||[]).filter(t=>t.done).length}/3</span>
                </div>
                {(D.top3||[]).map((t,i)=>(
                  <div key={t.id} style={{display:'flex',gap:9,alignItems:'center',padding:'9px 12px',marginBottom:6,background:t.done?'var(--gnb)':'var(--bg2)',borderRadius:'var(--r)',border:`1px solid ${t.done?'var(--gnbd)':'var(--bd)'}`}}>
                    <input type="checkbox" className="chk" checked={t.done} onChange={()=>setD(prev=>({...prev,top3:(prev.top3||[]).map(x=>x.id===t.id?{...x,done:!x.done}:x)}))}/>
                    <div style={{width:20,height:20,borderRadius:'50%',background:i===0?'var(--ac)':i===1?'var(--bl)':'var(--gn)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,flexShrink:0}}>{i===0?'BÜY':i+1}</div>
                    <span style={{flex:1,fontSize:13,color:t.done?'var(--ink4)':'var(--ink)',textDecoration:t.done?'line-through':'none'}}>{t.text}</span>
                    <button className="ibtn" style={{width:20,height:20,fontSize:10}} onClick={()=>setD(prev=>({...prev,top3:(prev.top3||[]).filter(x=>x.id!==t.id)}))}>×</button>

                {(D.top3||[]).length<3&&(

                  </div>

              </div>

              <div style={{padding:'16px 18px',background:'var(--sur)',border:'1px solid var(--bd)',borderRadius:'var(--r3)'}}>
                <div className="slbl2" style={{marginBottom:12}}>Tüm Bekleyen Görevler — Öncelik Sırası</div>
                {D.todos.filter(t=>!t.done).sort((a,b)=>PRI_O(a.priority)-PRI_O(b.priority)).slice(0,8).map(t=>(
                  <div key={t.id} style={{display:'flex',gap:8,alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--bg3)'}}>
                    <input type="checkbox" className="chk" checked={false} onChange={()=>togTodo(t.id)}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,color:'var(--ink)',fontWeight:500}}>{t.text}</div>
                      <div style={{display:'flex',gap:5,marginTop:3}}><PriFlag p={t.priority} size="xs"/>{t.end&&<span className="mono" style={{fontSize:10,color:isOverdue(t.end,false)?'var(--rd)':'var(--ink5)'}}>{fmtShort(t.end)}</span>}</div>
                    </div>
                    <button className="btn btnxs btng" onClick={()=>{if((D.top3||[]).length<3)setD(prev=>({...prev,top3:[...(prev.top3||[]),{id:uid(),text:t.text,done:false}]}))}}>+ Günün 3'üne ekle</button>
                  </div>
                ))}
              </div>
            </div>

          {todoTab==='nottodo'&&(
            <div>
              <div style={{background:'linear-gradient(135deg,var(--rdb) 0%,var(--sur) 100%)',border:'1px solid var(--rdbd)',borderRadius:'var(--r3)',padding:'20px 22px',marginBottom:16}}>
                <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontSize:16,color:'var(--rd)',marginBottom:4,display:'flex',alignItems:'center',gap:6}}>🚫 Bugün Yapılmayacaklar <InfoTip text="Yapılmayacaklar listesi, dikkat hırsızlarını önceden engelleyen Warren Buffett'ın uyguladığı bir sistemdir. 'Hayır' diyemediklerinizi yazın — göreviniz bunları sıfır yapmak." icon="?"/></div>
                <div style={{fontSize:12.5,color:'var(--ink3)',lineHeight:1.7}}>Odaklanmak, ne yapacağınızı bilmek kadar ne <em>yapmayacağınızı</em> bilmektir. Bu liste dikkat hırsızlarını belgeliyor.</div>

              <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
                {(D.notToDo||[]).map(item=>(
                  <div key={item.id} style={{display:'flex',gap:10,alignItems:'center',padding:'12px 16px',background:'var(--sur)',border:'1px solid var(--rdbd)',borderLeft:'3px solid var(--rd)',borderRadius:'var(--r2)'}}>
                    <span style={{fontSize:18}}>🚫</span>
                    <span style={{flex:1,fontSize:14,color:'var(--ink2)',fontWeight:500}}>{item.text}</span>
                    <button className="ibtn" onClick={()=>setD(prev=>({...prev,notToDo:(prev.notToDo||[]).filter(x=>x.id!==item.id)}))}>×</button>
                  </div>
                ))}
                {(D.notToDo||[]).length===0&&<div className="card empty"><div className="empty-icon">🚫</div>Liste boş. Dikkat hırsızlarınızı ekleyin.</div>}
              </div>
              <div style={{display:'flex',gap:8,padding:'12px 14px',background:'var(--bg2)',borderRadius:'var(--r2)',border:'1px solid var(--bd)'}}>
                <input id="ntdInput" placeholder="Kaçınılacak davranış, alışkanlık veya aktivite…" style={{flex:1,padding:'8px 11px',fontSize:13,borderRadius:'var(--r)',border:'1px solid var(--bd)',fontFamily:'var(--ff)',background:'var(--sur)'}}

                <button className="btn btnp" onClick={()=>{const el=document.getElementById('ntdInput');if(el&&el.value.trim()){setD(prev=>({...prev,notToDo:[...(prev.notToDo||[]),{id:uid(),text:el.value.trim()}]}));el.value=''}}}>+ Ekle</button>
              </div>
            </div>
          )}

          }catch{alert('JSON formatı hatalı!');}};
          r.readAsText(file);

          const r=new FileReader();

            const wb=XLSX.read(ev.target.result,{type:'binary'});

          r.readAsBinaryString(file);

        XLSX.utils.book_append_sheet(wb,'Alıntilar',ws);XLSX.writeFile(wb,'Alıntilar.xlsx');

            <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
              <input id="q-file-in" type="file" accept=".json,.xlsx,.xls,.csv" style={{display:'none'}} onChange={doImportQuotes}/>
              <button className="btn btns btng" onClick={()=>document.getElementById('q-file-in').click()}>⬆ İçe Aktar</button>
              <button className="btn btns btng" onClick={exportQExcel}>⬇ Excel</button>
              <button className="btn btns btng" onClick={exportQJSON}>⬇ JSON</button>
              <button className="btn btnp btns" onClick={()=>setModal({type:'quote'})}>+ Ekle</button>
              <button className="btn btns" style={{background:'var(--pu)',color:'#fff',border:'none'}} onClick={()=>setPrintQ(D.quotes[0]||{text:'',author:''})}>🖼 Tasarımcı</button>
            </div>
          </div>
          <div style={{padding:'7px 12px',background:'var(--acb)',border:'1px solid var(--acbd)',borderRadius:'var(--r)',marginBottom:10,fontSize:11.5,color:'var(--actext)'}}>
            <strong>Dış Veri:</strong> JSON veya Excel aktar. Excel kolonları: <code style={{fontFamily:'var(--fm)',fontSize:11}}>Alinti</code>, <code style={{fontFamily:'var(--fm)',fontSize:11}}>Yazar</code>, <code style={{fontFamily:'var(--fm)',fontSize:11}}>Kategori</code>
          </div>
          <div className="fbar">{qCats.map(c=><button key={c} className={`chip${fCat===c?' on':''}`} onClick={()=>setFCat(c)}>{c}</button>)}</div>
          <div className="g3">
            {qFiltered.map(q=>(
              <div key={q.id} className="q-card" style={{background:q.bg||'#18160F',color:q.fg||'#F0EDE4'}}>
                <div>
                  <div className="mono" style={{fontSize:9,letterSpacing:2,opacity:.4,marginBottom:10,textTransform:'uppercase'}}>{q.category}</div>
                  <p style={{fontFamily:'Instrument Serif',fontStyle:'italic',fontSize:14,lineHeight:1.85}}>{q.text}</p>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:14}}>
                  <span style={{fontSize:11,opacity:.5}}>— {q.author}</span>
                  <div style={{display:'flex',gap:4}}>
                    <button onClick={()=>setPrintQ(q)} style={{width:24,height:24,borderRadius:5,border:'none',background:'rgba(255,255,255,.12)',color:'inherit',cursor:'pointer',fontSize:11,transition:'background .15s'}} onMouseEnter={ev=>ev.currentTarget.style.background='rgba(255,255,255,.22)'} onMouseLeave={ev=>ev.currentTarget.style.background='rgba(255,255,255,.12)'}>🖼</button>
                    <button onClick={()=>delItem(q,'quotes')} style={{width:24,height:24,borderRadius:5,border:'none',background:'rgba(255,255,255,.12)',color:'inherit',cursor:'pointer',fontSize:11,transition:'background .15s'}} onMouseEnter={ev=>ev.currentTarget.style.background='rgba(255,255,255,.22)'} onMouseLeave={ev=>ev.currentTarget.style.background='rgba(255,255,255,.12)'}>×</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }
    /* ── ROUTINES ── */
    case 'routines':{
      const PICS={daily:'☀️',weekly:'📅',monthly:'🗓️',quarterly:'🔭'};
      const PLBLS={daily:'Günlük',weekly:'Haftalık',monthly:'Aylık',quarterly:'Üç Aylık'};
      return(
        <div className="afu">
          <div className="ph"><div><div className="ptit">Rutinler</div></div></div>
          <div className="g4" style={{marginBottom:14}}>
            {Object.entries(D.routines||{}).map(([p,items])=>{const done=(items||[]).filter(i=>!routineActive(p,i.lastDone)).length;const pc=pct(done,items.length);return(<div key={p} className="card scard"><div style={{fontSize:18,marginBottom:3}}>{PICS[p]}</div><div className="snum" style={{color:pc===100?'var(--gn)':pc>0?'var(--ac)':'var(--ink)'}}>{done}/{items.length}</div><div className="slbl">{PLBLS[p]}</div></div>);})}
          </div>
          <div className="g2">
            {Object.entries(D.routines||{}).map(([period,items])=>{
              const done=(items||[]).filter(i=>!routineActive(period,i.lastDone)).length;const pc=pct(done,items.length);
              return(
                <div key={period} className="card cp">
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                    <div style={{display:'flex',alignItems:'center',gap:7}}><span style={{fontSize:18}}>{PICS[period]}</span><div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontWeight:400,fontSize:14}}>{PLBLS[period]}</div></div>
                    <span className="mono" style={{fontSize:10.5,color:'var(--ink4)'}}>{done}/{items.length}</span>
                  </div>
                  <div className="pb" style={{marginBottom:13}}><div className="pf" style={{width:pc+'%',background:pc===100?'var(--gn)':pc>50?'var(--ac)':'var(--ink3)'}}/></div>
                  {(items||[]).map(item=>{const active=routineActive(period,item.lastDone);return(
                    <div key={item.id} className={`routine-row${!active?' done':''}`} onClick={()=>{if(!active)return;setD(prev=>({...prev,routines:{...prev.routines,[period]:prev.routines[period].map(r=>r.id===item.id?{...r,lastDone:new Date().toISOString()}:r)}}));}}>
                      <span style={{fontSize:17,flexShrink:0}}>{item.emoji}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,color:active?'var(--ink)':'var(--ink4)',fontWeight:active?500:400,textDecoration:!active?'line-through':'none'}}>{item.text}</div>
                        <div style={{display:'flex',gap:8,marginTop:1}}>
                          {item.category&&<span className="mono" style={{fontSize:9.5,color:'var(--ink5)'}}>{item.category}</span>}
                          {item.duration&&<span className="mono" style={{fontSize:9.5,color:'var(--ink5)'}}>⏱ {item.duration}dk</span>}
                          {!active&&<span style={{fontSize:9.5,color:'var(--gn)',fontFamily:'var(--fm)'}}>✓ tamamlandı</span>}
                        </div>
                      </div>
                      {active&&<span style={{fontSize:11,color:'var(--ink5)',fontFamily:'var(--fm)'}}>↗</span>}
                      <button className="ibtn" style={{width:22,height:22,fontSize:10}} onClick={ev=>{ev.stopPropagation();setD(prev=>({...prev,routines:{...prev.routines,[period]:(prev.routines[period]||[]).filter(i=>i.id!==item.id)}}))}}>×</button>
                    </div>
                  );})}
                  <button className="btn btnxs btng" style={{marginTop:10,width:'100%',justifyContent:'center'}} onClick={()=>{const t=prompt('Rutin adı:');if(!t)return;const em=prompt('Emoji:');const dur=prompt('Süre (dk):');setD(prev=>({...prev,routines:{...prev.routines,[period]:[...(prev.routines[period]||[]),{id:uid(),text:t,lastDone:null,emoji:em||'📋',duration:parseInt(dur)||null,category:'Genel'}]}}));}}>+ Rutin Ekle</button>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ── COACHING ── */
    case 'coaching':{
      const items=fl(D.coaching||[],['title','content','category']);
      const filtered=fCat==='Tümü'?items:items.filter(c=>c.type===fCat);
      return(
        <div className="afu">
          <div className="ph"><div><div className="ptit">Koçluk Merkezi</div></div><button className="btn btnp" onClick={()=>setModal({type:'coaching'})}>+ Ekle</button></div>
          <div className="fbar">{['Tümü',...COACH_T].map(t=><button key={t} className={`chip${fCat===t?' on':''}`} onClick={()=>setFCat(t)}>{TYPE_IC[t]||''} {t}</button>)}</div>
          <div className="g3">
            {filtered.map(item=>(
              <div key={item.id} className="ccard" onClick={()=>setDetail({type:'coaching',item})}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <div><div style={{fontSize:24,marginBottom:7}}>{TYPE_IC[item.type]||'📋'}</div><span className={`tag ${TYPE_CL[item.type]||''}`}>{item.type}</span></div>
                  <button className="ibtn" onClick={ev=>{ev.stopPropagation();delItem(item,'coaching');}}>×</button>
                </div>
                <div style={{fontFamily:'var(--fd)',fontStyle:'italic',fontWeight:400,fontSize:14,marginBottom:7,lineHeight:1.4}}>{item.title}</div>
                <p style={{fontSize:12.5,color:'var(--ink3)',lineHeight:1.7,display:'-webkit-box',WebkitLineClamp:4,WebkitBoxOrient:'vertical',overflow:'hidden',whiteSpace:'pre-line'}}>{item.content}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── BOOKMARKS ── */
    case 'bookmarks':{
      const bms=D.bookmarks||[];
      const bmAll=fl(bms,['title','url','purpose','notes','category']);
      const bmCats=['Tümü',...new Set(bms.map(b=>b.category))].filter(Boolean);
      const bmFiltered=fCat==='Tümü'?bmAll:bmAll.filter(b=>b.category===fCat);
      const catCounts=bmCats.filter(c=>c!=='Tümü').map(c=>({c,n:bms.filter(b=>b.category===c).length})).sort((a,b)=>b.n-a.n);
      const doImportBM=(e)=>{
        const file=e.target.files[0];if(!file)return;
        const ext=file.name.split('.').pop().toLowerCase();
        if(ext==='json'){
          const r=new FileReader();
          r.onload=ev=>{try{
            const arr=JSON.parse(ev.target.result);
            const items=Array.isArray(arr)?arr:arr.bookmarks||[];
            const newBM=items.map(b=>({id:uid(),url:b.url||b.URL||b.link||'',title:b.title||b.baslik||getDomain(b.url||''),category:b.category||b.kategori||'Genel',purpose:b.purpose||b.amac||'',notes:b.notes||'',addedAt:today()})).filter(b=>b.url);
            setD(prev=>({...prev,bookmarks:[...prev.bookmarks,...newBM]}));
            alert(newBM.length+' yer imi eklendi!');
          }catch{alert('JSON formatı hatalı!');}};
          r.readAsText(file);
        }else if(ext==='xlsx'||ext==='xls'||ext==='csv'){
          const r=new FileReader();
          r.onload=ev=>{try{
            const wb=XLSX.read(ev.target.result,{type:'binary'});
            const ws=wb.Sheets[wb.SheetNames[0]];
            const data=XLSX.utils.sheet_to_json(ws);
            const newBM=data.map(row=>({id:uid(),url:row['URL']||row['url']||row['Link']||'',title:row['Baslik']||row['Title']||getDomain(row['URL']||row['url']||''),category:row['Kategori']||row['Category']||'Genel',purpose:row['Amac']||row['Purpose']||'',notes:row['Notlar']||row['Notes']||'',addedAt:today()})).filter(b=>b.url);
            setD(prev=>({...prev,bookmarks:[...prev.bookmarks,...newBM]}));
            alert(newBM.length+' yer imi eklendi!');
          }catch{alert('Dosya okunamadı!');}};
          r.readAsBinaryString(file);
        }
        e.target.value='';
      };
      const exportBMExcel=()=>{
        const rows=bms.map(b=>({'Baslik':b.title,'URL':b.url,'Kategori':b.category,'Amac':b.purpose||'','Notlar':b.notes||'','Ekleme':b.addedAt||''}));
        const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,'YerImleri',ws);XLSX.writeFile(wb,'YerImleri.xlsx');
      };
      const exportBMJSON=()=>{
        const bl=new Blob([JSON.stringify(bms,null,2)],{type:'application/json'});
        const u=URL.createObjectURL(bl);const a=document.createElement('a');
        a.href=u;a.download='yer-imleri.json';a.click();URL.revokeObjectURL(u);
      };
      return(
        <div className="afu">
          <div className="ph">
            <div><div className="ptit">Yer İmleri</div><div className="psub">{bms.length} site · {bmCats.length-1} kategori</div></div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
              <input id="bm-file-in" type="file" accept=".json,.xlsx,.xls,.csv" style={{display:'none'}} onChange={doImportBM}/>
              <button className="btn btns btng" onClick={()=>document.getElementById('bm-file-in').click()}>⬆ İçe Aktar</button>
              <button className="btn btns btng" onClick={exportBMExcel}>⬇ Excel</button>
              <button className="btn btns btng" onClick={exportBMJSON}>⬇ JSON</button>
              <button className={`btn btns${bmView==='grid'?' btnp':''}`} onClick={()=>setBmView('grid')}>⊞</button>
              <button className={`btn btns${bmView==='list'?' btnp':''}`} onClick={()=>setBmView('list')}>≡</button>
              <button className="btn btnp btns" onClick={()=>setModal({type:'bookmark'})}>+ Ekle</button>
            </div>
          </div>
          <div className="g4" style={{marginBottom:12}}>
            <div className="card scard"><div style={{fontSize:18,opacity:.6,marginBottom:3}}>🔖</div><div className="snum" style={{fontSize:22,color:'var(--bl)'}}>{bms.length}</div><div className="slbl">Toplam Site</div></div>
            <div className="card scard"><div style={{fontSize:18,opacity:.6,marginBottom:3}}>📂</div><div className="snum" style={{fontSize:22,color:'var(--pu)'}}>{bmCats.length-1}</div><div className="slbl">Kategori</div></div>
            <div className="card scard" style={{gridColumn:'span 2',padding:'10px 14px'}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--ink4)',marginBottom:6,fontFamily:'var(--fm)',letterSpacing:.5}}>KATEGORİLER</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {catCounts.slice(0,8).map(({c,n})=>(
                  <button key={c} className={`chip${fCat===c?' on':''}`} style={{fontSize:11,padding:'2px 8px'}} onClick={()=>setFCat(fCat===c?'Tümü':c)}>{c} <span className="mono">{n}</span></button>
                ))}
              </div>
            </div>
          </div>
          <div style={{padding:'7px 12px',background:'var(--acb)',border:'1px solid var(--acbd)',borderRadius:'var(--r)',marginBottom:10,fontSize:11.5,color:'var(--actext)'}}>
            <strong>Dış Veri:</strong> Excel/JSON aktar. Kolonlar: <code style={{fontFamily:'var(--fm)',fontSize:11}}>URL</code>, <code style={{fontFamily:'var(--fm)',fontSize:11}}>Baslik</code>, <code style={{fontFamily:'var(--fm)',fontSize:11}}>Kategori</code>, <code style={{fontFamily:'var(--fm)',fontSize:11}}>Amac</code>
          </div>
          <div className="fbar">{bmCats.map(c=><button key={c} className={`chip${fCat===c?' on':''}`} onClick={()=>setFCat(c)}>{c}</button>)}</div>
          {bmView==='grid'?(
            <div className="g3">
              {bmFiltered.map(b=>(
                <div key={b.id} className="card bm-card ch">
                  <div style={{display:'flex',gap:9,alignItems:'center',marginBottom:6}}>
                    <Fav url={b.url} title={b.title} size={18}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:500,fontSize:13,color:'var(--ink)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{b.title}</div>
                      <div className="mono" style={{fontSize:10,color:'var(--ink5)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{getDomain(b.url)}</div>
                    </div>
                    <button className="ibtn" onClick={ev=>{ev.stopPropagation();delItem(b,'bookmarks');}}>×</button>
                  </div>
                  <span className="tag" style={{fontSize:10,marginBottom:4}}>{b.category}</span>
                  {b.purpose&&<div style={{fontSize:11.5,color:'var(--ink4)',lineHeight:1.5,marginTop:4}}>{b.purpose}</div>}
                  <a href={ensureHttp(b.url)} target="_blank" rel="noreferrer" onClick={ev=>ev.stopPropagation()} style={{display:'block',marginTop:8,fontSize:11,color:'var(--ac)',fontFamily:'var(--fm)',textDecoration:'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>↗ {b.url}</a>
                </div>
              ))}
            </div>
          ):(
            <div className="card" style={{overflow:'hidden'}}>
              <table>
                <thead><tr><th>Site</th><th>Kategori</th><th>Amaç</th><th>Eklenme</th><th></th></tr></thead>
                <tbody>
                  {bmFiltered.map(b=>(
                    <tr key={b.id}>
                      <td><div style={{display:'flex',gap:8,alignItems:'center'}}><Fav url={b.url} title={b.title} size={16}/><div><div style={{fontWeight:500,fontSize:13}}>{b.title}</div><a href={ensureHttp(b.url)} target="_blank" rel="noreferrer" style={{fontSize:10.5,color:'var(--ac)',fontFamily:'var(--fm)',textDecoration:'none'}}>{getDomain(b.url)}</a></div></div></td>
                      <td><span className="tag" style={{fontSize:10}}>{b.category}</span></td>
                      <td style={{fontSize:12.5,color:'var(--ink3)',maxWidth:200}}>{b.purpose}</td>
                      <td><span className="mono" style={{fontSize:11,color:'var(--ink5)'}}>{b.addedAt||'—'}</span></td>
                      <td><button className="ibtn" onClick={()=>delItem(b,'bookmarks')}>×</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }
    /* ── AI COACH ── */
    case 'coach':{
      return(
        <div className="afu" style={{display:'flex',flexDirection:'column',height:'calc(100vh - 100px)'}}>
          <div className="ph" style={{marginBottom:8}}>
            <div><div className="ptit">AI Koç</div><div className="psub">Claude ile desteklenir · kişisel verilerinizi biliyor</div></div>
            <button className="btn btns btng" onClick={()=>setChatHist([{role:'assistant',content:'Yeni konuşma başlatıldı. Nasıl yardımcı olabilirim?'}])}>Temizle</button>
          </div>
          <div className="card" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:10}}>
              {chatHist.map((m,i)=>(
                <div key={i} style={{display:'flex',gap:9,alignSelf:m.role==='user'?'flex-end':'flex-start',flexDirection:m.role==='user'?'row-reverse':'row',maxWidth:'78%'}}>
                  {m.role==='assistant'&&<div className="chat-avatar">🧠</div>}
                  <div className={`chat-bubble ${m.role==='user'?'chat-user':'chat-bot'}`}>{m.content}</div>
                </div>
              ))}
              {chatWait&&(
                <div style={{display:'flex',gap:9,alignSelf:'flex-start'}}>
                  <div className="chat-avatar">🧠</div>
                  <div className="chat-bubble chat-bot" style={{display:'flex',gap:5,alignItems:'center',padding:'12px 15px'}}>
                    {[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:'50%',background:'var(--ink4)',display:'inline-block',animation:`blink 1.4s ${i*.2}s infinite`}}/>)}
                  </div>
                </div>
              )}
              <div ref={chatEnd}/>
            </div>
            {/* Quick prompts */}
            <div style={{padding:'8px 14px',borderTop:'1px solid var(--bd)',display:'flex',gap:5,flexWrap:'wrap',background:'var(--bg2)'}}>
              {['Bugün ne yapmalıyım?','Hangi hedeflerde gerideyim?','Alışkanlıklarımı analiz et','Motivasyon için ne önerirsin?'].map(q=>(
                <button key={q} onClick={()=>{setChatIn(q);}} style={{padding:'3px 9px',borderRadius:20,border:'1px solid var(--bd)',background:'var(--sur)',color:'var(--ink3)',fontSize:11,cursor:'pointer',fontFamily:'var(--ff)',transition:'all .12s'}}
                  onMouseEnter={ev=>ev.currentTarget.style.borderColor='var(--ac)'}
                  onMouseLeave={ev=>ev.currentTarget.style.borderColor='var(--bd)'}>{q}</button>
              ))}
            </div>
            <div style={{padding:'11px 14px',borderTop:'1px solid var(--bd)',display:'flex',gap:8}}>
              <textarea value={chatIn} onChange={ev=>setChatIn(ev.target.value)} onKeyDown={ev=>{if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();sendChat();}}} placeholder="Mesaj yaz… (Enter gönderir, Shift+Enter yeni satır)" style={{flex:1,resize:'none',minHeight:40,maxHeight:100,padding:'8px 12px',fontFamily:'var(--ff)',fontSize:13,borderRadius:'var(--r)'}}/>
              <button className="btn btnp" onClick={sendChat} disabled={chatWait||!chatIn.trim()} style={{alignSelf:'flex-end'}}>Gönder</button>
            </div>
          </div>
        </div>
      );
    }

    /* ── REVIEW ── */
    case 'review':{
      const l7=last7();
      const hStats=D.habits.map(h=>{const done=l7.filter(d=>(h.logs||[]).includes(d)).length;return{...h,done,pc:Math.round(done/7*100)};});
      const wPct=Math.round(hStats.reduce((s,h)=>s+h.pc,0)/Math.max(hStats.length,1));
      const completedTodos=D.todos.filter(t=>t.done).length;
      return(
        <div className="afu">
          <div className="ph"><div><div className="ptit">Haftalık İnceleme</div><div className="psub">Hafta {weekNum()} · {new Date().getFullYear()}</div></div><button className="btn btns btng" onClick={()=>exportJSON(D)}>⬇ Yedek Al</button></div>
          {/* Score cards */}
          <div className="g4" style={{marginBottom:14}}>
            {[
              {l:'Tamamlanan',v:completedTodos,c:'var(--gn)',d:'görev',ic:'✓'},
              {l:'Alışkanlık',v:wPct+'%',c:wPct>=80?'var(--gn)':wPct>=50?'var(--ac)':'var(--rd)',d:'bu hafta',ic:'🔥'},
              {l:'Biten Kitap',v:D.books.filter(b=>b.status==='Bitti').length,c:'var(--pu)',d:'toplam',ic:'📚'},
              {l:'Pomodoro',v:poms,c:'var(--bl)',d:'oturum',ic:'🍅'},
            ].map(s=><div key={s.l} className="card scard"><div style={{fontSize:18,opacity:.55,marginBottom:3}}>{s.ic}</div><div className="snum" style={{color:s.c}}>{s.v}</div><div className="slbl">{s.l}</div><div className="sdesc">{s.d}</div></div>)}
          </div>
          <div className="g2">
            <div className="card cp">
              <div className="slbl2">🎯 Hedef İlerlemesi</div>
              {D.goals.map(g=>{const p=pct((g.actionPlan||[]).filter(s=>s.done).length,(g.actionPlan||[]).length);return(
                <div key={g.id} style={{marginBottom:13}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <span style={{fontSize:13,fontWeight:500,fontFamily:'var(--fd)',fontStyle:'italic'}}>{g.isFrog?'🐸 ':''}{g.title}</span>
                    <span className="mono" style={{fontSize:10.5,color:p>=70?'var(--gn)':p>=30?'var(--ac)':'var(--ink4)',fontWeight:700}}>{p}%</span>
                  </div>
                  <div className="pb" style={{height:5}}><div className="pf" style={{width:p+'%',background:p>=70?'var(--gn)':p>=30?'var(--ac)':'var(--ink3)'}}/></div>
                  <div style={{marginTop:4,fontSize:11,color:'var(--ink5)'}}>Son tarih: {fmtShort(g.deadline)}</div>
                </div>
              );})}
            </div>
            <div className="card cp">
              <div className="slbl2">⚡ Alışkanlık Tutarlılığı</div>
              {hStats.map(h=>(
                <div key={h.id} style={{marginBottom:12}}>
                  <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4}}>
                    <span style={{fontSize:15}}>{h.emoji}</span>
                    <span style={{flex:1,fontSize:13}}>{h.name}</span>
                    <span className="mono" style={{fontSize:10.5,color:'var(--ink4)'}}>{h.done}/7</span>
                    <span style={{fontSize:11.5,fontWeight:700,color:h.pc>=70?'var(--gn)':h.pc>=40?'var(--ac)':'var(--rd)',fontFamily:'var(--fm)'}}>{h.pc}%</span>
                  </div>
                  <div className="pb" style={{height:4}}><div className="pf" style={{width:h.pc+'%',background:h.pc>=70?h.color:h.pc>=40?'var(--ac)':'var(--rd)'}}/></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }


    /* ── SETTINGS ── */
    case 'settings':{
      const members = D.teamMembers || TEAM_MEMBERS;
      const addMember = () => {
        const name = prompt('Yeni ekip üyesi adı:');
        if(!name || !name.trim()) return;
        if(members.includes(name.trim())){alert('Bu isim zaten mevcut!');return;}
        setD(prev=>({...prev, teamMembers:[...(prev.teamMembers||TEAM_MEMBERS), name.trim()]}));
      };
      const removeMember = (name) => {
        if(!confirm(name+' çıkarılsın mı?')) return;
        setD(prev=>({...prev, teamMembers:(prev.teamMembers||TEAM_MEMBERS).filter(m=>m!==name)}));
      };
      const resetMembers = () => {
        if(!confirm('Varsayılan ekip listesine dön?')) return;
        setD(prev=>({...prev, teamMembers:[...TEAM_MEMBERS]}));
      };
      const exportAll = () => exportJSON(D);
      const importAll = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const r = new FileReader();
        r.onload = ev => {
          try {
            const parsed = JSON.parse(ev.target.result);
            if(parsed.todos && parsed.goals && parsed.habits) {
              if(confirm('Tüm veriler yüklenmiş dosyayla değiştirilecek. Emin misiniz?')) {
                setD(parsed); alert('Veri başarıyla geri yüklendi!');
              }
            } else { alert('Geçersiz FocusUp yedek dosyası!'); }
          } catch { alert('JSON okunamadı!'); }
        };
        r.readAsText(file);
        e.target.value = '';
      };
      return(
        <div className="afu">
          <div className="ph">
            <div><div className="ptit">⚙ Ayarlar</div><div className="psub">Ekip, veri ve uygulama ayarları</div></div>
          </div>

          {/* Team Members */}
          <div className="card cp" style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:'var(--ink)'}}>👥 Ekip Üyeleri</div>
                <div style={{fontSize:12,color:'var(--ink4)',marginTop:2}}>Görev atamalarında bu liste kullanılır</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btns" style={{fontSize:11,padding:'5px 10px'}} onClick={resetMembers}>↺ Sıfırla</button>
                <button className="btn btnp btns" onClick={addMember}>+ Ekle</button>
              </div>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
              {members.map(m=>(
                <div key={m} style={{display:'flex',alignItems:'center',gap:6,padding:'7px 12px',
                  background:'var(--sur)',border:'1px solid var(--bd)',borderRadius:'var(--r)',fontSize:13}}>
                  <div style={{width:26,height:26,borderRadius:'50%',background:'var(--acb)',
                    border:'1px solid var(--acbd)',display:'flex',alignItems:'center',justifyContent:'center',
